<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детальний План-Факт — Apple Style</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; --success: #34c759; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 100%; margin: 20px auto; padding: 0 10px; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.5px; }
        
        .table-card { 
            background: white; 
            border-radius: 22px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        
        .group-header {
            background: #fbfbfd;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #d2d2d7;
            padding: 8px;
            color: #86868b;
        }

        th { text-align: left; padding: 12px 16px; color: #1d1d1f; font-size: 11px; font-weight: 600; border-bottom: 1px solid #d2d2d7; background: white; }
        td { padding: 14px 16px; border-bottom: 1px solid #f5f5f7; font-size: 13px; white-space: nowrap; }
        
        .name-cell, th:first-child { 
            position: sticky; 
            left: 0; 
            background: white; 
            z-index: 10; 
            min-width: 160px; 
            box-shadow: 4px 0 8px -4px rgba(0,0,0,0.1);
        }

        .val-plan { color: #86868b; }
        .val-fact { color: var(--text); font-weight: 600; }
        .val-pct { font-weight: 700; color: #ff9500; text-align: right; }
        
        .border-left { border-left: 1px solid #f0f0f2; }
        .total-row { background: #f5f5f7 !important; font-weight: 800 !important; }
        .total-row td { color: #000; border-top: 2px solid #d2d2d7; }

        .loading { padding: 40px; text-align: center; color: #86868b; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Назад</a>
        <h1>Аналітика План-Факт</h1>
        
        <div class="table-card">
            <div id="loader" class="loading">Завантаження...</div>
            <table id="dataTable" style="display: none;">
                <thead>
                    <tr>
                        <th rowspan="2">ПІБ</th>
                        <th colspan="3" class="group-header">ТО</th>
                        <th colspan="3" class="group-header border-left">Послуги</th>
                        <th colspan="3" class="group-header border-left">АСС</th>
                        <th colspan="3" class="group-header border-left">Чеки</th>
                    </tr>
                    <tr>
                        <th>План</th><th>Факт</th><th>%</th>
                        <th class="border-left">План</th><th>Факт</th><th>%</th>
                        <th class="border-left">План</th><th>Факт</th><th>%</th>
                        <th class="border-left">План</th><th>Факт</th><th>%</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Функція для коректного парсингу CSV з врахуванням лапок
        function parseCSV(text) {
            const rows = [];
            let row = [];
            let col = "";
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (char === '"' && text[i+1] === '"') { col += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { row.push(col); col = ""; }
                else if (char === '\n' && !inQuotes) { row.push(col); rows.push(row); row = []; col = ""; }
                else { col += char; }
            }
            if (col || row.length) { row.push(col); rows.push(row); }
            return rows;
        }

        // Чистка та форматування числа
        function cleanVal(val) {
            if (!val) return 0;
            let s = val.toString().replace('%', '').replace(/\s/g, '').replace(',', '.');
            return parseFloat(s) || 0;
        }

        function formatDisplay(val, isPct = false) {
            let num = cleanVal(val);
            if (isPct) return Math.round(num) + '%';
            return Math.round(num).toLocaleString('uk-UA');
        }

        async function loadTable() {
            const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOUXHhUpCkh6tgvNpJzY-w5tVrhPkvEeC0W0ZWuy2YxPayuO3pvahfeKYmMZ1DwHnILTpsJFNtXLsH/pub?output=csv";
            try {
                const res = await fetch(URL + '&t=' + Date.now());
                const text = await res.text();
                const rows = parseCSV(text);
                const dataRows = rows.slice(1); // пропуск шапки

                document.getElementById('loader').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';
                const tbody = document.getElementById('tableBody');

                dataRows.forEach(row => {
                    if (row.length < 10 || !row[0].trim()) return;

                    const tr = document.createElement('tr');
                    if (row[0].toLowerCase().includes('разом')) tr.className = 'total-row';

                    tr.innerHTML = `
                        <td class="name-cell">${row[0]}</td>
                        <td class="val-plan">${formatDisplay(row[1])}</td>
                        <td class="val-fact">${formatDisplay(row[2])}</td>
                        <td class="val-pct">${formatDisplay(row[3], true)}</td>
                        
                        <td class="val-plan border-left">${formatDisplay(row[4])}</td>
                        <td class="val-fact">${formatDisplay(row[5])}</td>
                        <td class="val-pct">${formatDisplay(row[6], true)}</td>
                        
                        <td class="val-plan border-left">${formatDisplay(row[7])}</td>
                        <td class="val-fact">${formatDisplay(row[8])}</td>
                        <td class="val-pct">${formatDisplay(row[9], true)}</td>
                        
                        <td class="val-plan border-left">${formatDisplay(row[10])}</td>
                        <td class="val-fact">${formatDisplay(row[11])}</td>
                        <td class="val-pct">${formatDisplay(row[12], true)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('loader').textContent = "Помилка завантаження";
            }
        }
        loadTable();
    </script>
</body>
</html>
