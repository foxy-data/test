<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продажі План Факт — Apple Style</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #34c759; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: 20px auto; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; margin-bottom: 20px; }
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.5px; }
        
        .table-card { 
            background: white; 
            border-radius: 22px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
            overflow-x: auto; 
        }

        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 16px; color: #86868b; font-size: 11px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid #d2d2d7; background: white; }
        td { padding: 16px; border-bottom: 1px solid #f5f5f7; font-size: 14px; white-space: nowrap; }
        
        /* ФІКСОВАНА КОЛОНКА ПІБ */
        .name-cell, th:first-child { 
            position: sticky; 
            left: 0; 
            background: white; 
            z-index: 10; 
            min-width: 180px; 
            box-shadow: 4px 0 8px -4px rgba(0,0,0,0.1);
        }
        th:first-child { z-index: 11; }

        /* КОЛЬОРИ СТОВПЦІВ */
        .col-plan { color: #0071e3; font-weight: 600; }
        .col-fact { color: #34c759; font-weight: 600; }
        .col-percent { color: #ff9500; font-weight: 600; }
        .col-diff { font-weight: 600; }
        .col-diff.positive { color: #34c759; }
        .col-diff.negative { color: #ff3b30; }

        /* РЯДОК ПІДСУМКУ */
        .total-row { background: #f5f5f7 !important; font-weight: 800 !important; }
        .total-row td { color: #000; }
        .total-row .name-cell { background: #f5f5f7 !important; }

        .loading { padding: 40px; text-align: center; color: #86868b; }

        /* МОБІЛЬНА ВЕРСІЯ */
        @media (max-width: 600px) {
            .name-cell, th:first-child { 
                min-width: 80px; 
                max-width: 80px;
                padding: 10px 5px;
                font-size: 10px;
                white-space: normal;
                line-height: 1.1;
                text-align: center;
            }
            
            td:not(.name-cell) {
                padding: 12px 8px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Назад</a>
        <h1>Продажі План Факт</h1>
        <div class="table-card">
            <div id="loader" class="loading">Оновлення...</div>
            <table id="dataTable" style="display: none;">
                <thead>
                    <tr>
                        <th>ПІБ</th>
                        <th>План</th>
                        <th>Факт</th>
                        <th>%</th>
                        <th>Різниця</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <script>
        async function loadTable() {
            try {
                // Завантажуємо дані з sales-data.json
                const r = await fetch('sales-data.json?t=' + Date.now());
                const data = await r.json();
                if (!data.length) return;

                document.getElementById('loader').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';

                const tbody = document.getElementById('tableBody');
                
                // Для прикладу створюємо план як 120% від факту
                // В реальному проекті ці дані мають братися з окремої таблиці
                data.forEach(person => {
                    if (!person.metrics || !person.metrics['ТО']) return;
                    
                    const fact = person.metrics['ТО'].value;
                    const plan = Math.round(fact * 1.2); // План = 120% від факту (приклад)
                    const percent = plan > 0 ? Math.round((fact / plan) * 100) : 0;
                    const diff = fact - plan;
                    
                    let tr = document.createElement('tr');
                    
                    // Виділяємо підсумковий рядок
                    if (person.id === 0) {
                        tr.className = 'total-row';
                    }
                    
                    tr.innerHTML = `
                        <td class="name-cell">${person.name}</td>
                        <td class="col-plan">${plan.toLocaleString('uk-UA')} грн</td>
                        <td class="col-fact">${Math.round(fact).toLocaleString('uk-UA')} грн</td>
                        <td class="col-percent">${percent}%</td>
                        <td class="col-diff ${diff >= 0 ? 'positive' : 'negative'}">
                            ${diff >= 0 ? '+' : ''}${Math.round(diff).toLocaleString('uk-UA')} грн
                        </td>
                    `;
                    
                    tbody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('loader').textContent = "Помилка: " + e.message;
            }
        }
        
        loadTable();

        // СВАЙП-НАВІГАЦІЯ
        let touchStartX = 0;
        let touchEndX = 0;
        
        function handleSwipe() {
            const swipeThreshold = 70;
            const swipeDistance = touchEndX - touchStartX;
            
            if (Math.abs(swipeDistance) > swipeThreshold && swipeDistance > 0) {
                // Свайп вправо - повернутися на головну
                window.location.href = 'index.html';
            }
        }
        
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });
        
        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });
    </script>
</body>
</html>
