<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продажі План Факт — Apple Style</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #34c759; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: 20px auto; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; margin-bottom: 20px; }
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.5px; }
        
        .table-card { 
            background: white; 
            border-radius: 22px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
            overflow-x: auto; 
        }

        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 16px; color: #86868b; font-size: 11px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid #d2d2d7; background: white; }
        td { padding: 16px; border-bottom: 1px solid #f5f5f7; font-size: 14px; white-space: nowrap; }
        
        .name-cell, th:first-child { 
            position: sticky; 
            left: 0; 
            background: white; 
            z-index: 10; 
            min-width: 180px; 
            box-shadow: 4px 0 8px -4px rgba(0,0,0,0.1);
        }
        th:first-child { z-index: 11; }

        .col-plan { color: #0071e3; font-weight: 600; }
        .col-fact { color: #34c759; font-weight: 600; }
        .col-percent { color: #ff9500; font-weight: 600; }
        .col-diff { font-weight: 600; }
        .col-diff.positive { color: #34c759; }
        .col-diff.negative { color: #ff3b30; }

        .total-row { background: #f5f5f7 !important; font-weight: 800 !important; }
        .total-row td { color: #000; }
        .total-row .name-cell { background: #f5f5f7 !important; }

        .loading { padding: 40px; text-align: center; color: #86868b; }

        @media (max-width: 600px) {
            .name-cell, th:first-child { 
                min-width: 80px; 
                max-width: 80px;
                padding: 10px 5px;
                font-size: 10px;
                white-space: normal;
                line-height: 1.1;
                text-align: center;
            }
            td:not(.name-cell) { padding: 12px 8px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Назад</a>
        <h1>Продажі План Факт</h1>
        <div class="table-card">
            <div id="loader" class="loading">Завантаження даних з Google Sheets...</div>
            <table id="dataTable" style="display: none;">
                <thead>
                    <tr>
                        <th>ПІБ</th>
                        <th>План</th>
                        <th>Факт</th>
                        <th>%</th>
                        <th>Різниця</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <script>
        // Функція для очищення тексту та перетворення в число
        function parseValue(val) {
            if (!val) return 0;
            // Видаляємо пробіли, грн, %, та замінюємо кому на крапку
            let clean = val.toString().replace(/\s/g, '').replace('грн', '').replace('%', '').replace(',', '.');
            return parseFloat(clean) || 0;
        }

        async function loadTable() {
            const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOUXHhUpCkh6tgvNpJzY-w5tVrhPkvEeC0W0ZWuy2YxPayuO3pvahfeKYmMZ1DwHnILTpsJFNtXLsH/pub?output=csv";
            
            try {
                const response = await fetch(SHEET_URL + '&t=' + Date.now());
                const csvText = await response.text();
                
                // Простий парсинг CSV (розділення по рядках та комам)
                const rows = csvText.split('\n').map(row => row.split(','));
                
                // Пропускаємо заголовок (перший рядок)
                const dataRows = rows.slice(1);

                document.getElementById('loader').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';

                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = ''; // Очищуємо перед завантаженням

                dataRows.forEach(row => {
                    if (row.length < 5 || !row[0].trim()) return;

                    const name = row[0].trim();
                    const plan = parseValue(row[1]);
                    const fact = parseValue(row[2]);
                    const percent = row[3].trim(); // Беремо готовий % з таблиці
                    const diff = parseValue(row[4]);
                    
                    let tr = document.createElement('tr');
                    
                    // Перевірка на рядок підсумку (якщо ім'я містить "Разом" або "Сума")
                    if (name.toLowerCase().includes('разом') || name.toLowerCase().includes('сума')) {
                        tr.className = 'total-row';
                    }
                    
                    tr.innerHTML = `
                        <td class="name-cell">${name}</td>
                        <td class="col-plan">${Math.round(plan).toLocaleString('uk-UA')} грн</td>
                        <td class="col-fact">${Math.round(fact).toLocaleString('uk-UA')} грн</td>
                        <td class="col-percent">${percent}</td>
                        <td class="col-diff ${diff >= 0 ? 'positive' : 'negative'}">
                            ${diff >= 0 ? '+' : ''}${Math.round(diff).toLocaleString('uk-UA')} грн
                        </td>
                    `;
                    
                    tbody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('loader').textContent = "Помилка завантаження: " + e.message;
            }
        }
        
        loadTable();

        // Свайп-навігація залишена без змін
        let touchStartX = 0; let touchStartY = 0; let touchEndX = 0; let touchEndY = 0; let isSwiping = false;
        function handleSwipe() {
            const swipeThreshold = 120;
            const swipeDistanceX = touchEndX - touchStartX;
            const swipeDistanceY = Math.abs(touchEndY - touchStartY);
            if (isSwiping && Math.abs(swipeDistanceX) > swipeThreshold && swipeDistanceX > 0 && swipeDistanceY < 50) {
                window.location.href = 'index.html';
            }
        }
        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; isSwiping = true; }, { passive: true });
        document.addEventListener('touchmove', e => {
            const moveY = Math.abs(e.changedTouches[0].screenY - touchStartY);
            const moveX = Math.abs(e.changedTouches[0].screenX - touchStartX);
            if (moveY > 20 || moveX < 30) isSwiping = false;
        }, { passive: true });
        document.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; touchEndY = e.changedTouches[0].screenY; handleSwipe(); isSwiping = false; }, { passive: true });
    </script>
</body>
</html>
