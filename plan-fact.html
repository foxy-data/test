<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План-Факт</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface2: #f7f8fa;
            --border: #e4e7ed;
            --text: #111827;
            --text2: #6b7280;
            --text3: #9ca3af;

            --to:    #2563eb;
            --to-bg: rgba(37,99,235,0.09);
            --serv:  #16a34a;
            --serv-bg: rgba(22,163,74,0.09);
            --acc:   #d97706;
            --acc-bg: rgba(217,119,6,0.09);
            --chk:   #7c3aed;
            --chk-bg: rgba(124,58,237,0.09);

            --plan-bg: rgba(107,114,128,0.09);
            --plan-text: #6b7280;

            --radius: 14px;
            --shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 10px 10px 32px;
        }

        /* ── ANIMATIONS ── */
        @keyframes shimmer {
            0%   { background-position: -600px 0 }
            100% { background-position:  600px 0 }
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(12px) }
            to   { opacity:1; transform:translateY(0) }
        }
        @keyframes barGrow {
            from { width: 0 }
        }

        /* ── TOP BAR ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--to);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            padding: 5px 10px 5px 6px;
            border-radius: 8px;
            transition: background .15s;
        }
        .back-link:hover { background: var(--to-bg); }
        .back-link svg { flex-shrink:0; }

        .page-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -.3px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── VIEW TOGGLE ── */
        .view-toggle {
            display: flex;
            gap: 3px;
            background: var(--border);
            border-radius: 11px;
            padding: 3px;
        }
        .view-btn {
            border: none;
            background: transparent;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            color: var(--text2);
            font-family: inherit;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .view-btn.active {
            background: var(--surface);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0,0,0,.12);
        }

        /* ── SKELETON ── */
        .skel {
            background: linear-gradient(90deg, #e8eaed 25%, #f3f4f6 50%, #e8eaed 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s ease-in-out infinite;
            border-radius: 6px;
        }

        /* ── TABLE CARD ── */
        .table-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }

        table { border-collapse: collapse; table-layout: fixed; }

        /* Group headers */
        .group-header {
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .07em;
            padding: 8px 4px 6px;
            border-bottom: 2px solid currentColor;
            background: var(--surface);
            white-space: nowrap;
        }
        .g-to     { color: var(--to);   }
        .g-serv   { color: var(--serv); }
        .g-acc    { color: var(--acc);  }
        .g-checks { color: var(--chk);  }

        /* Column headers */
        th {
            text-align: center;
            padding: 6px 3px 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .04em;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        thead tr:first-child th {
            top: 0;
            z-index: 11;
        }
        /* second header row sits just below the first */
        thead tr:nth-child(2) th {
            z-index: 10;
        }
        th.name-th {
            position: sticky; left: 0; z-index: 101;
            background: var(--surface2);
            box-shadow: 3px 0 8px -2px rgba(0,0,0,.08);
            border-right: 1px solid var(--border);
        }

        /* Data cells */
        td {
            padding: 6px 3px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .name-cell {
            position: sticky; left: 0;
            background: var(--surface);
            z-index: 100;
            font-weight: 600;
            font-size: 9.5px;
            white-space: normal;
            line-height: 1.25;
            word-break: keep-all;
            overflow-wrap: break-word;
            text-align: left;
            box-shadow: 3px 0 8px -2px rgba(0,0,0,.08);
            border-right: 1px solid var(--border);
            padding: 7px 8px;
        }

        .grp-start { border-left: 1px solid var(--border) !important; }

        /* Badges */
        .badge {
            display: inline-block;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            padding: 3px 6px;
            white-space: nowrap;
            line-height: 1.3;
        }
        .b-plan   { background: var(--plan-bg); color: var(--plan-text); }
        .b-to     { background: var(--to-bg);   color: var(--to); }
        .b-serv   { background: var(--serv-bg); color: var(--serv); }
        .b-acc    { background: var(--acc-bg);  color: var(--acc); }
        .b-checks { background: var(--chk-bg);  color: var(--chk); }

        /* Special rows */
        .total-row td {
            background: rgba(37,99,235,.06) !important;
            font-weight: 800;
        }
        .total-row td.name-cell { background: rgba(37,99,235,.06) !important; }
        .dev-row td {
            font-style: italic;
            color: var(--text3) !important;
            font-size: 10px;
        }
        .dev-row td.name-cell { color: var(--text3) !important; }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--surface2) !important; }
        tbody tr:hover td.name-cell { background: var(--surface2) !important; }

        .loading { padding: 48px; text-align: center; color: var(--text3); font-size: 14px; }
        .error   { padding: 48px; text-align: center; color: #ef4444; font-size: 14px; }

        /* ── RATING PANEL ── */
        .rating-panel { display: none; margin-top: 0; }
        .rating-panel.visible { display: block; }

        /* Metric selector */
        .metric-section {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 10px;
            overflow: hidden;
        }
        .metric-section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--text3);
            padding: 8px 14px 0;
        }
        .metric-pills {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            padding: 7px 10px 10px;
        }
        .mpill {
            border: 1.5px solid transparent;
            background: var(--surface2);
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            color: var(--text2);
            transition: all .15s;
            white-space: nowrap;
        }
        .mpill:hover { background: var(--border); color: var(--text); }
        .mpill.active { color: white; border-color: transparent; }

        /* ── VIEW SWITCHER ── */
        .view-switcher {
            display: flex; gap: 4px;
            background: var(--surface2); border-radius: 12px; padding: 3px;
            margin-bottom: 12px; border: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .vs-btn {
            flex: 1; min-width: 60px; padding: 7px 8px; border: none; border-radius: 9px;
            background: transparent; font-family: inherit; font-size: 11px;
            font-weight: 600; cursor: pointer; color: var(--text2);
            transition: all .18s; display: flex; align-items: center;
            justify-content: center; gap: 4px; white-space: nowrap;
        }
        .vs-btn.on { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.12); }

        /* ── STORE BANNER ── */
        .store-banner {
            background: var(--surface); border-radius: var(--radius);
            border: 1px solid var(--border); box-shadow: var(--shadow);
            padding: 12px 16px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
            border-left: 4px solid var(--to);
        }
        .store-banner-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); flex: 0 0 auto; }
        .store-stats { display: flex; gap: 18px; flex: 1; flex-wrap: wrap; align-items: center; }
        .store-stat { display: flex; flex-direction: column; align-items: center; min-width: 64px; }
        .store-stat-label { font-size: 9px; color: var(--text3); font-weight: 600; text-transform: uppercase; }
        .store-stat-val { font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.2; }
        .store-stat-pct { font-size: 17px; font-weight: 800; line-height: 1.2; }

        /* Rank cards — base */
        .ranking-grid { display: flex; flex-direction: column; gap: 8px; }

        .rank-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 12px 14px;
            display: flex; flex-direction: column; gap: 7px;
            position: relative; overflow: hidden;
            transition: transform .15s, box-shadow .15s;
            animation: fadeUp .3s ease both;
        }
        .rank-card:hover { transform: translateY(-2px); box-shadow: 0 4px 24px rgba(0,0,0,.1); }

        /* Gold */
        .rank-card.podium-1 {
            border-color: rgba(245,158,11,.45);
            background: linear-gradient(135deg, #fffbeb 0%, #ffffff 60%);
            box-shadow: 0 2px 12px rgba(245,158,11,.18), 0 1px 4px rgba(0,0,0,.06);
            padding: 14px 16px;
        }
        .rank-card.podium-1 .rank-name-text { font-size: 15px; }
        .rank-card.podium-1 .rank-val-main  { font-size: 18px; }
        /* Silver */
        .rank-card.podium-2 {
            border-color: rgba(156,163,175,.5);
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 60%);
            box-shadow: 0 2px 10px rgba(0,0,0,.09); padding: 13px 15px;
        }
        .rank-card.podium-2 .rank-name-text { font-size: 14px; }
        .rank-card.podium-2 .rank-val-main  { font-size: 16px; }
        /* Bronze */
        .rank-card.podium-3 {
            border-color: rgba(180,120,60,.35);
            background: linear-gradient(135deg, #fdf8f3 0%, #ffffff 60%);
            box-shadow: 0 2px 8px rgba(180,120,60,.14); padding: 13px 15px;
        }
        .rank-card.podium-3 .rank-name-text { font-size: 14px; }
        .rank-card.podium-3 .rank-val-main  { font-size: 16px; }

        .podium-crown {
            font-size: 9px; font-weight: 800; opacity: .4;
            letter-spacing: .06em; text-transform: uppercase;
            text-align: right; color: var(--text3);
            margin-left: 45px; margin-top: -2px;
        }
        .podium-1 .podium-crown { color: #b45309; }
        .podium-2 .podium-crown { color: #6b7280; }
        .podium-3 .podium-crown { color: #92400e; }

        .rank-bg {
            position: absolute; left: 0; top: 0;
            height: 100%; opacity: .05;
            border-radius: var(--radius); pointer-events: none; transition: width .6s ease;
        }
        .podium-1 .rank-bg { opacity: .08; }

        .rank-top { display: flex; align-items: center; gap: 11px; }

        .rank-pos {
            font-size: 22px; min-width: 34px; text-align: center; line-height: 1; flex-shrink: 0;
        }
        .rank-pos.rest {
            font-size: 13px; font-weight: 800; color: var(--text3);
            background: var(--surface2); border-radius: 7px;
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
        }

        .rank-name { flex: 1; min-width: 0; }
        .rank-name-text { font-size: 13px; font-weight: 700; white-space: normal; word-break: break-word; line-height: 1.3; color: var(--text); }
        .rank-sub { font-size: 11px; color: var(--text2); margin-top: 3px; display: flex; align-items: center; gap: 5px; }

        .pct-pill { display: inline-block; border-radius: 20px; padding: 1px 8px; font-size: 11px; font-weight: 700; }
        .pct-pill.good { background: rgba(22,163,74,.12); color: #16a34a; }
        .pct-pill.warn { background: rgba(245,158,11,.12); color: #d97706; }
        .pct-pill.bad  { background: rgba(239,68,68,.12);  color: #dc2626; }

        .rank-val { text-align: right; flex-shrink: 0; }
        .rank-val-main { font-size: 15px; font-weight: 800; line-height: 1.1; }
        .rank-val-sub { font-size: 10.5px; color: var(--text3); margin-top: 2px;
        }

        .rank-bar-bg {
            height: 5px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-left: 45px;
        }
        .podium-1 .rank-bar-bg { height: 6px; }
        .rank-bar-fill {
            height: 100%;
            border-radius: 4px;
            animation: barGrow .6s ease both;
        }

        /* ── PODIUM WRAP ── */
        .podium-wrap { display: grid; grid-template-columns: 1fr 1.12fr 1fr; gap: 6px; align-items: end; height: 140px; margin-bottom: 12px; }
        .pod {
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; border-radius: 12px 12px 0 0;
            padding: 10px 6px 10px; cursor: pointer; position: relative;
            transition: transform .2s, box-shadow .2s; user-select: none;
        }
        .pod:hover { transform: translateY(-4px); }
        .pod-1 { background: linear-gradient(170deg,#fffbeb,#fde68a); border: 2px solid #f59e0b; height: 100%; box-shadow: 0 4px 18px rgba(245,158,11,.25); }
        .pod-2 { background: linear-gradient(170deg,#f8fafc,#e2e8f0); border: 2px solid #94a3b8; height: 80%; box-shadow: 0 3px 12px rgba(148,163,184,.2); }
        .pod-3 { background: linear-gradient(170deg,#fff7ed,#fed7aa); border: 2px solid #f97316; height: 64%; box-shadow: 0 3px 12px rgba(249,115,22,.2); }
        .pod-medal { font-size: 22px; margin-bottom: 5px; }
        .pod-name { font-size: 10px; font-weight: 700; text-align: center; line-height: 1.25; color: #1e293b; max-width: 100%; }
        .pod-val { font-size: 10px; font-weight: 800; color: #0f172a; margin-top: 3px; text-align: center; }
        .pod-pct { font-size: 9px; font-weight: 700; margin-top: 2px; }
        .pod-1 .pod-pct { color: #b45309; }
        .pod-2 .pod-pct { color: #64748b; }
        .pod-3 .pod-pct { color: #9a3412; }

        /* ── HBAR LIST ── */
        .hbar-list { display: flex; flex-direction: column; gap: 5px; }
        .hbar { display: flex; align-items: center; gap: 8px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); padding: 8px 12px; animation: fadeUp .25s ease both; }
        .hbar-pos { font-size: 12px; font-weight: 800; color: var(--text3); width: 22px; text-align: center; flex-shrink: 0; }
        .hbar-name { flex: 1; font-size: 12px; font-weight: 600; color: var(--text); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hbar-track { flex: 2; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
        .hbar-fill { height: 100%; border-radius: 4px; animation: barGrow .7s ease both; }
        .hbar-val { font-size: 12px; font-weight: 800; text-align: right; flex-shrink: 0; min-width: 60px; }
        .hbar-pct { font-size: 10px; color: var(--text3); text-align: right; }

        /* ── LEADERBOARD ── */
        .leader-card {
            background: var(--surface); border-radius: var(--radius);
            border: 1px solid var(--border); box-shadow: var(--shadow);
            padding: 12px 14px; display: flex; align-items: center; gap: 12px;
            animation: fadeUp .25s ease both;
        }
        .leader-card.l-gold   { border-color: rgba(245,158,11,.5); background: linear-gradient(90deg,#fffbeb,#fff); }
        .leader-card.l-silver { border-color: rgba(148,163,184,.5); background: linear-gradient(90deg,#f8fafc,#fff); }
        .leader-card.l-bronze { border-color: rgba(249,115,22,.35); background: linear-gradient(90deg,#fff7ed,#fff); }
        .leader-badge { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .l-gold   .leader-badge { background: linear-gradient(135deg,#fef3c7,#fde68a); box-shadow: 0 2px 8px rgba(245,158,11,.3); }
        .l-silver .leader-badge { background: linear-gradient(135deg,#f1f5f9,#e2e8f0); box-shadow: 0 2px 6px rgba(148,163,184,.25); }
        .l-bronze .leader-badge { background: linear-gradient(135deg,#fff7ed,#fed7aa); box-shadow: 0 2px 6px rgba(249,115,22,.25); }
        .leader-rest-badge { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--text3); background: var(--surface2); flex-shrink: 0; }
        .leader-info { flex: 1; min-width: 0; }
        .leader-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .leader-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
        .leader-val { text-align: right; flex-shrink: 0; }
        .leader-val-main { font-size: 16px; font-weight: 800; }
        .leader-val-plan { font-size: 10px; color: var(--text3); margin-top: 2px; }

        /* ── GAUGE / CYBER ── */
        .gauge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .cyber-card {
            background: #0f1420; border-radius: 14px; border: 1px solid #1e2a45;
            padding: 12px 10px 10px; display: flex; flex-direction: column;
            align-items: center; gap: 6px; cursor: pointer; position: relative;
            overflow: hidden; transition: transform .2s, box-shadow .2s;
            animation: fadeUp .3s ease both;
        }
        .cyber-card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,.4); }
        .cyber-name { font-size: 11px; font-weight: 700; color: #e0e6f0; text-align: center; line-height: 1.3; }
        .cyber-val { font-size: 12px; font-weight: 900; text-align: center; }

        /* Skeleton cards */
        .rank-card-skel {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        .rank-card-skel-top { display:flex; align-items:center; gap:12px; }
        .rank-card-skel-pos  { width:28px; height:28px; border-radius:8px; flex-shrink:0; }
        .rank-card-skel-body { flex:1; display:flex; flex-direction:column; gap:7px; }
        .rank-card-skel-line { height:13px; border-radius:6px; }
        .rank-card-skel-sub  { height:9px; width:45%; border-radius:5px; }
        .rank-card-skel-val  { width:54px; height:18px; border-radius:8px; flex-shrink:0; }
        .rank-card-skel-bar  { height:4px; border-radius:3px; }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Назад
    </a>
    <span class="page-title">План–Факт</span>
    <div class="view-toggle">
        <button class="view-btn active" id="btnTable" onclick="setView('table')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <rect x="1" y="1" width="4" height="4" rx="1" fill="currentColor" opacity=".5"/>
                <rect x="7" y="1" width="5" height="4" rx="1" fill="currentColor"/>
                <rect x="1" y="7" width="4" height="5" rx="1" fill="currentColor"/>
                <rect x="7" y="7" width="5" height="5" rx="1" fill="currentColor" opacity=".5"/>
            </svg>
            Таблиця
        </button>
        <button class="view-btn" id="btnRating" onclick="setView('rating')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M6.5 1L8 5H12L8.8 7.5L10 11.5L6.5 9L3 11.5L4.2 7.5L1 5H5L6.5 1Z" fill="currentColor"/>
            </svg>
            Рейтинг
        </button>
    </div>
</div>

<div id="tableWrap">
    <div class="table-card">
        <div class="table-scroll">
        <div id="loader" class="loading">Завантаження…</div>
        <table id="tbl" style="display:none">
            <thead>
                <tr id="tr-groups"></tr>
                <tr id="tr-heads"></tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
        </div>
    </div>
</div>

<div class="rating-panel" id="ratingPanel">
    <div class="metric-section">
        <div class="metric-section-label">Метрика</div>
        <div class="metric-pills" id="metricPills"></div>
    </div>
    <div id="storeBanner"></div>
    <div class="view-switcher" id="viewSwitcher">
        <button class="vs-btn on" id="vsBtnPodium" onclick="setRatingView('podium')">🏆 Подіум</button>
        <button class="vs-btn" id="vsBtnLeader" onclick="setRatingView('leader')">👑 Лідер</button>
        <button class="vs-btn" id="vsBtnBar" onclick="setRatingView('bar')">📊 Бари</button>
        <button class="vs-btn" id="vsBtnGauge" onclick="setRatingView('gauge')">🎯 Gauge</button>
    </div>
    <div id="rankingGrid"></div>
</div>

<script>
// ======= CONFIG =======
const GROUPS = [
    { name:'Товарообіг', cls:'g-to', cols:[
        { label:'План',  idx:1,  type:'plan',  b:'b-plan' },
        { label:'Факт',  idx:2,  type:'fact',  b:'b-to'   },
        { label:'%',     idx:3,  type:'pct'                },
    ]},
    { name:'Послуги', cls:'g-serv', cols:[
        { label:'План',  idx:4,  type:'plan',  b:'b-plan' },
        { label:'Факт',  idx:5,  type:'fact',  b:'b-serv' },
        { label:'Доля',  idx:6,  type:'share', b:'b-serv' },
        { label:'%',     idx:7,  type:'pct'                },
    ]},
    { name:'Аксесуари', cls:'g-acc', cols:[
        { label:'План',  idx:8,  type:'plan',  b:'b-plan' },
        { label:'Факт',  idx:9,  type:'fact',  b:'b-acc'  },
        { label:'Доля',  idx:10, type:'share', b:'b-acc'  },
        { label:'%',     idx:11, type:'pct'                },
    ]},
    { name:'Чеки', cls:'g-checks', cols:[
        { label:'План',  idx:12, type:'plan',  b:'b-plan'   },
        { label:'Факт',  idx:13, type:'fact',  b:'b-checks' },
        { label:'%',     idx:14, type:'pct'                  },
    ]},
];

// ======= HELPERS =======
function parseCSV(text) {
    const rows = []; let row = [], col = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (c==='"' && text[i+1]==='"') { col+='"'; i++; }
        else if (c==='"') inQ=!inQ;
        else if (c===',' && !inQ) { row.push(col); col=''; }
        else if (c==='\n' && !inQ) { row.push(col); rows.push(row); row=[]; col=''; }
        else col+=c;
    }
    if (col||row.length) { row.push(col); rows.push(row); }
    return rows;
}
function toNum(v) {
    return parseFloat((v||'').toString().replace('%','').replace(/\s/g,'').replace(',','.')) || 0;
}
function fmtInt(v)   { const n=toNum(v); return n ? Math.round(n).toLocaleString('uk-UA') : (v||'0'); }
function fmtShare(v) { return toNum(v).toFixed(2); }
function fmtPct(v) {
    let n=toNum(v);
    if (!(v||'').toString().includes('%')&&n>0&&n<2) n*=100;
    return n.toFixed(1)+'%';
}
function pctNum(v) {
    let n=toNum(v);
    if (!(v||'').toString().includes('%')&&n>0&&n<2) n*=100;
    return n;
}

// ======= WIDTHS =======
function getWidths() {
    const mob = window.innerWidth < 768;
    if (!mob) return { name:110, c3:82, c4:78 };
    const nameW = 82;
    const avail = window.innerWidth - nameW - 1;
    return { name:nameW, c3:Math.floor(avail/3), c4:Math.floor(avail/4) };
}

// ======= BUILD TABLE =======
function buildTable(dataRows) {
    const W = getWidths();
    const tbl = document.getElementById('tbl');
    tbl.style.display = '';
    const totalW = W.name + 3*W.c3 + 4*W.c4 + 4*W.c4 + 3*W.c4;
    tbl.style.width = totalW + 'px';

    const cg = document.createElement('colgroup');
    function addCol(w) {
        const c = document.createElement('col');
        c.style.width = w+'px';
        cg.appendChild(c);
    }
    addCol(W.name);
    GROUPS.forEach(g => {
        const cw = g.cols.length===3 ? W.c3 : W.c4;
        g.cols.forEach(() => addCol(cw));
    });
    tbl.prepend(cg);

    const trG = document.getElementById('tr-groups');
    const corner = document.createElement('th');
    corner.rowSpan = 2;
    corner.className = 'name-th';
    corner.style.width = W.name+'px';
    corner.textContent = 'ПК';
    trG.appendChild(corner);

    GROUPS.forEach(g => {
        const th = document.createElement('th');
        th.colSpan = g.cols.length;
        th.className = 'group-header ' + g.cls + ' grp-start';
        th.textContent = g.name;
        trG.appendChild(th);
    });

    const trH = document.getElementById('tr-heads');
    GROUPS.forEach(g => {
        g.cols.forEach((col, ci) => {
            const th = document.createElement('th');
            th.className = g.cls + (ci===0?' grp-start':'');
            th.textContent = col.label;
            trH.appendChild(th);
        });
    });

    const pctSpans = GROUPS.map(() => []);
    const tbody = document.getElementById('tbody');

    dataRows.forEach(row => {
        if (!row[0]||!row[0].trim()) return;
        const name = row[0].trim();
        const nl = name.toLowerCase();
        const isTotal = ['разом','сума','total','тотал','підсумок','всього','итого'].some(k=>nl.includes(k));
        const isDev   = nl.includes('відставання')||nl.includes('відхилення');

        const tr = document.createElement('tr');
        if (isTotal) tr.className = 'total-row';
        if (isDev)   tr.className = 'dev-row';

        const nc = document.createElement('td');
        nc.className = 'name-cell';
        nc.style.width = W.name+'px';
        nc.textContent = name;
        tr.appendChild(nc);

        GROUPS.forEach((g, gi) => {
            const cw = g.cols.length===3 ? W.c3 : W.c4;
            g.cols.forEach((col, ci) => {
                const val = (row[col.idx]||'').trim();
                const td = document.createElement('td');
                td.style.width = cw+'px';
                if (ci===0) td.classList.add('grp-start');

                if (isDev) {
                    td.textContent = val;
                } else if (col.type==='plan') {
                    td.innerHTML = `<span class="badge b-plan">${fmtInt(val)}</span>`;
                } else if (col.type==='share') {
                    td.innerHTML = `<span class="badge ${col.b}">${fmtShare(val)}</span>`;
                } else if (col.type==='fact') {
                    td.innerHTML = `<span class="badge ${col.b}">${fmtInt(val)}</span>`;
                } else if (col.type==='pct') {
                    const span = document.createElement('span');
                    span.className = 'badge b-plan';
                    span.textContent = fmtPct(val);
                    span.dataset.pct = pctNum(val);
                    td.appendChild(span);
                    if (!isTotal) pctSpans[gi].push(span);
                }
                tr.appendChild(td);
            });
        });
        tbody.appendChild(tr);
    });

    // Dynamic % coloring (heatmap)
    pctSpans.forEach(spans => {
        if (!spans.length) return;
        const vals = spans.map(s => +s.dataset.pct);
        const min = Math.min(...vals), max = Math.max(...vals), range = max-min||1;
        spans.forEach(s => {
            const ratio = (+s.dataset.pct - min) / range;
            const h = Math.round(ratio*120);
            s.style.background = `hsl(${h},65%,${Math.round(90-ratio*8)}%)`;
            s.style.color = `hsl(${h},55%,${Math.round(30+ratio*8)}%)`;
        });
    });
    tbody.querySelectorAll('.total-row .badge[data-pct]').forEach(s => {
        const n = +s.dataset.pct;
        s.style.background = n>=100 ? 'rgba(22,163,74,.18)' : n>=80 ? 'rgba(245,158,11,.15)' : 'rgba(239,68,68,.13)';
        s.style.color = n>=100 ? '#16a34a' : n>=80 ? '#d97706' : '#dc2626';
        s.style.fontWeight = '800';
    });

    // Scroll snap
    // Fix sticky top offsets for 2-row thead
    requestAnimationFrame(() => {
        const trGroups = document.getElementById('tr-groups');
        const trHeads  = document.getElementById('tr-heads');
        const h1 = trGroups.offsetHeight;
        // row 1 — group headers
        Array.from(trGroups.querySelectorAll('th')).forEach(th => {
            th.style.top = '0px';
            th.style.zIndex = th.classList.contains('name-th') ? '201' : '11';
        });
        // row 2 — sub headers
        Array.from(trHeads.querySelectorAll('th')).forEach(th => {
            th.style.top = h1 + 'px';
            th.style.zIndex = '10';
        });
        // name corner is rowspan=2, set top=0 and z higher
        const corner = trGroups.querySelector('.name-th');
        if (corner) { corner.style.top = '0'; corner.style.zIndex = '201'; }
    });

    if (window.innerWidth < 768) {
        const card = document.querySelector('.table-scroll');
        const snaps = [];
        let x = 0;
        GROUPS.forEach(g => {
            snaps.push(x);
            x += (g.cols.length===3 ? W.c3 : W.c4) * g.cols.length;
        });
        let t0x = 0;
        card.addEventListener('touchstart', e => { t0x = e.touches[0].clientX; }, {passive:true});
        card.addEventListener('touchend', e => {
            const dx = t0x - e.changedTouches[0].clientX;
            const cur = card.scrollLeft;
            let best = snaps.reduce((a,b) => Math.abs(b-cur)<Math.abs(a-cur)?b:a, snaps[0]);
            let idx = snaps.indexOf(best);
            if (dx > 40 && idx < snaps.length-1) best = snaps[idx+1];
            if (dx < -40 && idx > 0) best = snaps[idx-1];
            card.scrollTo({ left: best, behavior: 'smooth' });
        }, {passive:true});
    }
}

// ======= RATING =======
const RATING_METRICS = [
    { key:'to_fact',   label:'ТО',           idx:2,  color:'#2563eb', planIdx:1,  pctIdx:3,  fmt:'int' },
    { key:'serv_fact', label:'Послуги',       idx:5,  color:'#16a34a', planIdx:4,  pctIdx:7,  fmt:'int' },
    { key:'acc_fact',  label:'Аксесуари',     idx:9,  color:'#d97706', planIdx:8,  pctIdx:11, fmt:'int' },
    { key:'chk_fact',  label:'Чеки',          idx:13, color:'#7c3aed', planIdx:12, pctIdx:14, fmt:'int' },
    { key:'serv_shr',  label:'Частка посл.',  idx:6,  color:'#16a34a', fmt:'share' },
    { key:'acc_shr',   label:'Частка ACC',    idx:10, color:'#d97706', fmt:'share' },
];
let allRatingRows = [];
let activeMetricKey = 'to_fact';
let activeRatingView = 'podium';

function fmtRatingVal(v, fmt) {
    if (v===null||v===undefined||isNaN(Number(v))) return '—';
    const n = Number(v);
    if (fmt==='share') return n.toFixed(2)+'%';
    if (Math.abs(n)>=1000000) return (n/1000000).toFixed(2)+'М';
    if (Math.abs(n)>=1000) return (n/1000).toFixed(0)+'К';
    return Math.round(n).toLocaleString('uk-UA');
}

function setRatingView(v) {
    activeRatingView = v;
    document.getElementById('vsBtnPodium').classList.toggle('on', v==='podium');
    document.getElementById('vsBtnLeader').classList.toggle('on', v==='leader');
    document.getElementById('vsBtnBar').classList.toggle('on', v==='bar');
    document.getElementById('vsBtnGauge').classList.toggle('on', v==='gauge');
    renderRankingCards();
}

function setView(mode) {
    document.getElementById('btnTable').classList.toggle('active', mode==='table');
    document.getElementById('btnRating').classList.toggle('active', mode==='rating');
    document.getElementById('tableWrap').style.display = mode==='table' ? '' : 'none';
    const rp = document.getElementById('ratingPanel');
    if (mode==='rating') { rp.classList.add('visible'); renderRating(); }
    else rp.classList.remove('visible');
}

function buildMetricPills() {
    const c = document.getElementById('metricPills');
    c.innerHTML = '';
    RATING_METRICS.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'mpill' + (m.key===activeMetricKey?' active':'');
        btn.textContent = m.label;
        if (m.key===activeMetricKey) btn.style.background = m.color;
        btn.onclick = () => { activeMetricKey=m.key; buildMetricPills(); renderRankingCards(); };
        c.appendChild(btn);
    });
}

function renderRankingCards() {
    const m = RATING_METRICS.find(x=>x.key===activeMetricKey)||RATING_METRICS[0];
    const grid = document.getElementById('rankingGrid');
    grid.innerHTML = '';

    const excluded = ['разом','сума','total','тотал','підсумок','всього','итого','відставання','відхилення'];
    const rows = allRatingRows.filter(r => {
        const nl = (r[0]||'').toLowerCase().trim();
        return nl && !excluded.some(k=>nl.includes(k));
    });

    const items = rows.map(r => ({
        name: (r[0]||'').trim(),
        val:  toNum(r[m.idx]||'0'),
        plan: m.planIdx!=null ? toNum(r[m.planIdx]||'0') : null,
        pct:  m.pctIdx!=null  ? toNum(r[m.pctIdx]||'0')  : null,
    })).filter(x=>x.name && x.val>0);
    items.sort((a,b)=>b.val-a.val);
    if (!items.length) {
        grid.innerHTML = '<div style="padding:48px;text-align:center;color:var(--text3);font-size:14px">Немає даних</div>';
        return;
    }

    // ── Store banner ──
    const sumRow = allRatingRows.find(r => {
        const nl=(r[0]||'').toLowerCase().trim();
        return ['разом','сума','total','тотал','підсумок','всього','итого'].some(k=>nl.includes(k));
    });
    const bannerEl = document.getElementById('storeBanner');
    bannerEl.innerHTML = '';
    if (sumRow) {
        const sFact = toNum(sumRow[m.idx]||'0');
        const sPlan = m.planIdx!=null ? toNum(sumRow[m.planIdx]||'0') : null;
        const sPctRaw = m.pctIdx!=null ? toNum(sumRow[m.pctIdx]||'0') : null;
        let sPctNum = sPctRaw;
        if (sPctRaw && sPctRaw > 0 && sPctRaw < 2) sPctNum = sPctRaw * 100;
        const pc = !sPctNum ? '#6b7280' : sPctNum<80 ? '#dc2626' : sPctNum<100 ? '#d97706' : '#16a34a';
        const div = document.createElement('div');
        div.className = 'store-banner';
        div.style.borderLeftColor = m.color;
        div.innerHTML = `
            <div class="store-banner-label">🏪 Магазин</div>
            <div class="store-stats">
                ${sPlan ? `<div class="store-stat"><span class="store-stat-label">План</span><span class="store-stat-val">${fmtRatingVal(sPlan,m.fmt)}</span></div>` : ''}
                <div class="store-stat"><span class="store-stat-label">Факт</span><span class="store-stat-val" style="color:${m.color}">${fmtRatingVal(sFact,m.fmt)}</span></div>
                ${sPctNum ? `<div class="store-stat"><span class="store-stat-label">Виконання</span><span class="store-stat-pct" style="color:${pc}">${sPctNum.toFixed(1)}%</span></div>` : ''}
            </div>`;
        bannerEl.appendChild(div);
    }

    const maxVal = items[0].val;

    const getPctNum = item => {
        if (item.pct==null) return null;
        let n = item.pct;
        if (n > 0 && n < 2) n *= 100;
        return n;
    };
    const getPctStr = item => {
        const n = getPctNum(item);
        return n!=null ? n.toFixed(1)+'%' : null;
    };
    const pctClass = p => !p ? '' : p>=100 ? 'd-hi' : p>=80 ? 'd-mid' : 'd-lo';

    if (activeRatingView === 'podium') {
        renderPodiumView(grid, items, maxVal, m);
    } else if (activeRatingView === 'bar') {
        renderBarView(grid, items, maxVal, m, getPctStr, getPctNum);
    } else if (activeRatingView === 'gauge') {
        renderGaugeView(grid, items, m, getPctStr, getPctNum);
    } else {
        renderLeaderView(grid, items, maxVal, m, getPctStr, getPctNum);
    }
}

function renderPodiumView(grid, items, maxVal, m) {
    const top3 = items.slice(0, 3);
    const rest  = items.slice(3);

    // Podium
    const podWrap = document.createElement('div');
    podWrap.className = 'podium-wrap';
    const ORDER = [1, 0, 2];
    const MEDALS = ['🥇','🥈','🥉'];
    const POD_CLS = ['pod-1','pod-2','pod-3'];
    ORDER.forEach(oi => {
        const item = top3[oi];
        const pod = document.createElement('div');
        pod.className = 'pod ' + (POD_CLS[oi]||'');
        if (!item) { pod.style.opacity='0'; podWrap.appendChild(pod); return; }
        let pctStr = null;
        if (item.pct!=null) { let n=item.pct; if(n>0&&n<2) n*=100; pctStr=n.toFixed(1)+'%'; }
        pod.innerHTML = `
            <div class="pod-medal">${MEDALS[oi]}</div>
            <div class="pod-name">${item.name}</div>
            <div class="pod-val" style="color:${m.color}">${fmtRatingVal(item.val,m.fmt)}</div>
            ${pctStr ? `<div class="pod-pct">${pctStr}</div>` : ''}`;
        podWrap.appendChild(pod);
    });
    grid.appendChild(podWrap);

    // Rest as hbar
    if (rest.length) {
        const list = document.createElement('div');
        list.className = 'hbar-list';
        rest.forEach((item, i) => {
            const barPct = maxVal>0 ? Math.round(item.val/maxVal*100) : 0;
            let pctStr=null; if(item.pct!=null){let n=item.pct; if(n>0&&n<2)n*=100; pctStr=n.toFixed(1)+'%';}
            const hbar = document.createElement('div');
            hbar.className = 'hbar';
            hbar.style.animationDelay = (i*0.04)+'s';
            hbar.innerHTML = `
                <div class="hbar-pos">${i+4}</div>
                <div class="hbar-name">${item.name}</div>
                <div class="hbar-track"><div class="hbar-fill" style="width:${barPct}%;background:${m.color};animation-delay:${i*0.04}s"></div></div>
                <div class="hbar-val"><span style="color:${m.color}">${fmtRatingVal(item.val,m.fmt)}</span>${pctStr?`<div class="hbar-pct">${pctStr}</div>`:''}</div>`;
            list.appendChild(hbar);
        });
        grid.appendChild(list);
    }
}

function renderLeaderView(grid, items, maxVal, m, getPctStr) {
    const LCLS = ['l-gold','l-silver','l-bronze'];
    const MEDALS = ['🥇','🥈','🥉'];
    items.forEach((item, i) => {
        const pos = i+1;
        const card = document.createElement('div');
        card.className = 'leader-card ' + (LCLS[i]||'');
        card.style.animationDelay = (i*0.04)+'s';
        const pctStr = getPctStr(item);
        const pctCls = pctStr ? (parseFloat(pctStr)>=100?'good':parseFloat(pctStr)>=80?'warn':'bad') : '';
        const badgeHTML = pos<=3
            ? `<div class="leader-badge">${MEDALS[i]}</div>`
            : `<div class="leader-rest-badge">${pos}</div>`;
        card.innerHTML = `
            ${badgeHTML}
            <div class="leader-info">
                <div class="leader-name">${item.name}</div>
                ${pctStr ? `<div class="leader-sub">Виконання: <span class="pct-pill ${pctCls}">${pctStr}</span></div>` : ''}
            </div>
            <div class="leader-val">
                <div class="leader-val-main" style="color:${m.color}">${fmtRatingVal(item.val,m.fmt)}</div>
                ${item.plan ? `<div class="leader-val-plan">план: ${fmtRatingVal(item.plan,m.fmt)}</div>` : ''}
            </div>`;
        grid.appendChild(card);
    });
}

function renderBarView(grid, items, maxVal, m, getPctStr, getPctNum) {
    const list = document.createElement('div');
    list.className = 'hbar-list';
    items.forEach((item, i) => {
        const barPct = maxVal>0 ? Math.round(item.val/maxVal*100) : 0;
        const pctStr = getPctStr(item);
        const pctCls = pctStr ? (parseFloat(pctStr)>=100?'good':parseFloat(pctStr)>=80?'warn':'bad') : '';
        const hbar = document.createElement('div');
        hbar.className = 'hbar';
        hbar.style.animationDelay = (i*0.04)+'s';
        hbar.innerHTML = `
            <div class="hbar-pos">${i+1}</div>
            <div class="hbar-name">${item.name}</div>
            <div class="hbar-track"><div class="hbar-fill" style="width:${barPct}%;background:${m.color};animation-delay:${i*0.04}s"></div></div>
            <div class="hbar-val">
                <span style="color:${m.color}">${fmtRatingVal(item.val,m.fmt)}</span>
                ${pctStr ? `<div class="hbar-pct"><span class="pct-pill ${pctCls}">${pctStr}</span></div>` : ''}
            </div>`;
        list.appendChild(hbar);
    });
    grid.appendChild(list);
}

function renderGaugeView(grid, items, m, getPctStr, getPctNum) {
    const gGrid = document.createElement('div');
    gGrid.className = 'gauge-grid';
    items.forEach((item, i) => {
        const pctNum = getPctNum(item);
        const pctStr = pctNum!=null ? pctNum.toFixed(1)+'%' : null;
        const fillColor = !pctNum ? '#4b5563' : pctNum>=100 ? '#22c55e' : pctNum>=80 ? '#f59e0b' : '#ef4444';
        const cx=50, cy=62, r=38;
        const startA = -Math.PI*0.75, endA = Math.PI*0.75;
        const clamp = pctNum!=null ? Math.min(Math.max(pctNum/100,0),1) : 0;
        const fillEnd = startA + (endA-startA)*clamp;
        const toXY = (a,rr) => [cx+rr*Math.cos(a), cy+rr*Math.sin(a)];
        const [tx,ty] = toXY(startA,r), [te,tf] = toXY(endA,r);
        const trackPath = `M${tx.toFixed(1)},${ty.toFixed(1)} A${r},${r} 0 1 1 ${te.toFixed(1)},${tf.toFixed(1)}`;
        let fillPath = null;
        if (clamp > 0) {
            const [fx,fy] = toXY(startA,r), [fe,ff] = toXY(fillEnd,r);
            const la = (fillEnd-startA) > Math.PI ? 1 : 0;
            fillPath = `M${fx.toFixed(1)},${fy.toFixed(1)} A${r},${r} 0 ${la} 1 ${fe.toFixed(1)},${ff.toFixed(1)}`;
        }
        const isTop = i===0;
        const card = document.createElement('div');
        card.className = 'cyber-card';
        card.style.animationDelay = (i*0.05)+'s';
        if (isTop) card.style.boxShadow = `0 0 18px ${fillColor}55`;
        card.innerHTML = `
            <svg viewBox="0 0 100 80" width="100%" style="display:block">
                <path d="${trackPath}" fill="none" stroke="#1e2330" stroke-width="9" stroke-linecap="round"/>
                ${fillPath ? `<path d="${fillPath}" fill="none" stroke="${fillColor}" stroke-width="9" stroke-linecap="round"/>` : ''}
                <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="9" font-weight="900" fill="${fillColor}" font-family="monospace">${pctStr||'—'}</text>
                <text x="${cx}" y="${cy+7}" text-anchor="middle" font-size="6" font-weight="700" fill="#6e7a99" font-family="monospace">ПЛАН</text>
            </svg>
            <div class="cyber-name">${item.name}</div>
            <div class="cyber-val" style="color:${fillColor}">${fmtRatingVal(item.val,m.fmt)}</div>`;
        gGrid.appendChild(card);
    });
    grid.appendChild(gGrid);
}

function showRatingSkeleton(grid, count=7) {
    grid.innerHTML = '';
    for (let i=0; i<count; i++) {
        const d = (i*0.06)+'s';
        const card = document.createElement('div');
        card.className = 'rank-card-skel';
        card.innerHTML = `
            <div class="rank-card-skel-top">
                <div class="rank-card-skel-pos skel" style="animation-delay:${d}"></div>
                <div class="rank-card-skel-body">
                    <div class="rank-card-skel-line skel" style="width:${55+(i*7)%36}%;animation-delay:${d}"></div>
                    <div class="rank-card-skel-sub skel" style="animation-delay:${d}"></div>
                </div>
                <div class="rank-card-skel-val skel" style="animation-delay:${d}"></div>
            </div>
            <div class="rank-card-skel-bar skel" style="animation-delay:${d}"></div>`;
        grid.appendChild(card);
    }
}

function renderRating() {
    const grid = document.getElementById('rankingGrid');
    showRatingSkeleton(grid, 7);
    buildMetricPills();
    setTimeout(() => { grid.innerHTML=''; renderRankingCards(); }, 200);
}

async function load() {
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOUXHhUpCkh6tgvNpJzY-w5tVrhPkvEeC0W0ZWuy2YxPayuO3pvahfeKYmMZ1DwHnILTpsJFNtXLsH/pub?output=csv";
    try {
        const res = await fetch(URL + '&t=' + Date.now());
        const rows = parseCSV(await res.text()).slice(1);
        allRatingRows = rows;
        document.getElementById('loader').style.display = 'none';
        buildTable(rows);
    } catch(e) {
        const el = document.getElementById('loader');
        el.className = 'error';
        el.textContent = '❌ ' + e.message;
    }
}
load();

// Swipe back
let x0=0, y0=0, sw=false;
document.addEventListener('touchstart', e=>{ x0=e.changedTouches[0].screenX; y0=e.changedTouches[0].screenY; sw=true; }, {passive:true});
document.addEventListener('touchmove',  e=>{ if(Math.abs(e.changedTouches[0].screenY-y0)>25) sw=false; }, {passive:true});
document.addEventListener('touchend',   e=>{
    if(sw && e.changedTouches[0].screenX-x0 > 120 && Math.abs(e.changedTouches[0].screenY-y0)<50)
        window.location.href='index.html';
    sw=false;
}, {passive:true});
</script>
