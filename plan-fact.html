<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детальний План-Факт — Apple Style</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; --success: #34c759; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 100%; margin: 20px auto; padding: 0 10px; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.5px; }
        
        .table-card { 
            background: white; 
            border-radius: 22px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; min-width: 1600px; } /* Широка таблиця */
        
        /* Заголовки груп */
        .group-header {
            background: #fbfbfd;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #d2d2d7;
            padding: 8px;
            color: #86868b;
        }

        th { text-align: left; padding: 12px 16px; color: #1d1d1f; font-size: 11px; font-weight: 600; border-bottom: 1px solid #d2d2d7; background: white; }
        td { padding: 14px 16px; border-bottom: 1px solid #f5f5f7; font-size: 13px; white-space: nowrap; }
        
        /* Фіксована колонка з ім'ям */
        .name-cell, th:first-child { 
            position: sticky; 
            left: 0; 
            background: white; 
            z-index: 10; 
            min-width: 160px; 
            box-shadow: 4px 0 8px -4px rgba(0,0,0,0.1);
            font-weight: 600;
        }
        th:first-child { z-index: 11; }

        /* Стилізація показників */
        .val-plan { color: #86868b; }
        .val-fact { color: var(--text); font-weight: 600; }
        .val-pct { font-weight: 700; color: #ff9500; }
        
        /* Розділювачі груп */
        .border-left { border-left: 1px solid #f5f5f7; }
        .bg-group-1 { background-color: rgba(0, 113, 227, 0.02); } /* ТО */
        .bg-group-2 { background-color: rgba(52, 199, 89, 0.02); }  /* Послуги */
        
        .total-row { background: #f5f5f7 !important; font-weight: 800 !important; }
        .total-row td { color: #000; border-top: 2px solid #d2d2d7; }

        .loading { padding: 40px; text-align: center; color: #86868b; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Назад</a>
        <h1>Аналітика План-Факт</h1>
        
        <div class="table-card">
            <div id="loader" class="loading">Завантаження даних...</div>
            <table id="dataTable" style="display: none;">
                <thead>
                    <tr>
                        <th rowspan="2">ПІБ</th>
                        <th colspan="3" class="group-header">Товарообіг (ТО)</th>
                        <th colspan="3" class="group-header border-left">Послуги</th>
                        <th colspan="3" class="group-header border-left">Аксесуари (АСС)</th>
                        <th colspan="3" class="group-header border-left">Чеки</th>
                    </tr>
                    <tr>
                        <th>План</th><th>Факт</th><th>%</th>
                        <th class="border-left">План</th><th>Факт</th><th>%</th>
                        <th class="border-left">План</th><th>Факт</th><th>%</th>
                        <th class="border-left">План</th><th>Факт</th><th>%</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function formatNum(val) {
            let n = parseFloat(val.toString().replace(/\s/g, '').replace(',', '.'));
            return isNaN(n) ? 0 : n;
        }

        function displayNum(val, isQty = false) {
            if (isQty) return Math.round(val).toLocaleString('uk-UA');
            return Math.round(val).toLocaleString('uk-UA');
        }

        async function loadTable() {
            const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOUXHhUpCkh6tgvNpJzY-w5tVrhPkvEeC0W0ZWuy2YxPayuO3pvahfeKYmMZ1DwHnILTpsJFNtXLsH/pub?output=csv";
            
            try {
                const response = await fetch(SHEET_URL + '&t=' + Date.now());
                const csvText = await response.text();
                const rows = csvText.split('\n').map(row => row.split(','));
                const dataRows = rows.slice(1);

                document.getElementById('loader').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';
                const tbody = document.getElementById('tableBody');

                dataRows.forEach(row => {
                    if (row.length < 10 || !row[0].trim()) return;

                    const tr = document.createElement('tr');
                    if (row[0].toLowerCase().includes('разом') || row[0].toLowerCase().includes('сума')) {
                        tr.className = 'total-row';
                    }

                    // row[0] - ПІБ
                    // ТО: 1-План, 2-Факт, 3-%
                    // Послуги: 4-План, 5-Факт, 6-%
                    // АСС: 7-План, 8-Факт, 9-%
                    // Чеки: 10-План, 11-Факт, 12-%

                    tr.innerHTML = `
                        <td class="name-cell">${row[0]}</td>
                        
                        <td class="val-plan bg-group-1">${displayNum(formatNum(row[1]))}</td>
                        <td class="val-fact bg-group-1">${displayNum(formatNum(row[2]))}</td>
                        <td class="val-pct bg-group-1">${row[3]}</td>
                        
                        <td class="val-plan border-left bg-group-2">${displayNum(formatNum(row[4]))}</td>
                        <td class="val-fact bg-group-2">${displayNum(formatNum(row[5]))}</td>
                        <td class="val-pct bg-group-2">${row[6]}</td>
                        
                        <td class="val-plan border-left">${displayNum(formatNum(row[7]))}</td>
                        <td class="val-fact">${displayNum(formatNum(row[8]))}</td>
                        <td class="val-pct">${row[9]}</td>
                        
                        <td class="val-plan border-left">${displayNum(formatNum(row[10]))}</td>
                        <td class="val-fact">${displayNum(formatNum(row[11]))}</td>
                        <td class="val-pct">${row[12]}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('loader').textContent = "Помилка завантаження даних";
            }
        }
        
        loadTable();
    </script>
</body>
</html>
