<body>

<script>
// -
// КОНСТАНТИ
// -
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnVyY9d_BjUGvXWa3VUFsdMoBwZH-MINuS8b91-lgNqeNMx-6UsE5oRJ66x6XVmK_JhXcGTbSK9Emx/pub?output=csv';
const MONTHS_UK = ['\u0421\u0456\u0447\u0435\u043d\u044c','\u041b\u044e\u0442\u0438\u0439','\u0411\u0435\u0440\u0435\u0437\u0435\u043d\u044c','\u041a\u0432\u0456\u0442\u0435\u043d\u044c','\u0422\u0440\u0430\u0432\u0435\u043d\u044c','\u0427\u0435\u0440\u0432\u0435\u043d\u044c','\u041b\u0438\u043f\u0435\u043d\u044c','\u0421\u0435\u0440\u043f\u0435\u043d\u044c','\u0412\u0435\u0440\u0435\u0441\u0435\u043d\u044c','\u0416\u043e\u0432\u0442\u0435\u043d\u044c','\u041b\u0438\u0441\u0442\u043e\u043f\u0430\u0434','\u0413\u0440\u0443\u0434\u0435\u043d\u044c'];
const DOW_WE = ["\u043f\u0442","\u0441\u0431","\u043d\u0434","\u0441\u0443\u0431\u043e\u0442\u0430","\u043d\u0435\u0434\u0456\u043b\u044f","friday","saturday","sunday","\u043f\u044f\u0442\u043d\u0438\u0446\u044f"];
const STORE_HDR = ['#1a56db','#0e7490','#6b21a8','#9d174d','#065f46','#92400e','#1e40af','#7c3aed'];
const STORE_BG = ['#eff6ff','#ecfeff','#faf5ff','#fdf2f8','#ecfdf5','#fffbeb','#eff6ff','#f5f3ff'];
// -
// СТАН
// -
let stores = [], dataRows = [], allYearMonths = [], allWeeks = [];
let selYearMonths = new Set(), selStores = new Set(), selWeeks = new Set();
let selSegments = new Set(['wd','we']);
let activeTab = 'table', chartInstance = null;
let selChartMode = 'store', selChartStore = '', selChartPeriod = 'day', selChartMetric = 'delta';
let showDiffYday = true;   // відхилення від вчора
let showDiffWeek = true;   // відхилення від попереднього тижня

// ── Поточна дата ──
const _today = new Date();
const TODAY_STR = String(_today.getDate()).padStart(2,'0') + '.' + String(_today.getMonth()+1).padStart(2,'0');
const CURRENT_WEEK = getCurrentWeekNum();
const CURRENT_MONTH = _today.getMonth() + 1;
const CURRENT_YEAR = _today.getFullYear();

function getCurrentWeekNum() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// ── Збереження скролу при ре-рендері ──
let _savedScrollTop = null;
let _savedAnchorDate = null;  // дата рядка що був у viewport

function saveScrollAnchor() {
  const wrap = document.querySelector('.table-wrap');
  if (!wrap) return;
  _savedScrollTop = wrap.scrollTop;
  // знаходимо рядок що зараз у зоні видимості
  const rows = wrap.querySelectorAll('tr[data-date]');
  const wrapTop = wrap.getBoundingClientRect().top;
  for (const row of rows) {
    const rt = row.getBoundingClientRect().top - wrapTop;
    if (rt >= 0 && rt < 80) { _savedAnchorDate = row.dataset.date; break; }
  }
}

function restoreScrollAnchor() {
  const wrap = document.querySelector('.table-wrap');
  if (!wrap) return;
  if (_savedAnchorDate) {
    const target = wrap.querySelector(`tr[data-date="${_savedAnchorDate}"]`);
    if (target) { target.scrollIntoView({block:'start'}); _savedAnchorDate = null; return; }
  }
  if (_savedScrollTop !== null) { wrap.scrollTop = _savedScrollTop; _savedScrollTop = null; }
}

function updateDiffButtons() {
  const both = showDiffYday && showDiffWeek;
  const none = !showDiffYday && !showDiffWeek;
  ['btnDiffYday','btnDiffWeek','btnDiffBoth'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.background = '';
    el.style.color = '';
    el.classList.remove('diff-btn-active');
  });
  const bdY = document.getElementById('btnDiffYday');
  const bdW = document.getElementById('btnDiffWeek');
  const bdB = document.getElementById('btnDiffBoth');
  if (bdY) { bdY.classList.toggle('diff-btn-active', showDiffYday && !showDiffWeek); }
  if (bdW) { bdW.classList.toggle('diff-btn-active', showDiffWeek && !showDiffYday); }
  if (bdB) { bdB.classList.toggle('diff-btn-active', both); }
}

function setDiffMode(yday, week) {
  showDiffYday = yday;
  showDiffWeek = week;
  updateDiffButtons();
  saveScrollAnchor();
  render();
  requestAnimationFrame(() => restoreScrollAnchor());
}
// -
// УТИЛІТИ
// -
function parseCSV(text) {
const res = []; let row = [], col = '', inQ = false;
for (let i = 0; i < text.length; i++) {
const c = text[i];
if (c === '"' && text[i+1] === '"') { col += '"'; i++; }
else if (c === '"') inQ = !inQ;
else if (c === ',' && !inQ) { row.push(col.trim()); col = ''; }
else if ((c === '\n' || c === '\r') && !inQ) {
if (c === '\r' && text[i+1] === '\n') i++;
row.push(col.trim()); res.push(row); row = []; col = '';
}
else col += c;
}
if (col || row.length) { row.push(col.trim()); res.push(row); }
return res.filter(r => r.some(c => c));
}
function toN(v) {
if (!v && v !== 0) return null;
const s = String(v).replace(/\s|\u00a0/g,'').replace(',','.').replace('%','');
if (['#div/0!','#value!','#n/a','#ref!'].includes(s.toLowerCase())) return null;
const n = parseFloat(s); return isNaN(n) ? null : n;
}
function fmt(v) {
if (v === null || v === undefined) return '\u2014';
const n = Number(v); if (isNaN(n)) return '\u2014';
if (Math.abs(n) >= 1000000) return (n/1000000).toFixed(2) + '\u041c';
if (Math.abs(n) >= 1000) return (n/1000).toFixed(1) + '\u041a';
if (n % 1 !== 0) return n.toFixed(2);
return n.toLocaleString('uk-UA');
}
function fmtDate(d) {
if (!d) return '';
const parts = d.replace(/\//g,'.').split('.');
if (parts.length === 3) {
const [a,b,c] = parts;
if (a.length === 4) return `${c}.${b}`;
return `${a}.${b}`;
}
return d;
}
function isWeekend(dow) {
return DOW_WE.some(w => String(dow).toLowerCase().trim() === w || String(dow).toLowerCase().includes(w));
}
// -
// SKELETON
// -
function showSkel() {
const cont = document.getElementById('tabContent');
const card = document.createElement('div'); card.className = 'table-card';
const wrap = document.createElement('div');
for (let i = 0; i < 14; i++) {
const row = document.createElement('div'); row.className = 'skel-row';
for (let j = 0; j < 6; j++) {
const c = document.createElement('div');
c.className = 'skel-cell skel' + (j < 2 ? ' w' : '');
c.style.animationDelay = (i * .04 + j * .015) + 's';
row.appendChild(c);
}
wrap.appendChild(row);
}
card.appendChild(wrap);
cont.innerHTML = '';
cont.appendChild(card);
}
// -
// ПАРСИНГ
// -
function detect(rows) {
let subRow = -1, storeRow = -1;
for (let i = 0; i < Math.min(10, rows.length); i++) {
const r = rows[i].map(c => (c || '').toLowerCase().trim());
if (r.filter(c => c.includes('\u0444\u043e\u043a\u0441\u0442\u0440\u043e\u0442') || c === '\u0444\u043e\u043a\u0441').length >= 1 &&
r.filter(c => c.includes('\u043a\u043e\u043c\u0444\u0456') || c === '\u043a\u043e\u043c\u0444').length >= 1) {
subRow = i; storeRow = i - 1; break;
}
}
if (subRow === -1) { subRow = 3; storeRow = 2; }
const storeRowData = rows[storeRow] || [];
const subRowData = rows[subRow] || [];
stores = [];
let curStore = '';
for (let i = 7; i < Math.max(storeRowData.length, subRowData.length); i++) {
const sn = (storeRowData[i] || '').trim();
if (sn) curStore = sn;
if (!curStore) continue;
const sub = (subRowData[i] || '').toLowerCase().trim();
if (!sub) continue;
let type = null;
if (sub.includes('\u0444\u043e\u043a\u0441') || sub === '\u0444\u043e\u043a\u0441\u0442\u0440\u043e\u0442') type = 'foks';
else if (sub.includes('\u043a\u043e\u043c\u0444') || sub === '\u043a\u043e\u043c\u0444\u0456') type = 'komf';
else if (sub.includes('\u0434\u0435\u043b\u044c\u0442') || sub.includes('delta')) type = 'delta';
if (!type) continue;
let st = stores.find(s => s.name === curStore);
if (!st) { st = { name: curStore, cols: [] }; stores.push(st); }
st.cols.push({ type, colIdx: i });
}
stores = stores.filter(s => s.name && s.name.trim() && s.cols.length > 0);

const dataStart = subRow + 1;
dataRows = [];
const ymSet = new Set();
const weekSet = new Set();
for (let ri = dataStart; ri < rows.length; ri++) {
const row = rows[ri];
if (!row.some(c => c)) continue;
const year = toN(row[0]);
const week = toN(row[1]);
const monthNum = toN(row[2]);
const monthName = (row[3] || '').trim();
const dowName = (row[5] || '').trim();
const dateStr = (row[6] || '').trim();
if (!year || !dateStr) continue;
const mo = monthNum || (function() {
const lo = monthName.toLowerCase();
const idx = MONTHS_UK.findIndex(m => lo.includes(m.slice(0,3).toLowerCase()));
return idx >= 0 ? idx + 1 : null;
})();
if (!mo) continue;
let dowNum = 0;
const dowLo = dowName.toLowerCase();
const dowMap = {'\u043f\u043e\u043d\u0435\u0434\u0456\u043b\u043e\u043a':1,'\u043f\u043d':1,'\u0432\u0456\u0432\u0442\u043e\u0440\u043e\u043a':2,'\u0432\u0442':2,'\u0441\u0435\u0440\u0435\u0434\u0430':3,'\u0441\u0440':3,'\u0447\u0435\u0442\u0432\u0435\u0440':4,'\u0447\u0442':4,'\u043f\u2019\u044f\u0442\u043d\u0438\u0446\u044f':5,'\u043f\u044f\u0442\u043d\u0438\u0446\u044f':5,'\u043f\u0442':5,'\u0441\u0443\u0431\u043e\u0442\u0430':6,'\u0441\u0431':6,'\u043d\u0435\u0434\u0456\u043b\u044f':7,'\u043d\u0434':7};
for (const [k,v] of Object.entries(dowMap)) {
if (dowLo === k || dowLo.startsWith(k)) { dowNum = v; break; }
}
const storeVals = {};
stores.forEach(st => {
const fCol = st.cols.find(c => c.type === 'foks');
const kCol = st.cols.find(c => c.type === 'komf');
const dCol = st.cols.find(c => c.type === 'delta');
const fv = fCol ? toN(row[fCol.colIdx]) : null;
const kv = kCol ? toN(row[kCol.colIdx]) : null;
let dv = dCol ? toN(row[dCol.colIdx]) : null;
if (dv === null && fv != null && kv != null && fv !== 0) dv = kv / fv;
storeVals[st.name] = { foks: fv, komf: kv, delta: dv };
});
const isWE = dowNum >= 5 || (dowNum === 0 && isWeekend(dowName));
const yearMonthKey = year + '_' + String(mo).padStart(2, '0');
dataRows.push({ year, month: mo, week, dowName, dowNum, date: dateStr, storeVals, isWE, yearMonth: yearMonthKey });
ymSet.add(yearMonthKey);
if (week) weekSet.add(week);
}
allYearMonths = [...ymSet].sort();
allWeeks = [...weekSet].sort((a,b) => a - b);
selYearMonths = new Set(allYearMonths);
selWeeks = new Set(allWeeks);
selStores = new Set(stores.map(s => s.name));

stores = stores.filter(st => {
return dataRows.some(r => {
const v = r.storeVals[st.name] || {};
return v.foks != null || v.komf != null || v.delta != null;
});
});
selStores = new Set(stores.map(s => s.name));
}
function activeData() {
return dataRows.filter(r => {
if (!selYearMonths.has(r.yearMonth)) return false;
if (selWeeks.size > 0 && r.week && !selWeeks.has(r.week)) return false;
const sts = activeStores();
return sts.some(st => {
const v = r.storeVals[st.name] || {};
return v.foks != null || v.komf != null;
});
});
}
function activeStores() {
return stores.filter(s => selStores.has(s.name));
}

function mkPill(text, active, cls, onclick) {
const b = document.createElement('button');
b.className = 'pill' + (active ? ' active' : '') + (cls ? ' ' + cls : '');
b.textContent = text;
b.onclick = onclick;
// Не перебиваємо inline-стилем - CSS-клас .pill.active і .pill-all.active
// вже задають потрібний колір. Inline тільки для non-all активних.
if (active && !cls.includes('pill-all')) {
  b.style.background = '#1d1d1f';
  b.style.color = '#fff';
}
return b;
}

function renderWeekFilter() {
  const wrap = document.getElementById('weekPills');
  if (!wrap) return;
  wrap.innerHTML = '';
  const currentWeek = CURRENT_WEEK;
  const allSel = allWeeks.length > 0 && selWeeks.size > 0 && allWeeks.every(w => selWeeks.has(w));

  function makeWPill(label, isActive, isCurrent, onClick, extraStyle) {
    const btn = document.createElement('button');
    btn.className = 'wpill' + (isActive ? ' active' : '') + (isCurrent ? ' current' : '');
    btn.textContent = label;
    btn.type = 'button';
    if (extraStyle) Object.assign(btn.style, extraStyle);
    btn.addEventListener('click', onClick);
    return btn;
  }

  // Кнопка "Всі"
  const allBtn = makeWPill('Всі', allSel, false, () => {
    selWeeks = allWeeks.every(w => selWeeks.has(w)) ? new Set() : new Set(allWeeks);
    renderWeekFilter(); render();
  });
  wrap.appendChild(allBtn);

  // Роздільник
  const sep = document.createElement('span');
  sep.style.cssText = 'color:#d2d2d7;font-size:14px;padding:0 2px;align-self:center;flex-shrink:0;';
  sep.textContent = '|';
  wrap.appendChild(sep);

  // Кнопки для кожного тижня - групуємо по кварталах
  const quarters = {};
  allWeeks.forEach(w => {
    const q = Math.ceil(w / 13);
    if (!quarters[q]) quarters[q] = [];
    quarters[q].push(w);
  });

  Object.keys(quarters).sort((a,b) => a-b).forEach((q, qi) => {
    if (qi > 0) {
      const qsep = document.createElement('span');
      qsep.style.cssText = 'color:#d2d2d7;font-size:11px;padding:0 3px;align-self:center;flex-shrink:0;font-weight:700;';
      qsep.textContent = 'Q' + q;
      wrap.appendChild(qsep);
    }
    quarters[q].forEach(w => {
      const isCur = w === currentWeek;
      const isAct = selWeeks.has(w);
      const label = 'T' + w + (isCur ? '\u2605' : '');
      const btn = makeWPill(label, isAct, isCur, () => {
        if (selWeeks.has(w)) { if (selWeeks.size > 1) selWeeks.delete(w); }
        else selWeeks.add(w);
        renderWeekFilter(); render();
      });
      wrap.appendChild(btn);
    });
  });
}

const allYMA = allYearMonths.every(ym => selYearMonths.has(ym));

const sp = document.getElementById('storePills'); sp.innerHTML = '';

else stores.forEach(s => selStores.add(s.name));
renderFilters(); render();
});
sp.appendChild(baS);

stores.filter(s => s.name && s.name.trim()).forEach(s => {
const a = selStores.has(s.name);
const displayName = s.name.toLowerCase().includes('тотал') ? 'Тотал' : s.name.split(' ').slice(1,4).join(' ');
if (!displayName) return;
const b = mkPill(displayName, a, '', () => {
if (a) { if (selStores.size > 1) selStores.delete(s.name); }
else selStores.add(s.name);
renderFilters(); render();
});
b.title = s.name;
if (a) { b.style.background = '#1d1d1f'; b.style.color = '#fff'; }
sp.appendChild(b);
});

const segp = document.getElementById('segmentPills'); segp.innerHTML = '';
const segDefs = [{key:'wd', lbl:'\u041f\u043d\u2013\u0427\u0442'}, {key:'we', lbl:'\u041f\u0442\u2013\u0421\u0431'}];
const allSeg = segDefs.every(s => selSegments.has(s.key));
const baSeg = mkPill('\u0412\u0441\u0456', allSeg, 'pill-all', () => {
if (allSeg) segDefs.forEach(s => selSegments.delete(s.key));
else segDefs.forEach(s => selSegments.add(s.key));
renderFilters(); render();
});
segp.appendChild(baSeg);
segDefs.forEach(s => {
const a = selSegments.has(s.key);
const b = mkPill(s.lbl, a, '', () => {
if (a) { if (selSegments.size > 1) selSegments.delete(s.key); }
else selSegments.add(s.key);
renderFilters(); render();
});
if (a) { b.style.background = '#1d1d1f'; b.style.color = '#fff'; }
segp.appendChild(b);
});

renderWeekFilter();
document.getElementById('filtersWrap').style.display = '';
}

function mkTh(text, cls, sty) {
const t = document.createElement('th');
t.textContent = text;
if (cls) t.className = cls;
if (sty) Object.assign(t.style, sty);
return t;
}
function mkTd(text, cls, sty) {
const t = document.createElement('td');
t.textContent = (text === null || text === undefined) ? '\u2014' : text;
if (cls) t.className = cls;
if (sty) Object.assign(t.style, sty);
return t;
}
function deltaClass(d) {
if (d === null || d === undefined) return '';
if (d < 0.8) return 'd5';
if (d < 0.95) return 'd4';
if (d <= 1.05) return 'd3';
if (d <= 1.25) return 'd2';
return 'd1';
}

function mkDiffBar() {
  const diffBar = document.createElement('div'); diffBar.className = 'diff-controls';
  const diffLbl = document.createElement('span'); diffLbl.className = 'diff-controls-label'; diffLbl.textContent = '↕ Відхилення:';
  diffBar.appendChild(diffLbl);

  const both = showDiffYday && showDiffWeek;
  const btnB = document.createElement('button'); btnB.className = 'diff-btn' + (both ? ' diff-btn-active' : ''); btnB.id = 'btnDiffBoth'; btnB.textContent = 'Обидва';
  btnB.onclick = () => { const on = !(showDiffYday && showDiffWeek); setDiffMode(on, on); };
  diffBar.appendChild(btnB);

  const btnY = document.createElement('button'); btnY.className = 'diff-btn' + (showDiffYday && !showDiffWeek ? ' diff-btn-active' : ''); btnY.id = 'btnDiffYday'; btnY.textContent = '↕ Вчора';
  btnY.onclick = () => { if (showDiffYday && !showDiffWeek) { setDiffMode(false,false); } else { setDiffMode(true,false); } };
  diffBar.appendChild(btnY);

  const btnW = document.createElement('button'); btnW.className = 'diff-btn' + (!showDiffYday && showDiffWeek ? ' diff-btn-active' : ''); btnW.id = 'btnDiffWeek'; btnW.textContent = '↕ Тиждень';
  btnW.onclick = () => { if (!showDiffYday && showDiffWeek) { setDiffMode(false,false); } else { setDiffMode(false,true); } };
  diffBar.appendChild(btnW);

  const btnOff = document.createElement('button'); btnOff.className = 'diff-btn' + (!showDiffYday && !showDiffWeek ? ' diff-btn-active' : ''); btnOff.textContent = 'Вимк';
  btnOff.onclick = () => setDiffMode(false, false);
  diffBar.appendChild(btnOff);
  return diffBar;
}

function renderTable() {

const sts = activeStores();
if (!data.length || !sts.length) {
cont.innerHTML = '<div class="table-card"><div class="status-box">\u041d\u0435\u043c\u0430\u0454 \u0434\u0430\u043d\u0438\u0445 \u0434\u043b\u044f \u043e\u0431\u0440\u0430\u043d\u043e\u0433\u043e \u0444\u0456\u043b\u044c\u0442\u0440\u0443</div></div>';
return;
}
const card = document.createElement('div'); card.className = 'table-card';
card.appendChild(mkDiffBar());

const hint = document.createElement('div'); hint.className = 'table-hint';
hint.innerHTML = '\u041f\u043d\u2013\u0427\u0442 \u2014 \u0431\u0443\u0434\u043d\u0456 | \u041f\u0442\u2013\u041d\u0434 \u2014 <b style="color:#b45309">\u0432\u0438\u0445\u0456\u0434\u043d\u0456</b> | \u0394: <span class="d5"><0.8</span> <span class="d4">0.8\u20130.95</span> <span class="d3">~1</span> <span class="d2">1.05\u20131.25</span> <span class="d1">>1.25</span>';
card.appendChild(hint);
const wrap = document.createElement('div'); wrap.className = 'table-wrap';
const tbl = document.createElement('table');
const thead = document.createElement('thead');
const trG = document.createElement('tr');
const th1 = mkTh('\u0414\u0430\u0442\u0430', 'c-l1', {background:'#374151',color:'#fff'}); th1.rowSpan = 2; trG.appendChild(th1);
const th2 = mkTh('', 'c-l2', {background:'#374151',color:'#fff'}); th2.rowSpan = 2; trG.appendChild(th2);
sts.forEach((st, i) => {
const c = STORE_HDR[i % STORE_HDR.length];
const th = mkTh(st.name, 'grp', {background:c});
if (i > 0) th.style.borderLeft = '2px solid rgba(255,255,255,0.2)';
th.colSpan = 3; th.title = st.name;
trG.appendChild(th);
});
thead.appendChild(trG);
const trH = document.createElement('tr');
sts.forEach((st, i) => {
const c = STORE_HDR[i % STORE_HDR.length];
['\u0424\u043e\u043a\u0441','\u041a\u043e\u043c\u0444\u0456','\u0394'].forEach((l, j) => {
const th = mkTh(l, 'sub', {background:c});
if (j === 0 && i > 0) th.style.borderLeft = '2px solid rgba(255,255,255,0.2)';
trH.appendChild(th);
});
});
thead.appendChild(trH);
tbl.appendChild(thead);
const tbody = document.createElement('tbody');
let prevWeek = null;
let firstCurrentWeekMarked = false;
// знаходимо індекс "тотал" магазину
const totalStIdx = sts.findIndex(s => s.name.toLowerCase().includes('тотал'));

data.forEach((r, idx) => {
const tr = document.createElement('tr');
if (r.isWE) tr.classList.add('weekend');
const isNewWeek = r.week && r.week !== prevWeek;
if (isNewWeek) { tr.classList.add('wk-sep'); prevWeek = r.week; }

// ── Поточний тиждень: синя лінія зверху першого рядка ──
if (r.week === CURRENT_WEEK && !firstCurrentWeekMarked) {
  tr.classList.add('current-week-first');
  firstCurrentWeekMarked = true;
}
// ── Поточний день ──
const rowDateFmt = fmtDate(r.date);
if (rowDateFmt === TODAY_STR) tr.classList.add('current-day');

tr.dataset.date = r.date; // для збереження позиції скролу
tr.appendChild(mkTd(fmtDate(r.date), 'c-l1'));
tr.appendChild(mkTd(r.dowName ? r.dowName.slice(0,2) : '', 'c-l2'));
sts.forEach((st, i) => {
const bg = STORE_BG[i % STORE_BG.length];
const v = r.storeVals[st.name] || {};
const f = v.foks ?? null;
const k = v.komf ?? null;
const d = v.delta ?? (f != null && k != null && f !== 0 ? k / f : null);
tr.appendChild(mkTd(fmt(f), '', {background:bg, borderLeft: i > 0 ? '2px solid #d0d0da' : ''}));
tr.appendChild(mkTd(fmt(k), '', {background:bg}));
tr.appendChild(mkTd(d != null ? d.toFixed(2) : null, deltaClass(d), {background:bg}));
});
tbody.appendChild(tr);

// ── відхилення від вчора ──
if (showDiffYday && idx > 0) {
  const prev = data[idx - 1];
  const diffTr = document.createElement('tr'); diffTr.className = 'diff-row';
  diffTr.appendChild(mkTd('\u2195 вчора', 'c-l1', {paddingLeft:'4px',color:'#92400e',fontWeight:'600'}));
  diffTr.appendChild(mkTd('', 'c-l2'));
  sts.forEach((st, i) => {
    const bg = STORE_BG[i % STORE_BG.length];
    // Тотал: не рахуємо відхилення для тижнів після поточного
    const isTotal = i === totalStIdx;
    const isFutureWeek = isTotal && r.week != null && r.week > CURRENT_WEEK;
    const cv = r.storeVals[st.name] || {};
    const pv = prev.storeVals[st.name] || {};
    const cf = isFutureWeek ? null : (cv.foks ?? null), ck = isFutureWeek ? null : (cv.komf ?? null);
    const pf = isFutureWeek ? null : (pv.foks ?? null), pk = isFutureWeek ? null : (pv.komf ?? null);
    const df = (cf != null && pf != null) ? cf - pf : null;
    const dk = (ck != null && pk != null) ? ck - pk : null;
    const cd = (cf != null && cf > 0) ? ck / cf : null;
    const pd = (pf != null && pf > 0) ? pk / pf : null;
    const dd = (cd != null && pd != null) ? cd - pd : null;
    const fmtDiff = (v) => v == null ? '-' : (v >= 0 ? '+' : '') + fmt(Math.abs(v)) + (v >= 0 ? ' \u2191' : ' \u2193');
    const fmtDd = (v) => v == null ? '-' : (v >= 0 ? '+' : '') + v.toFixed(2);
    diffTr.appendChild(mkTd(fmtDiff(df), df == null ? '' : (df >= 0 ? 'diff-pos' : 'diff-neg'), {background:bg, borderLeft: i > 0 ? '2px solid #d0d0da' : '', fontSize:'10px'}));
    diffTr.appendChild(mkTd(fmtDiff(dk), dk == null ? '' : (dk >= 0 ? 'diff-pos' : 'diff-neg'), {background:bg, fontSize:'10px'}));
    diffTr.appendChild(mkTd(fmtDd(dd), dd == null ? '' : (dd <= 0 ? 'diff-pos' : 'diff-neg'), {background:bg, fontSize:'10px'}));
  });
  tbody.appendChild(diffTr);
}
// ── відхилення від аналогічного дня минулого тижня ──
if (showDiffWeek) {
  const sameWkPrev = idx >= 7 ? data[idx - 7] : null;
  if (sameWkPrev && sameWkPrev.dowNum === r.dowNum) {
    const wkTr = document.createElement('tr'); wkTr.className = 'diff-row';
    wkTr.style.cssText = 'background:#f0f9ff!important;';
    wkTr.appendChild(mkTd('\u2195 -7 днів', 'c-l1', {paddingLeft:'4px',color:'#0369a1',fontWeight:'600'}));
    wkTr.appendChild(mkTd('', 'c-l2'));
    sts.forEach((st, i) => {
      const isTotal = i === totalStIdx;
      const isFutureWeek = isTotal && r.week != null && r.week > CURRENT_WEEK;
      const cv = r.storeVals[st.name] || {};
      const wv = sameWkPrev.storeVals[st.name] || {};
      const cf = isFutureWeek ? null : (cv.foks ?? null), ck = isFutureWeek ? null : (cv.komf ?? null);
      const wf = isFutureWeek ? null : (wv.foks ?? null), wk = isFutureWeek ? null : (wv.komf ?? null);
      const df = (cf != null && wf != null) ? cf - wf : null;
      const dk = (ck != null && wk != null) ? ck - wk : null;
      const cd = (cf != null && cf > 0) ? ck / cf : null;
      const wd2 = (wf != null && wf > 0) ? wk / wf : null;
      const dd = (cd != null && wd2 != null) ? cd - wd2 : null;
      const fmtDiff = (v) => v == null ? '-' : (v >= 0 ? '+' : '') + fmt(Math.abs(v)) + (v >= 0 ? ' \u2191' : ' \u2193');

anchor: 'end',
align: (context) => {
const idx = context.dataIndex;
const total = context.dataset.data.length;
if (idx === total - 1) return 'right';
if (idx % 4 === 0) return 'top';
if (idx % 4 === 1) return 'bottom';
if (idx % 4 === 2) return 'top';
return 'bottom';
},
offset: isMobile ? 4 : 6,
clip: false,
overflow: 'visible',
borderWidth: 1,
borderColor: (context) => context.dataset.borderColor + '60',
borderRadius: 4
};

if (selChartMode === 'store') {
const vals = filteredKeys.map(k => getVal(gMap.get(k), selChartStore));
const color = selChartMetric === 'delta' ? '#6b21a8' : (selChartMetric === 'foks' ? '#1a56db' : '#0e7490');
const isBar = selChartMetric === 'delta';
const dataset = {
type: isBar ? 'bar' : 'line',
label: selChartStore.split(' ').slice(1,3).join(' '),
data: vals,
backgroundColor: isBar ? vals.map(v => {
if (v === null) return 'rgba(200,200,200,0.3)';
if (v < 0.8) return 'rgba(21,128,61,0.7)';
if (v < 0.95) return 'rgba(22,163,74,0.6)';
if (v <= 1.05) return 'rgba(107,114,128,0.5)';
if (v <= 1.25) return 'rgba(194,65,12,0.6)';
return 'rgba(185,28,28,0.7)';
}) : color + '33',
borderColor: color,
borderWidth: isBar ? 0 : 2.5,
pointRadius: dataLength <= 40 ? 4 : 3,
pointHoverRadius: 8,
tension: 0.25,
fill: !isBar,
spanGaps: true,
datalabels: customDataLabelsConfig
};
dataset.originalColor = color;
datasets.push(dataset);
} else {
sts.forEach((st, i) => {
const color = CHART_COLORS[i % CHART_COLORS.length];
const vals = filteredKeys.map(k => getVal(gMap.get(k), st.name));
const dataset = {
type: 'line',
label: st.name.split(' ').slice(1,3).join(' '),
data: vals,
borderColor: color,
backgroundColor: color + '22',
borderWidth: 2.5,
pointRadius: dataLength <= 40 ? 4 : 3,
pointHoverRadius: 8,
tension: 0.25,
fill: false,
spanGaps: true,
datalabels: customDataLabelsConfig
};
dataset.originalColor = color;
datasets.push(dataset);
});
}

const wrap = document.createElement('div');
wrap.className = 'chart-wrap';
wrap.style.height = isMobile ? '70vh' : '60vh';
wrap.style.minHeight = isMobile ? '550px' : '500px';
const canvas = document.createElement('canvas'); canvas.id = 'dailyChart';
wrap.appendChild(canvas);

const zoomHint = document.createElement('div');
zoomHint.className = 'zoom-hint';
zoomHint.innerHTML = isMobile ?
'\ud83d\udca1 <i>\u0429\u0438\u043f\u043e\u043a \u0434\u043b\u044f \u043c\u0430\u0441\u0448\u0442\u0430\u0431\u0443 | \u041f\u043e\u0434\u0432\u0456\u0439\u043d\u0438\u0439 \u043a\u043b\u0456\u043a \u0434\u043b\u044f \u0441\u043a\u0438\u0434\u0430\u043d\u043d\u044f | \u041a\u043d\u043e\u043f\u043a\u0430 Tooltip \u0432\u0438\u043c\u0438\u043a\u0430\u0454 \u043f\u0456\u0434\u043a\u0430\u0437\u043a\u0438</i>' :
'\ud83d\udca1 <i>\u041a\u043e\u043b\u0456\u0449\u0430\u0442\u043a\u043e \u0434\u043b\u044f \u043c\u0430\u0441\u0448\u0442\u0430\u0431\u0443 | \u041f\u043e\u0434\u0432\u0456\u0439\u043d\u0438\u0439 \u043a\u043b\u0456\u043a \u0434\u043b\u044f \u0441\u043a\u0438\u0434\u0430\u043d\u043d\u044f</i>';
card.appendChild(wrap);
card.appendChild(zoomHint);

cont.innerHTML = '';
cont.appendChild(card);

if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
const ctx = canvas.getContext('2d');

chartInstance = new Chart(ctx, {
type: 'line',
plugins: [ChartDataLabels, window.ChartZoom],
data: { labels, datasets },
options: {
responsive: true,
maintainAspectRatio: false,
interaction: { mode: isMobile ? 'nearest' : 'index', intersect: false },
hover: { mode: 'dataset', intersect: false },
onHover: (event, chartElement, chart) => {
const ds = chart.data.datasets;
if (chartElement.length > 0) {
const index = chartElement[0].datasetIndex;
ds.forEach((d, i) => {
if (d.originalColor) d.borderColor = i === index ? d.originalColor : d.originalColor + '22';
});
} else {
ds.forEach(d => { if (d.originalColor) d.borderColor = d.originalColor; });
}
chart.update('none');
},
plugins: {
legend: {
display: datasets.length > 1,
position: isMobile ? 'bottom' : 'top',
labels: { font: { size: isMobile ? 9 : 11 }, boxWidth: isMobile ? 10 : 18, padding: isMobile ? 4 : 10, usePointStyle: true }
},
tooltip: {
enabled: tooltipEnabled,
backgroundColor: 'rgba(0,0,0,0.9)',
titleFont: { size: isMobile ? 11 : 13, weight: '600' },
bodyFont: { size: isMobile ? 10 : 12 },
padding: isMobile ? 6 : 12,
cornerRadius: isMobile ? 4 : 8,
displayColors: true,
hideOnClick: true,
callbacks: {
label: c => ' ' + c.dataset.label + ': ' + (c.raw != null ? (selChartMetric === 'delta' ? c.raw.toFixed(2) : fmt(c.raw)) : '\u2014')
}
},
zoom: {
pan: { enabled: true, mode: 'x' },
zoom: { wheel: { enabled: !isMobile }, pinch: { enabled: true }, mode: 'x' }
},
datalabels: customDataLabelsConfig
},
scales: {
x: {
grid: { display: true, drawOnChartArea: true, color: '#e5e7eb' },
ticks: { font: { size: isMobile ? 8 : 9 }, color: '#6b7280', maxTicksLimit: isMobile ? 6 : 24, maxRotation: isMobile ? 45 : 0, autoSkip: true }
},
y: {
grace: isMobile ? '35%' : '25%',
grid: { color: '#e5e7eb' },
ticks: { font: { size: isMobile ? 9 : 10 }, color: '#6b7280', callback: v => selChartMetric === 'delta' ? v.toFixed(2) : fmt(v) }
}
}
}
});
}
// -
// ПЕРЕМИКАННЯ ТАБІВ
// -
function switchTab(tab) {
activeTab = tab;
document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
const activeBtn = document.querySelector(`.tab[data-tab="${tab}"]`);
if (activeBtn) activeBtn.classList.add('active');
render();
}
function render() {
if (activeTab === 'table') renderTable();
else if (activeTab === 'weekday') renderWeekday();
else if (activeTab === 'weekly') renderWeekly();
else if (activeTab === 'monthly') renderMonthly();
else renderChart();
}
// -
// INIT
// -
async function init() {
showSkel();
try {
const controller = new AbortController();
const timeout = setTimeout(() => controller.abort(), 15000);
let res;
try {
  res = await fetch(CSV_URL + '&t=' + Date.now(), { signal: controller.signal });
} catch (fetchErr) {
  clearTimeout(timeout);
  if (fetchErr.name === 'AbortError') throw new Error('Timeout: сервер не відповідає (>15с)');
  throw new Error('Мережева помилка: ' + fetchErr.message);
}
clearTimeout(timeout);
if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + res.statusText);
const text = await res.text();
if (!text || text.trim().length < 10) throw new Error('Порожня відповідь від сервера');
const rows = parseCSV(text);
if (!rows.length) throw new Error('Порожній файл CSV');
detect(rows);
if (!stores.length) throw new Error('Не знайдено магазини у файлі (перевір структуру заголовків)');
renderFilters();
render();
// ── Прокрутка до поточного тижня при першому завантаженні ──
requestAnimationFrame(() => {
  setTimeout(() => {
    const wrap = document.querySelector('.table-wrap');
    if (!wrap) return;
    const curRow = wrap.querySelector('tr.current-week-first, tr.current-day');
    if (curRow) curRow.scrollIntoView({block: 'start'});
  }, 80);
});
} catch (e) {
document.getElementById('tabContent').innerHTML = '<div class="table-card"><div class="status-box error">\u274c ' + e.message + '</div></div>';
console.error('[daily-delta] init error:', e);
}
}
init();
</script>
</body>
