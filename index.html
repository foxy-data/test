<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Apple Sales Team — Аналітика</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-bg: #fbfbfd;
            --color-text: #1d1d1f;
            --color-text-secondary: #6e6e73;
            --color-card-bg: #ffffff;
            --color-accent: #0071e3;
            --color-border: #d2d2d7;
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Навігація */
        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--color-border);
            height: 48px;
            display: flex;
            align-items: center;
        }

        .nav-content {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo { font-weight: 600; font-size: 17px; cursor: pointer; }
        .nav-links a { color: var(--color-accent); text-decoration: none; font-size: 14px; font-weight: 500; }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        
        header { margin-bottom: 40px; }
        header h1 { font-size: 40px; font-weight: 600; letter-spacing: -0.009em; }
        header p { color: var(--color-text-secondary); font-size: 21px; }

        /* Сітка карток */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--color-card-bg);
            border-radius: 22px;
            padding: 24px;
            border: 1px solid var(--color-border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: rgba(0,0,0,0);
        }
        
        /* Особливий стиль для картки ГРАФІКА */
        .chart-card {
            background: linear-gradient(135deg, #ffffff 0%, #fff9f0 100%);
            border: 1.5px solid #ff9500;
        }

        .card-header { display: flex; align-items: center; margin-bottom: 20px; }
        
        .avatar {
            width: 56px; height: 56px; border-radius: 50%; margin-right: 16px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600; font-size: 20px;
        }

        .card-title h2 { font-size: 19px; font-weight: 600; margin-bottom: 2px; }
        .card-title p { font-size: 14px; color: var(--color-text-secondary); }

        .main-metric { margin-bottom: 20px; }
        .main-metric-label { font-size: 12px; text-transform: uppercase; font-weight: 600; color: var(--color-text-secondary); letter-spacing: 0.05em; }
        .main-metric-value { font-size: 32px; font-weight: 600; }

        .secondary-metrics {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
            padding-top: 16px; border-top: 1px solid var(--color-border);
        }

        .metric-item-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 2px; }
        .metric-item-value { font-size: 16px; font-weight: 500; }

        /* Сторінка деталей */
        .detail-page {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--color-bg); z-index: 2000; overflow-y: auto; padding: 60px 20px;
        }
        .detail-page.active { display: block; }
        .detail-container { max-width: 800px; margin: 0 auto; }
        .back-btn { background: none; border: none; color: var(--color-accent); font-size: 17px; cursor: pointer; margin-bottom: 30px; }
        
        .all-metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .detail-metric-card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid var(--color-border); }

        @media (max-width: 600px) {
            header h1 { font-size: 32px; }
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <div class="nav-logo" onclick="showHome()">Apple Sales Team</div>
            <div class="nav-links">
                <a href="daily.html">Щоденні продажі →</a>
            </div>
        </div>
    </nav>

    <div id="home-page" class="container">
        <header>
            <h1>Команда</h1>
            <p>Результати роботи департаменту ПК</p>
        </header>

        <div id="sales-cards" class="cards-grid">
            </div>
    </div>

    <div id="detail-page" class="detail-page">
        <div class="detail-container">
            <button class="back-btn" onclick="showHome()">← Назад</button>
            <div id="detail-content"></div>
        </div>
    </div>

    <script>
        let currentData = [];

        async function loadData() {
            try {
                const response = await fetch('sales-data.json?t=' + Date.now());
                currentData = await response.json();
                renderCards(currentData);
            } catch (error) {
                console.error("Помилка завантаження даних:", error);
            }
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'М';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'К';
            return num;
        }

        function renderCards(data) {
            const container = document.getElementById('sales-cards');
            container.innerHTML = '';

            // --- 1. КАРТКА ГРАФІКА (Google Sheets) ---
            const chartCard = document.createElement('a');
            chartCard.className = 'card chart-card';
            chartCard.href = 'https://docs.google.com/spreadsheets/d/1-sUZg6C6w3-lImTpIv2ezkW-mKtK8zXZ_zf4bCK83R8/edit?gid=973370496#gid=973370496';
            chartCard.target = '_blank';
            chartCard.innerHTML = `
                <div class="card-header">
                    <div class="avatar" style="background: linear-gradient(135deg, #ff9500 0%, #ffcc00 100%)">📅</div>
                    <div class="card-title">
                        <h2>Графік виходу</h2>
                        <p>Google Таблиця</p>
                    </div>
                </div>
                <div class="main-metric">
                    <div class="main-metric-label">Розклад роботи</div>
                    <div class="main-metric-value" style="font-size: 24px;">Переглянути зміни</div>
                </div>
                <div style="margin-top: auto; color: var(--color-accent); font-size: 14px; font-weight: 500;">Відкрити таблицю →</div>
            `;
            container.appendChild(chartCard);

            // --- 2. КАРТКИ ПРОДАВЦІВ ТА МАГ ---
            data.forEach(person => {
                const to = person.metrics['ТО'] || {value: 0, unit: 'грн'};
                const acc = person.metrics['% Доля ACC'] || {value: 0, unit: '%'};
                const services = person.metrics['Доля Послуг'] || {value: 0, unit: '%'};

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => showDetail(person.id);
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="avatar" style="background: ${person.gradient}">${person.initials}</div>
                        <div class="card-title">
                            <h2>${person.name}</h2>
                            <p>${person.position}</p>
                        </div>
                    </div>
                    <div class="main-metric">
                        <div class="main-metric-label">Товарообіг</div>
                        <div class="main-metric-value">${formatNumber(to.value)} <span style="font-size: 16px;">${to.unit}</span></div>
                    </div>
                    <div class="secondary-metrics">
                        <div>
                            <div class="metric-item-label">Доля ACC</div>
                            <div class="metric-item-value">${acc.value}${acc.unit}</div>
                        </div>
                        <div>
                            <div class="metric-item-label">Послуги</div>
                            <div class="metric-item-value">${services.value}${services.unit}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showDetail(id) {
            const person = currentData.find(p => p.id === id);
            if (!person) return;

            const detailContent = document.getElementById('detail-content');
            let metricsHtml = '';

            Object.keys(person.metrics).forEach(key => {
                const m = person.metrics[key];
                metricsHtml += `
                    <div class="detail-metric-card">
                        <div class="metric-item-label">${m.label}</div>
                        <div class="metric-item-value" style="font-size: 20px; font-weight: 600;">
                            ${m.value.toLocaleString('uk-UA')} <span style="font-size: 14px; font-weight: 400; color: #86868b;">${m.unit}</span>
                        </div>
                    </div>
                `;
            });

            detailContent.innerHTML = `
                <div style="display: flex; align-items: center; margin-bottom: 40px;">
                    <div class="avatar" style="width: 100px; height: 100px; font-size: 36px; background: ${person.gradient}">${person.initials}</div>
                    <div>
                        <h1 style="font-size: 40px; line-height: 1.1;">${person.name}</h1>
                        <p style="font-size: 21px; color: var(--color-text-secondary);">${person.position}</p>
                    </div>
                </div>
                <div class="all-metrics-grid">${metricsHtml}</div>
            `;

            document.getElementById('detail-page').classList.add('active');
            document.getElementById('home-page').style.display = 'none';
            window.scrollTo(0, 0);
        }

        function showHome() {
            document.getElementById('detail-page').classList.remove('active');
            document.getElementById('home-page').style.display = 'block';
            window.scrollTo(0, 0);
        }

        window.onload = loadData;
    </script>
</body>
</html>
