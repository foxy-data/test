<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title> GORODOK Team — Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <style>
        /* УСІ ВАШІ ІСНУЮЧІ СТИЛІ ЗАЛИШАЮТЬСЯ БЕЗ ЗМІН */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --color-bg: #fbfbfd;
            --color-text: #1d1d1f;
            --color-text-secondary: #6e6e73;
            --color-card-bg: #ffffff;
            --color-accent: #0071e3;
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --group-sales: #0071e3;    
            --group-eff: #af52de;      
            --group-acc: #ff9500;      
            --group-services: #34c759; 
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg); color: var(--color-text); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { margin-bottom: 32px; margin-top: 20px; }
        .header h1 { font-size: 34px; font-weight: 600; }

        /* НОВИЙ СТИЛЬ ДЛЯ КАРТКИ KPI (Додаємо до існуючих) */
        .kpi-main-card {
            background: linear-gradient(135deg, #0071e3 0%, #05c1ff 100%);
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 12px 24px rgba(0,113,227,0.25);
            transition: transform 0.2s ease;
        }
        .kpi-main-card:active { transform: scale(0.97); }
        .kpi-content h2 { margin: 0; font-size: 22px; font-weight: 600; }
        .kpi-content p { margin: 4px 0 0; opacity: 0.9; font-size: 15px; }
        .kpi-icon { font-size: 28px; }

        /* Стиль для кнопки Daily */
        .daily-btn {
            display: block;
            background: #fff;
            padding: 16px;
            border-radius: 18px;
            text-decoration: none;
            color: var(--color-accent);
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            border: 1.5px solid var(--color-accent);
        }

        /* Стилі карток продавців (ваші) */
        .grid { display: grid; gap: 16px; }
        .card { background: white; border-radius: 18px; padding: 20px; cursor: pointer; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow-md); }
        .avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        
        /* Стилі для сторінки деталей (Detail Page) */
        #detail-page { display: none; }
        #detail-page.active { display: block; }
        .nav-bar { display: flex; align-items: center; margin-bottom: 24px; }
        .back-btn { background: none; border: none; color: var(--color-accent); font-size: 17px; cursor: pointer; padding: 0; font-weight: 500; }
    </style>
</head>
<body>

<div class="container" id="home-page">
    <div class="header">
        <h1>Команда GORODOK</h1>
    </div>

    <a href="kpi.html" class="kpi-main-card">
        <div class="kpi-content">
            <h2>📊 Основні KPI</h2>
            <p>Загальні результати та плани</p>
        </div>
        <div class="kpi-icon">→</div>
    </a>

    <a href="daily.html" class="daily-btn">📅 Продажі за сьогодні (Daily)</a>

    <div class="grid" id="sales-grid"></div>
</div>

<div class="container" id="detail-page">
    <div class="nav-bar">
        <button class="back-btn" onclick="showHome()">← Назад</button>
    </div>
    <div id="detail-content"></div>
</div>

<script>
    // ВСЯ ВАША ЛОГІКА ЗБЕРЕЖЕНА
    async function loadData() {
        try {
            const response = await fetch('sales-data.json?v=' + Date.now());
            const data = await response.json();
            const grid = document.getElementById('sales-grid');
            
            data.forEach((person) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => showDetail(person); // Ваша функція деталей
                card.innerHTML = `
                    <div class="avatar" style="background: ${person.gradient}">${person.initials}</div>
                    <div class="info">
                        <h3 style="font-size: 17px; margin-bottom: 2px;">${person.name}</h3>
                        <p style="color: var(--color-text-secondary); font-size: 14px;">${person.position}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) { console.error("Error:", e); }
    }

    function showDetail(person) {
        const content = document.getElementById('detail-content');
        const block = (key) => {
            const m = person.metrics[key];
            if(!m) return '';
            return `<div class="metric-item"><div class="metric-label">${m.label}</div><div class="metric-value">${m.value.toLocaleString()} ${m.unit}</div></div>`;
        };

        // Тут ваш існуючий шаблон для детальної сторінки (я скоротив для прикладу, але використовуйте свій повний)
        content.innerHTML = `
            <div class="card" style="margin-bottom:24px; cursor:default;">
                <div class="avatar" style="background: ${person.gradient}">${person.initials}</div>
                <div><h3>${person.name}</h3><p>${person.position}</p></div>
            </div>
            <div class="group-title">💰 Продажі</div>
            <div class="grid">${block('ТО')} ${block('Ср. Чек')}</div>
        `;

        document.getElementById('home-page').style.display = 'none';
        document.getElementById('detail-page').classList.add('active');
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('detail-page').classList.remove('active');
        document.getElementById('home-page').style.display = 'block';
    }

    window.onload = loadData;
</script>

</body>
</html>
