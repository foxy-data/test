<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>GORODOK Team — Dashboard</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --color-bg: #fbfbfd;
    --color-text: #1d1d1f;
    --color-text-secondary: #6e6e73;
    --color-card-bg: #ffffff;
    --color-accent: #0071e3;
    --color-border: #d2d2d7;
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);

    --group-sales: #0071e3;    
    --group-eff: #af52de;      
    --group-acc: #ff9500;      
    --group-services: #34c759; 
}

body {
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: var(--color-bg);
    color: var(--color-text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}

/* ===== твій CSS БЕЗ ЗМІН ===== */
nav {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid var(--color-border);
    height: 48px;
    display: flex;
    align-items: center;
}

.nav-content {
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
    padding: 0 20px;
}

.nav-logo { font-weight: 600; font-size: 17px; cursor: pointer; }

.container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

header { margin-bottom: 40px; }
header h1 { font-size: 40px; font-weight: 600; letter-spacing: -0.02em; }
header p { color: var(--color-text-secondary); font-size: 21px; }

.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
}

.card {
    background: var(--color-card-bg);
    border-radius: 22px;
    padding: 24px;
    border: 1px solid var(--color-border);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-md);
    border-color: transparent;
}

.special-card { border: 1.5px solid var(--color-accent); background: #f0f7ff; }
.chart-card { border: 1.5px solid #ff9500; background: #fffcf5; }

.card-header { display: flex; align-items: center; margin-bottom: 20px; }

.avatar {
    width: 56px; height: 56px; border-radius: 50%; margin-right: 16px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 600; font-size: 20px;
    flex-shrink: 0; 
}

/* ===== ФОРМАТУВАННЯ ТАБЛИЦІ (як у daily.html) ===== */

.planfact-table-wrapper {
    background: white;
    border-radius: 22px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.04);
    overflow-x: auto;
}

.planfact-table {
    border-collapse: collapse;
    min-width: 1000px;
    width: 100%;
}

.planfact-table th {
    padding: 14px;
    color: #86868b;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    border-bottom: 1px solid var(--color-border);
    background: white;
}

.planfact-table td {
    padding: 14px;
    border-bottom: 1px solid #f5f5f7;
    font-size: 14px;
    white-space: nowrap;
}

.planfact-table th:first-child,
.planfact-table td:first-child {
    position: sticky;
    left: 0;
    background: white;
    z-index: 2;
    min-width: 140px;
    box-shadow: 4px 0 8px -4px rgba(0,0,0,0.1);
    font-weight: 600;
}

/* мобільна адаптація */
@media (max-width: 600px) {
    .planfact-table th:first-child,
    .planfact-table td:first-child {
        min-width: 80px;
        max-width: 80px;
        padding: 8px 4px;
        font-size: 11px;
        white-space: normal;
        line-height: 1.1;
        text-align: center;
    }

    .planfact-table td {
        padding: 10px 6px;
        font-size: 12px;
    }
}

.detail-page {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--color-bg); z-index: 2000; overflow-y: auto; padding: 40px 20px;
}
.detail-page.active { display: block; }
.detail-container { max-width: 900px; margin: 0 auto; }
</style>
</head>
<body>

<nav>
    <div class="nav-content">
        <div class="nav-logo" onclick="showHome()">Gorodok Sales Dashboard</div>
    </div>
</nav>

<div id="home-page" class="container">
    <header>
        <h1>Команда</h1>
        <p>Статистика та графіки департаменту</p>
    </header>

    <div id="sales-cards" class="cards-grid"></div>
</div>

<div id="detail-page" class="detail-page">
    <div class="detail-container">
        <button onclick="showHome()" style="background:none; border:none; color:var(--color-accent); cursor:pointer; font-size:17px; margin-bottom:30px;">← Назад</button>
        <div id="detail-content"></div>
    </div>
</div>

<script>
let currentData = [];

async function loadData() {
    try {
        const response = await fetch('sales-data.json?t=' + Date.now());
        currentData = await response.json();
        renderCards(currentData);
    } catch (error) { console.error(error); }
}

function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(2) + 'М';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'К';
    return num;
}

function renderCards(data) {
    const container = document.getElementById('sales-cards');
    container.innerHTML = '';

    const dailyCard = document.createElement('a');
    dailyCard.className = 'card special-card';
    dailyCard.href = 'daily.html';
    dailyCard.innerHTML = `
        <div class="card-header">
            <div class="avatar" style="background: var(--color-accent)">📊</div>
            <div class="card-title"><h2>Щоденні продажі</h2><p>Аналітика по днях</p></div>
        </div>
        <div class="main-metric"><div class="main-metric-value" style="font-size:22px">Переглянути звіти</div></div>
    `;
    container.appendChild(dailyCard);

    const planFactCard = document.createElement('div');
    planFactCard.className = 'card special-card';
    planFactCard.innerHTML = `
        <div class="card-header">
            <div class="avatar" style="background: #34c759">📈</div>
            <div class="card-title"><h2>Продажі План/Факт</h2><p>Порівняння показників</p></div>
        </div>
        <div class="main-metric"><div class="main-metric-value" style="font-size:22px">Переглянути звіт</div></div>
    `;

    planFactCard.onclick = async () => {
        const detailContent = document.getElementById('detail-content');
        detailContent.innerHTML = '<p>Завантаження...</p>';
        document.getElementById('detail-page').classList.add('active');
        document.getElementById('home-page').style.display = 'none';

        try {
            const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTOUXHhUpCkh6tgvNpJzY-w5tVrhPkvEeC0W0ZWuy2YxPayuO3pvahfeKYmMZ1DwHnILTpsJFNtXLsH/pub?output=csv');
            const csvText = await response.text();
            const rows = csvText.trim().split('\n').map(r => r.split(','));

            let table = '<div class="planfact-table-wrapper"><table class="planfact-table">';
            rows.forEach((row, i) => {
                table += '<tr>';
                row.forEach((cell) => {
                    table += `<td>${cell}</td>`;
                });
                table += '</tr>';
            });
            table += '</table></div>';

            detailContent.innerHTML = table;
            window.scrollTo(0,0);
        } catch(e){
            detailContent.innerHTML='<p>Помилка завантаження таблиці</p>';
            console.error(e);
        }
    };

    container.appendChild(planFactCard);

    const chartCard = document.createElement('a');
    chartCard.className = 'card chart-card';
    chartCard.href = 'https://docs.google.com/spreadsheets/d/1-sUZg6C6w3-lImTpIv2ezkW-mKtK8zXZ_zf4bCK83R8/edit#gid=973370496';
    chartCard.target='_blank';
    chartCard.innerHTML = `
        <div class="card-header">
            <div class="avatar" style="background: #ff9500">📅</div>
            <div class="card-title"><h2>Графік виходу</h2><p>Google Sheets</p></div>
        </div>
        <div class="main-metric"><div class="main-metric-value" style="font-size:22px">Зміни та розклад</div></div>
    `;
    container.appendChild(chartCard);

    data.forEach(person => {
        const to = person.metrics['ТО'] || {value:0, unit:'грн'};
        const acc = person.metrics['% Доля ACC'] || {value:0, unit:'%'};
        const services = person.metrics['Доля Послуг'] || {value:0, unit:'%'};

        const card = document.createElement('div');
        card.className='card';
        card.onclick=()=>showDetail(person.id);
        card.innerHTML=`
            <div class="card-header">
                <div class="avatar" style="background:${person.gradient}">${person.initials}</div>
                <div class="card-title"><h2>${person.name}</h2><p>${person.position}</p></div>
            </div>
            <div class="main-metric">
                <div class="main-metric-label">Товарообіг</div>
                <div class="main-metric-value">${formatNumber(to.value)} <span style="font-size:14px">${to.unit}</span></div>
            </div>
            <div class="secondary-metrics">
                <div><div class="metric-mini-label">Доля ACC</div><div class="metric-mini-value">${acc.value}%</div></div>
                <div><div class="metric-mini-label">Послуги</div><div class="metric-mini-value">${services.value}%</div></div>
            </div>
        `;
        container.appendChild(card);
    });
}

function showDetail(id){
    const person = currentData.find(p=>p.id===id);
    if(!person) return;
    const m = person.metrics;
    const detailContent = document.getElementById('detail-content');
    const block = (key)=>{
        const item = m[key]||{value:0, unit:'-'};
        return `<div class="detail-metric-card">
            <div style="font-size:11px; color:var(--color-text-secondary); text-transform:uppercase">${key}</div>
            <div style="font-size:22px; font-weight:600">
                ${item.value.toLocaleString('uk-UA')} <span style="font-size:14px; font-weight:400">${item.unit}</span>
            </div>
        </div>`;
    };
    detailContent.innerHTML=`
        <div style="display:flex; align-items:center; margin-bottom:40px;">
            <div class="avatar" style="width:80px; height:80px; font-size:28px; background:${person.gradient}">${person.initials}</div>
            <div><h1 style="font-size:32px">${person.name}</h1><p style="color:var(--color-text-secondary)">${person.position}</p></div>
        </div>
        <div class="group-title">💰 Продажі та Обіг</div>
        <div class="metric-group group-sales">
            ${block('ТО')} ${block('ASP')} ${block('Ср. Чек')}
        </div>
        <div class="group-title">⚡ Ефективність</div>
        <div class="metric-group group-eff">
            ${block('Шт.')} ${block('Чеки')} ${block('ПЧ')} ${block('КПЧ')} ${block('Конверсія ПК')}
        </div>
        <div class="group-title">🎧 Аксесуари (ACC)</div>
        <div class="metric-group group-acc">
            ${block('ACC')} ${block('% Доля ACC')}
        </div>
        <div class="group-title">🛠 Послуги та УДС</div>
        <div class="metric-group group-services">
            ${block('Послуги грн')} ${block('Доля Послуг')} ${block('УДС')} ${block('Доля УДС')}
        </div>
    `;
    document.getElementById('detail-page').classList.add('active');
    document.getElementById('home-page').style.display='none';
    window.scrollTo(0,0);
}

function showHome(){
    document.getElementById('detail-page').classList.remove('active');
    document.getElementById('home-page').style.display='block';
    window.scrollTo(0,0);
}

window.onload=loadData;
</script>
</body>
</html>
