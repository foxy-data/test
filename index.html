<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>GORODOK Team — Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-bg: #fbfbfd;
            --color-text: #1d1d1f;
            --color-text-secondary: #6e6e73;
            --color-card-bg: #ffffff;
            --color-accent: #0071e3;
            --color-border: #d2d2d7;
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            
            /* Кольори для груп метрик */
            --group-sales: #0071e3;    
            --group-eff: #af52de;      
            --group-acc: #ff9500;      
            --group-services: #34c759; 
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* LOGIN OVERLAY */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #f0f7ff, #eef2ff);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-box {
            background: white;
            padding: 32px;
            border-radius: 22px;
            width: 100%;
            max-width: 360px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--color-border);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 10px;
            font-size: 22px;
        }

        .login-box p {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 15px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid var(--color-border);
        }

        .login-box button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-box button:hover {
            opacity: 0.9;
        }

        .error {
            color: red;
            margin-top: 10px;
            display: none;
            font-size: 13px;
        }

        /* NAVIGATION */
        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--color-border);
            height: 48px;
            display: flex;
            align-items: center;
        }

        .nav-content {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .nav-logo { font-weight: 600; font-size: 17px; cursor: pointer; }
        .logout-btn {
            font-size:14px;
            background:none;
            border:none;
            color:var(--color-accent);
            cursor:pointer;
        }

        /* EXISTING STYLES */
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        header { margin-bottom: 40px; }
        header h1 { font-size: 40px; font-weight: 600; letter-spacing: -0.02em; }
        header p { color: var(--color-text-secondary); font-size: 21px; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--color-card-bg);
            border-radius: 22px;
            padding: 24px;
            border: 1px solid var(--color-border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: transparent;
        }
        
        .special-card { border: 1.5px solid var(--color-accent); background: #f0f7ff; }
        .chart-card { border: 1.5px solid #ff9500; background: #fffcf5; }
        .plan-fact-card { border: 1.5px solid #34c759; background: #f0fff4; }

        .card-header { display: flex; align-items: center; margin-bottom: 20px; }
        
        .avatar {
            width: 56px; height: 56px; border-radius: 50%; margin-right: 16px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600; font-size: 20px;
            flex-shrink: 0; 
        }

        .card-title h2 { font-size: 18px; font-weight: 600; }
        .card-title p { font-size: 13px; color: var(--color-text-secondary); }

        .main-metric { margin-bottom: 20px; }
        .main-metric-label { font-size: 11px; text-transform: uppercase; font-weight: 600; color: var(--color-text-secondary); }
        .main-metric-value { font-size: 30px; font-weight: 600; }

        .secondary-metrics {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            padding-top: 16px; border-top: 1px solid var(--color-border);
        }

        .metric-mini-label { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; }
        .metric-mini-value { font-size: 15px; font-weight: 600; }

        .detail-page {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--color-bg); z-index: 2000; overflow-y: auto; padding: 40px 20px;
        }
        .detail-page.active { display: block; }
        .detail-container { max-width: 900px; margin: 0 auto; }
        
        .metric-group {
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .group-title {
            grid-column: 1 / -1;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-bottom: 5px;
            padding-left: 5px;
            text-transform: uppercase;
        }

        .detail-metric-card {
            background: #fff; padding: 20px; border-radius: 18px;
            border-left: 4px solid var(--color-border);
        }
        
        .group- .detail-metric-card { border-left-color: var(--group-sales); }
        .group-eff .detail-metric-card { border-left-color: var(--group-eff); }
        .group-acc .detail-metric-card { border-left-color: var(--group-acc); }
        .group-services .detail-metric-card { border-left-color: var(--group-services); }

        @media (max-width: 600px) {
            header h1 { font-size: 32px; }
            .avatar { width: 50px; height: 50px; font-size: 18px; }
        }
    </style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay">
    <div class="login-box">
        <h2>🔐 Вхід</h2>
        <p>Dashboard команди Gorodok</p>
        <input type="password" id="passwordInput" placeholder="Введіть пароль">
        <button onclick="checkPassword()">Увійти</button>
        <div class="error" id="errorText">Невірний пароль</div>
    </div>
</div>

<nav>
    <div class="nav-content">
        <div class="nav-logo" onclick="showHome()">Gorodok Sales Dashboard</div>
        <button class="logout-btn" onclick="logout()">Вийти</button>
    </div>
</nav>

<div id="home-page" class="container">
    <header>
        <h1>Команда</h1>
        <p>Статистика та графіки департаменту</p>
    </header>

    <div id="sales-cards" class="cards-grid"></div>
</div>

<div id="detail-page" class="detail-page">
    <div class="detail-container">
        <button onclick="showHome()" style="background:none; border:none; color:var(--color-accent); cursor:pointer; font-size:17px; margin-bottom:30px;">← Назад</button>
        <div id="detail-content"></div>
    </div>
</div>

<!-- LOGIN SCRIPT -->
<script>
const PASSWORD = "shop2026";   // Змінюємо тут
const ACCESS_VERSION = "v1";   // змінити на v2, щоб вигнати всіх

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    if (input === PASSWORD) {
        localStorage.setItem("access", ACCESS_VERSION);
        document.getElementById("loginOverlay").style.display = "none";
        loadData();
        showHome();
    } else {
        document.getElementById("errorText").style.display = "block";
    }
}

function logout() {
    localStorage.removeItem("access");
    location.reload();
}

document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") checkPassword();
});

// Авто-логін якщо вже є доступ
window.onload = () => {
    if (localStorage.getItem("access") === ACCESS_VERSION) {
        document.getElementById("loginOverlay").style.display = "none";
        loadData();
    }
};
</script>

<!-- EXISTING SCRIPT -->
<script>
let currentData = [];

async function loadData() {
    try {
        const response = await fetch('sales-data.json?t=' + Date.now());
        currentData = await response.json();
        renderCards(currentData);
    } catch (error) { console.error(error); }
}

function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(2) + 'М';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'К';
    return num;
}

// --- твій існуючий renderCards, showDetail, showHome ---
// ... залишено без змін, просто додаємо новий код для авторизації
</script>

</body>
</html>
