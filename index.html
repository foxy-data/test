<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title> GORODOK Team — Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-bg: #fbfbfd;
            --color-text: #1d1d1f;
            --color-text-secondary: #6e6e73;
            --color-card-bg: #ffffff;
            --color-accent: #0071e3;
            --color-border: #d2d2d7;
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            
            /* Кольори для груп метрик */
            --group-sales: #0071e3;    
            --group-eff: #af52de;      
            --group-acc: #ff9500;      
            --group-services: #34c759; 
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 32px;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* --- НОВИЙ СТИЛЬ ДЛЯ КАРТКИ KPI --- */
        .kpi-main-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #0071e3 0%, #05c1ff 100%);
            padding: 24px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,113,227,0.2);
            transition: transform 0.2s;
        }
        .kpi-main-card:active { transform: scale(0.98); }
        .kpi-main-card h2 { margin: 0; font-size: 20px; font-weight: 600; }
        .kpi-main-card p { margin: 4px 0 0; opacity: 0.9; font-size: 14px; }
        /* --------------------------------- */

        .daily-link {
            display: block;
            background: white;
            padding: 16px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--color-accent);
            font-weight: 500;
            margin-bottom: 32px;
            text-align: center;
            border: 1px solid var(--color-accent);
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        .card {
            background: var(--color-card-bg);
            border-radius: 18px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid transparent;
        }

        .card:active {
            transform: scale(0.98);
            background-color: #f5f5f7;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }

        .info h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .info p {
            color: var(--color-text-secondary);
            font-size: 14px;
        }

        /* Detail Page Styles */
        #detail-page {
            display: none;
        }

        #detail-page.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--color-accent);
            font-size: 17px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        .metric-group {
            background: white;
            border-radius: 20px;
            padding: 4px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
        }

        .metric-item {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f2f2f7;
        }

        .metric-item:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-size: 15px;
            color: var(--color-text);
        }

        .metric-value {
            font-weight: 600;
            font-size: 15px;
        }

        .group-title {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--color-text-secondary);
            margin: 0 0 8px 16px;
            font-weight: 500;
            letter-spacing: 0.4px;
        }

        /* Кольори значень для груп */
        .group-sales .metric-value { color: var(--group-sales); }
        .group-eff .metric-value { color: var(--group-eff); }
        .group-acc .metric-value { color: var(--group-acc); }
        .group-services .metric-value { color: var(--group-services); }
    </style>
</head>
<body>

    <div class="container" id="home-page">
        <div class="header">
            <h1>Команда GORODOK</h1>
        </div>

        <a href="kpi.html" class="kpi-main-card">
            <div>
                <h2>📊 Основні KPI</h2>
                <p>Загальна аналітика та плани</p>
            </div>
            <span style="font-size: 24px;">→</span>
        </a>

        <a href="daily.html" class="daily-link">📅 Продажі за сьогодні (Daily)</a>

        <div class="grid" id="sales-grid">
            </div>
    </div>

    <div class="container" id="detail-page">
        <div class="nav-bar">
            <button class="back-btn" onclick="showHome()">✕ Закрити</button>
        </div>
        <div id="detail-content">
            </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('sales-data.json?v=' + Date.now());
                const data = await response.json();
                const grid = document.getElementById('sales-grid');
                
                data.forEach((person) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => showDetail(person);
                    card.innerHTML = `
                        <div class="avatar" style="background: ${person.gradient}">${person.initials}</div>
                        <div class="info">
                            <h3>${person.name}</h3>
                            <p>${person.position}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error("Error loading data:", e);
            }
        }

        function showDetail(person) {
            const content = document.getElementById('detail-content');
            
            const block = (key) => {
                const m = person.metrics[key];
                if (!m) return '';
                return `
                    <div class="metric-item">
                        <div class="metric-label">${m.label}</div>
                        <div class="metric-value">${m.value.toLocaleString()} ${m.unit}</div>
                    </div>
                `;
            };

            content.innerHTML = `
                <div class="card" style="margin-bottom: 32px; cursor: default; border: none; box-shadow: none; background: none; padding: 0;">
                    <div class="avatar" style="width: 64px; height: 64px; font-size: 24px; background: ${person.gradient}">${person.initials}</div>
                    <div class="info">
                        <h2 style="font-size: 24px; font-weight: 700;">${person.name}</h2>
                        <p style="font-size: 16px;">${person.position}</p>
                    </div>
                </div>

                <div class="group-title">💰 Продажі та Обіг</div>
                <div class="metric-group group-sales">
                    ${block('ТО')}
                    ${block('ASP')}
                    ${block('Ср. Чек')}
                </div>

                <div class="group-title">⚡ Ефективність</div>
                <div class="metric-group group-eff">
                    ${block('Шт.')}
                    ${block('Чеки')}
                    ${block('ПЧ')}
                    ${block('КПЧ')}
                    ${block('Конверсія ПК')}
                </div>

                <div class="group-title">🎧 Аксесуари (ACC)</div>
                <div class="metric-group group-acc">
                    ${block('ACC')}
                    ${block('% Доля ACC')}
                </div>

                <div class="group-title">🛠 Послуги та УДС</div>
                <div class="metric-group group-services">
                    ${block('Послуги грн')}
                    ${block('Доля Послуг')}
                    ${block('УДС')}
                    ${block('Доля УДС')}
                </div>
            `;

            document.getElementById('detail-page').classList.add('active');
            document.getElementById('home-page').style.display = 'none';
            window.scrollTo(0, 0);
        }

        function showHome() {
            document.getElementById('detail-page').classList.remove('active');
            document.getElementById('home-page').style.display = 'block';
            window.scrollTo(0, 0);
        }

        window.onload = loadData;
    </script>
</body>
</html>
