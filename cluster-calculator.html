<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор кластеру ТО</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0d0f14; --surface:#141820; --surface2:#1a2030; --border:#252d3d;
  --accent:#3b82f6; --accent2:#10b981; --accent3:#f59e0b; --accent4:#ef4444;
  --text:#e8edf5; --text2:#8899b4; --text3:#4a5a73;
  --q1:rgba(59,130,246,.06); --q2:rgba(16,185,129,.06); --q3:rgba(245,158,11,.06); --q4:rgba(239,68,68,.06);
  --q1b:rgba(59,130,246,.22); --q2b:rgba(16,185,129,.22); --q3b:rgba(245,158,11,.22); --q4b:rgba(239,68,68,.22);
}
html.light {
  --bg:#f0f4fa; --surface:#ffffff; --surface2:#e8eef8; --border:#d0daea;
  --accent:#2563eb; --accent2:#059669; --accent3:#d97706; --accent4:#dc2626;
  --text:#0f172a; --text2:#475569; --text3:#94a3b8;
  --q1:rgba(59,130,246,.07); --q2:rgba(16,185,129,.07); --q3:rgba(245,158,11,.07); --q4:rgba(239,68,68,.07);
  --q1b:rgba(59,130,246,.18); --q2b:rgba(16,185,129,.18); --q3b:rgba(245,158,11,.18); --q4b:rgba(239,68,68,.18);
}
html.light body::before{background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px)}
html.light .cg select option{background:#fff;color:#0f172a}
html.light .cluster-ref-select{background:#e8eef8;color:#0f172a}
html.light tbody tr:hover{background:rgba(59,130,246,.05)}
html.light .ic2 input{background:#e8eef8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Geologica',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:28px 20px}

/* HEADER */
header{margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-title h1{font-family:'Unbounded',sans-serif;font-size:clamp(15px,2.5vw,24px);font-weight:700;letter-spacing:-.02em}
.header-title h1 span{color:var(--accent)}
.header-title p{font-size:11px;color:var(--text2);margin-top:5px;font-weight:300}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--text2);font-family:'Unbounded',sans-serif;font-size:10px;padding:8px 16px;border-radius:8px;cursor:pointer;letter-spacing:.05em;transition:all .2s}
.btn-reset:hover{border-color:var(--accent);color:var(--accent)}
.btn-theme{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:16px;width:36px;height:36px;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.btn-theme:hover{border-color:var(--accent);color:var(--accent)}
.header-actions{display:flex;gap:8px;align-items:center}

/* CONTROLS */
.controls{display:grid;grid-template-columns:2fr 1fr 2fr;gap:12px;margin-bottom:20px}
@media(max-width:640px){.controls{grid-template-columns:1fr}}
.cg{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;transition:border-color .2s}
.cg:focus-within{border-color:var(--accent)}
.cg label{display:block;font-size:9.5px;font-family:'Unbounded',sans-serif;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.cg select,.cg input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;cursor:pointer;appearance:none;-webkit-appearance:none}
.cg select option{background:#1a2030;color:var(--text)}

/* CLUSTER INFO */
.cluster-info{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:640px){.cluster-info{grid-template-columns:repeat(2,1fr)}}
.ic{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;position:relative;overflow:hidden}
.ic::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.ic .lbl{font-size:9px;font-family:'Unbounded',sans-serif;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.ic .val{font-size:16px;font-family:'Unbounded',sans-serif;font-weight:700;color:var(--accent)}
.ic .sub{font-size:10.5px;color:var(--text2);margin-top:3px}

/* CLUSTER REFERENCE */
.cluster-ref{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:20px}
.cluster-ref h3{font-size:9.5px;font-family:'Unbounded',sans-serif;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px}
.cluster-ref-grid{display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:3px}
.cluster-ref-grid::-webkit-scrollbar{height:3px}
.cluster-ref-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cp{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;display:flex;flex-direction:column;gap:2px;min-width:100px;flex-shrink:0}
.cp.ac{border-color:var(--accent);background:rgba(59,130,246,.1)}
.cp.nc{border-color:var(--accent2);background:rgba(16,185,129,.1)}
.cp .cpn{font-family:'Unbounded',sans-serif;font-size:8.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.cp .cpr{font-size:10px;font-weight:500;color:var(--text)}
.cp .cpk{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;color:var(--accent3)}
/* Mobile dropdown */
.cluster-ref-select{display:none;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Geologica',sans-serif;font-size:13px;outline:none;appearance:none;-webkit-appearance:none}
@media(max-width:768px){.cluster-ref-grid{display:none}.cluster-ref-select{display:block}}

/* TABLE */
.tw{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.th{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.th h2{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:var(--text);letter-spacing:.02em}
.legend{display:flex;gap:12px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2)}
.ld{width:7px;height:7px;border-radius:50%}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:9px 11px;text-align:right;font-family:'Unbounded',sans-serif;font-size:8px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap}
thead th:first-child,thead th:nth-child(2),thead th:nth-child(3){text-align:left}
tbody tr{border-bottom:1px solid rgba(37,45,61,.4);transition:background .12s}
tbody tr:hover{background:rgba(59,130,246,.03)}
tbody tr:last-child{border-bottom:none}
td{padding:8px 11px;text-align:right;color:var(--text);white-space:nowrap}
td:first-child,td:nth-child(2),td:nth-child(3){text-align:left}
.ql{font-family:'Unbounded',sans-serif;font-size:8.5px;font-weight:600;letter-spacing:.05em;padding:3px 8px;border-radius:5px;display:inline-block}
.q1-label{background:var(--q1b);color:#1d4ed8}
.q2-label{background:var(--q2b);color:#047857}
.q3-label{background:var(--q3b);color:#b45309}
.q4-label{background:var(--q4b);color:#b91c1c}
html:not(.light) .q1-label{color:#93c5fd}
html:not(.light) .q2-label{color:#6ee7b7}
html:not(.light) .q3-label{color:#fcd34d}
html:not(.light) .q4-label{color:#fca5a5}
.q1-row{background:var(--q1)}
.q2-row{background:var(--q2)}
.q3-row{background:var(--q3)}
.q4-row{background:var(--q4)}
.mc{color:var(--text2);font-size:11.5px}
.kc{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:var(--text2)}
/* Input */
.ic2 input{width:128px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;color:var(--text);font-family:'Geologica',sans-serif;font-size:12px;text-align:right;outline:none;transition:border-color .2s,box-shadow .2s}
.ic2 input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.ic2 input::placeholder{color:var(--text3)}
.cc{font-weight:500;color:var(--text)}
.cc.m{color:var(--text2)}
.zc{font-family:'Unbounded',sans-serif;font-size:11.5px;font-weight:700}
.zc.ok{color:#34d399}
.zc.em{color:var(--text3)}
.zck{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700}
.zck.ok{color:var(--accent3)}

/* CHART */
.cw{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:20px}
.cw h2{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:var(--text);letter-spacing:.02em;margin-bottom:16px}
.cc2{position:relative;height:250px}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.sc.blue{border-top:2px solid var(--accent)}
.sc.green{border-top:2px solid var(--accent2)}
.sc.yellow{border-top:2px solid var(--accent3)}
.sc.red{border-top:2px solid var(--accent4)}
.sc .sl{font-size:9px;font-family:'Unbounded',sans-serif;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sc .sv{font-size:21px;font-family:'Unbounded',sans-serif;font-weight:700;margin-bottom:4px}
.sc.blue .sv{color:var(--accent)}
.sc.green .sv{color:var(--accent2)}
.sc.yellow .sv{color:var(--accent3)}
.sc.red .sv{color:var(--accent4)}
.sc .ss{font-size:10.5px;color:var(--text2);line-height:1.5}

@media(max-width:768px){.ic2 input{width:95px;font-size:11px}table{font-size:11px}td,th{padding:6px 7px}.cc2{height:190px}}

/* MOBILE TABLE CARDS */
@media(max-width:640px){
  .table-desktop{display:none}
  .table-mobile{display:block}
  .mob-quarter{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:600;letter-spacing:.06em;padding:10px 14px 6px;border-bottom:1px solid var(--border)}
  .mob-row{border-bottom:1px solid rgba(37,45,61,.3);padding:10px 14px;display:grid;grid-template-columns:1fr 1fr;gap:6px 12px}
  .mob-row:last-child{border-bottom:none}
  .mob-month{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .mob-month-name{font-size:12px;font-weight:500;color:var(--text)}
  .mob-ksez{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;color:var(--text2)}
  .mob-cell{display:flex;flex-direction:column;gap:2px}
  .mob-cell .mob-lbl{font-size:8.5px;font-family:'Unbounded',sans-serif;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
  .mob-cell .mob-val{font-size:11.5px;font-weight:500;color:var(--text)}
  .mob-cell .mob-val.accent{color:var(--accent)}
  .mob-cell .mob-val.muted{color:var(--text2)}
  .mob-fact-wrap{grid-column:1/-1}
  .mob-fact-wrap .mob-lbl{margin-bottom:4px}
  .mob-fact-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:'Geologica',sans-serif;font-size:13px;text-align:right;outline:none;transition:border-color .2s}
  .mob-fact-input:focus{border-color:var(--accent)}
  .mob-zto{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;color:#34d399}
  .mob-zto.em{color:var(--text3)}
  .mob-zck{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;color:var(--accent3)}
  .mob-ql{font-family:'Unbounded',sans-serif;font-size:8px;font-weight:600;letter-spacing:.05em;padding:2px 7px;border-radius:4px;display:inline-block}
}
@media(min-width:641px){
  .table-desktop{display:block}
  .table-mobile{display:none}
}
</style>
</head>
<body>
<div class="container">

<header>
  <div class="header-title">
    <h1>Калькулятор <span>Кластеру ТО</span></h1>
    <p>Розрахунок плану підняття, підтвердження та заліку ТО і К обігу</p>
  </div>
  <div class="header-actions">
    <button class="btn-theme" id="themeBtn" onclick="toggleTheme()" title="Змінити тему">🌙</button>
    <button class="btn-reset" onclick="resetAll()">↺ Скинути</button>
  </div>
</header>

<div class="controls">
  <div class="cg"><label>🏙 Місто</label><select id="citySelect" onchange="onCityChange()"></select></div>
  <div class="cg"><label>📍 К тер</label><input type="number" id="kTer" value="1.05" step="0.01" min="0.5" max="2" onchange="calculate()"></div>
  <div class="cg">
    <label>📊 Поточний кластер</label>
    <select id="clusterSelect" onchange="onClusterChange()">
      <option value="0">Кластер 0 (≥ 40 млн)</option>
      <option value="1" selected>Кластер 1 (27–40 млн)</option>
      <option value="2">Кластер 2 (22–27 млн)</option>
      <option value="3">Кластер 3 (16–22 млн)</option>
      <option value="4">Кластер 4 (12–16 млн)</option>
      <option value="5">Кластер 5 (9.5–12 млн)</option>
      <option value="6">Кластер 6 (6.5–9.5 млн)</option>
      <option value="7">Кластер 7 (5–6.5 млн)</option>
      <option value="8">Кластер 8 (0–5 млн)</option>
    </select>
  </div>
</div>

<div class="cluster-info" id="clusterInfo"></div>

<div class="cluster-ref">
  <h3>Довідник кластерів — <span style="color:var(--accent)">◀ активний</span> &nbsp; <span style="color:var(--accent2)">↑ ціль</span></h3>
  <div class="cluster-ref-grid" id="clusterRefGrid"></div>
  <select class="cluster-ref-select" id="clusterRefSelect"></select>
</div>

<div class="tw">
  <div class="th">
    <h2>Розрахунок по місяцях</h2>
    <div class="legend">
      <div class="li"><div class="ld" style="background:#3b82f6"></div>1 кв.</div>
      <div class="li"><div class="ld" style="background:#10b981"></div>2 кв.</div>
      <div class="li"><div class="ld" style="background:#f59e0b"></div>3 кв.</div>
      <div class="li"><div class="ld" style="background:#ef4444"></div>4 кв.</div>
    </div>
  </div>
  <div class="table-desktop" style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th style="text-align:left">Квартал</th>
          <th style="text-align:left">Місяць</th>
          <th style="text-align:left">К сез</th>
          <th>Факт. ТО</th>
          <th>План підняття</th>
          <th>План підтвердж.</th>
          <th>Залік ТО</th>
          <th>Залік К обігу</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="table-mobile" id="tableMobile"></div>
</div>

<div class="cw">
  <h2>📈 Виконання ТО vs Plan</h2>
  <div class="cc2"><canvas id="toChart"></canvas></div>
</div>

<div class="summary" id="summary"></div>

</div>

  {name:'Слов\'янськ',   kTer:1.00, m:null},
  {name:'Сокільники',    kTer:1.00, m:null},
  {name:'Стрий',         kTer:1.00, m:null},
  {name:'Суми',          kTer:1.00, m:null},
  {name:'Тернопіль',     kTer:1.00, m:null},
  {name:'Ужгород',       kTer:1.00, m:null},
  {name:'Умань',         kTer:1.00, m:null},
  {name:'Фастів',        kTer:1.00, m:[0.73,0.76,0.88,0.97,1.05,1.01,1.05,1.38,1.48,0.96,0.82,0.91]},
  {name:'Харків',        kTer:1.00, m:[0.73,0.76,0.88,0.97,1.05,1.01,1.05,1.38,1.48,0.96,0.82,0.91]},
  {name:'Херсон',        kTer:1.00, m:null},
  {name:'Хмельницький',  kTer:1.00, m:null},
  {name:'Хуст',          kTer:1.00, m:null},
  {name:'Чабани',        kTer:1.00, m:[0.75,0.78,0.83,0.89,0.97,0.99,1.01,1.38,1.53,0.96,0.89,1.00]},
  {name:'Черкаси',       kTer:1.00, m:null},
  {name:'Чернігів',      kTer:1.00, m:null},
  {name:'Чернівці',      kTer:1.00, m:null},
  {name:'Чорноморськ',   kTer:1.00, m:null},
  {name:'Шепетівка',     kTer:1.00, m:null},
  {name:'Шептицький',    kTer:1.00, m:null},
  {name:'Шостка',        kTer:1.00, m:null},
];

const MONTHS=[
  {n:'Квітень',q:1},{n:'Травень',q:1},{n:'Червень',q:1},
  {n:'Липень',q:2},{n:'Серпень',q:2},{n:'Вересень',q:2},
  {n:'Жовтень',q:3},{n:'Листопад',q:3},{n:'Грудень',q:3},
  {n:'Січень',q:4},{n:'Лютий',q:4},{n:'Березень',q:4},
];
const QC=['q1','q2','q3','q4'];
const QL=['1 квартал','2 квартал','3 квартал','4 квартал'];

let factSales=new Array(12).fill(null);
let chartInstance=null;

// ===== HELPERS =====
function fmt(n){if(n==null||isNaN(n))return'—';return Math.round(n).toLocaleString('uk-UA')}
function fmtP(n){if(n==null)return'—';return(n*100).toFixed(0)+'%'}
function cityData(){return CITIES[parseInt(document.getElementById('citySelect').value)]}
function getKTer(){return parseFloat(document.getElementById('kTer').value)||1.00}
function curCl(){return parseInt(document.getElementById('clusterSelect').value)}
function nextCl(){const c=curCl();return c>0?c-1:null}
function getKSez(i){const c=cityData();return c.m?c.m[i]:BASE[i]}

// Залік ТО — IF(f2>0): (f0/k0+f1/k1+f2/k2)/3; IF(f1>0): (f0/k0+f1/k1+planC2)/3; IF(f0>0): (f0/k0+planC1+planC2)/3
function calcZTO(facts,ks,plansC){
  const[f0,f1,f2]=[facts[0],facts[1],facts[2]];
  const[k0,k1,k2]=ks;
  const[p0,p1,p2]=plansC;
  if(f2>0) return((f0||0)/k0+(f1||0)/k1+f2/k2)/3;
  if(f1>0) return((f0||0)/k0+f1/k1+p2)/3;
  if(f0>0) return(f0/k0+p1+p2)/3;
  return null;
}

// Залік К обігу = kMult кластера в який потрапляє залік ТО кварталу
function calcZK(zto){
  if(zto===null)return null;
  for(let i=0;i<CLUSTERS.length;i++){
    if(zto>=CLUSTERS[i].toMin)return CLUSTERS[i].kMult;
  }
  return CLUSTERS[CLUSTERS.length-1].kMult;
}

// ===== INIT =====
function initCitySelect(){
  const sel=document.getElementById('citySelect');
  CITIES.forEach((c,i)=>{
    const o=document.createElement('option');
    o.value=i; o.textContent=c.name+(c.m?'':' *');
    if(c.name==='Київ')o.selected=true;
    sel.appendChild(o);
  });
}

function renderClusterRef(){
  const cur=curCl(),nxt=nextCl();
  const grid=document.getElementById('clusterRefGrid');
  const sel=document.getElementById('clusterRefSelect');
  grid.innerHTML=''; sel.innerHTML='';
  CLUSTERS.forEach(cl=>{
    const isA=cl.id===cur,isN=cl.id===nxt;
    const fmtM=v=>v===Infinity?'∞':((v/1e6)%1===0?(v/1e6).toFixed(0):(v/1e6).toFixed(1))+'млн';
    const mx=fmtM(cl.toMax);
    const mn=fmtM(cl.toMin);
    const pill=document.createElement('div');
    pill.className='cp'+(isA?' ac':isN?' nc':'');
    pill.innerHTML=`<div class="cpn">Кл.${cl.label}${isA?' ◀':isN?' ↑':''}</div><div class="cpr">${mn}–${mx}</div><div class="cpk">×${cl.kMult}</div>`;
    grid.appendChild(pill);
    const o=document.createElement('option');
    o.value=cl.id;
    o.textContent=`Кластер ${cl.label}: ${mn}–${mx} (×${cl.kMult})${isA?' ◀ поточний':isN?' ↑ ціль':''}`;
    sel.appendChild(o);
  });
}

function renderClusterInfo(){
  const c=cityData(),cc=CLUSTERS[curCl()],nc=nextCl()!==null?CLUSTERS[nextCl()]:null;
  document.getElementById('clusterInfo').innerHTML=`
    <div class="ic"><div class="lbl">Місто</div><div class="val" style="font-size:13px">${c.name}</div><div class="sub">К тер = ${getKTer()}</div></div>
    <div class="ic"><div class="lbl">Поточний кластер</div><div class="val">${cc.label}</div><div class="sub">ТО мін: ${fmt(cc.toMin)}</div></div>
    <div class="ic"><div class="lbl">Ціль (підняття)</div><div class="val" style="color:var(--accent2)">${nc?nc.label:'—'}</div><div class="sub">${nc?'ТО мін: '+fmt(nc.toMin):'Макс. кластер'}</div></div>
    <div class="ic"><div class="lbl">К множення</div><div class="val" style="color:var(--accent3)">${cc.kMult}</div><div class="sub">Залік К обігу</div></div>`;
}

function renderTable(){
  const cc=CLUSTERS[curCl()],nc=nextCl()!==null?CLUSTERS[nextCl()]:null;
  const tbody=document.getElementById('tableBody');
  tbody.innerHTML='';
  const quarters=[{q:1,idx:[0,1,2]},{q:2,idx:[3,4,5]},{q:3,idx:[6,7,8]},{q:4,idx:[9,10,11]}];
  let sumZTO=0,cntZTO=0,lastZK=null;

  quarters.forEach((qt,qi)=>{
    const qc=QC[qi];
    const facts=qt.idx.map(i=>factSales[i]);
    const ks=qt.idx.map(i=>getKSez(i));
    const plansC=qt.idx.map(i=>cc.toMin*getKSez(i));
    const zto=calcZTO(facts,ks,plansC);
    const zk=calcZK(zto);
    if(zto!==null){sumZTO+=zto;cntZTO++;}
    if(zk!==null)lastZK=zk;

    qt.idx.forEach((mi,qmi)=>{
      const ks_m=getKSez(mi);
      const fact=factSales[mi];
      const pR=nc?nc.toMin*ks_m:null;
      const pC=cc.toMin*ks_m;
      const tr=document.createElement('tr');
      tr.className=qc+'-row';
      const qLabel=qmi===0?`<span class="ql ${qc}-label">${QL[qi]}</span>`:'';
      const ztoCell=qmi===2?`<span class="zc ${zto!==null?'ok':'em'}">${zto!==null?fmt(zto):'—'}</span>`:'';
      const zkCell=qmi===2?`<span class="zck ${zk!=null?'ok':''}">${zk!=null?'×'+zk:'—'}</span>`:'';
      const factVal=fact!==null?Math.round(fact).toLocaleString('uk-UA'):'';
      tr.innerHTML=`
        <td>${qLabel}</td>
        <td class="mc">${MONTHS[mi].n}</td>
        <td class="kc">${fmtP(ks_m)}</td>
        <td class="ic2"><input type="text" id="fact_${mi}" placeholder="—" value="${factVal}" onchange="onFact(${mi},this.value)" onfocus="this.select()"></td>
        <td class="cc">${pR!==null?fmt(pR):'—'}</td>
        <td class="cc m">${fmt(pC)}</td>
        <td>${ztoCell}</td>
        <td>${zkCell}</td>`;
      tbody.appendChild(tr);
    });
  });
  renderSummary(cntZTO>0?sumZTO:null,lastZK,cc,nc);
  renderChart();
  renderMobileTable();
}

function renderMobileTable(){
  const cc=CLUSTERS[curCl()],nc=nextCl()!==null?CLUSTERS[nextCl()]:null;
  const mob=document.getElementById('tableMobile');
  mob.innerHTML='';
  const quarters=[{q:1,idx:[0,1,2],qc:'q1',ql:'1 квартал'},{q:2,idx:[3,4,5],qc:'q2',ql:'2 квартал'},{q:3,idx:[6,7,8],qc:'q3',ql:'3 квартал'},{q:4,idx:[9,10,11],qc:'q4',ql:'4 квартал'}];
  const isLight=document.documentElement.classList.contains('light');
  const qColors=isLight?{'q1':'#1d4ed8','q2':'#047857','q3':'#b45309','q4':'#b91c1c'}:{'q1':'#93c5fd','q2':'#6ee7b7','q3':'#fcd34d','q4':'#fca5a5'};
  const qBg={'q1':'rgba(59,130,246,.18)','q2':'rgba(16,185,129,.18)','q3':'rgba(245,158,11,.18)','q4':'rgba(239,68,68,.18)'};

  quarters.forEach(qt=>{
    const facts=qt.idx.map(i=>factSales[i]);
    const ks=qt.idx.map(i=>getKSez(i));
    const plansC=qt.idx.map(i=>cc.toMin*getKSez(i));
    const zto=calcZTO(facts,ks,plansC);
    const zk=calcZK(zto);

    const qHead=document.createElement('div');
    qHead.className='mob-quarter';
    qHead.style.cssText=`color:${qColors[qt.qc]};background:${qBg[qt.qc]}`;
    qHead.innerHTML=`<span class="mob-ql" style="background:${qBg[qt.qc]};color:${qColors[qt.qc]}">${qt.ql}</span>`;
    mob.appendChild(qHead);

    qt.idx.forEach((mi,qmi)=>{
      const ks_m=getKSez(mi);
      const fact=factSales[mi];
      const pR=nc?nc.toMin*ks_m:null;
      const pC=cc.toMin*ks_m;
      const factVal=fact!==null?Math.round(fact).toLocaleString('uk-UA'):'';
      const isLastOfQ=qmi===2;

      const row=document.createElement('div');
      row.className='mob-row';
      row.style.background=`var(--${qt.qc})`;

      let ztoHtml='', zkHtml='';
      if(isLastOfQ){
        ztoHtml=`<div class="mob-cell"><div class="mob-lbl">Залік ТО</div><div class="mob-val"><span class="mob-zto ${zto!==null?'':'em'}">${zto!==null?fmt(zto):'—'}</span></div></div>`;
        zkHtml=`<div class="mob-cell"><div class="mob-lbl">Залік К обігу</div><div class="mob-val"><span class="mob-zck">${zk!==null?'×'+zk:'—'}</span></div></div>`;
      }

      row.innerHTML=`
        <div class="mob-month">
          <span class="mob-month-name">${MONTHS[mi].n}</span>
          <span class="mob-ksez">${fmtP(ks_m)}</span>
        </div>
        <div class="mob-fact-wrap mob-cell">
          <div class="mob-lbl">Факт. ТО</div>
          <input class="mob-fact-input" type="text" id="mob_fact_${mi}" placeholder="—" value="${factVal}" onchange="onFact(${mi},this.value)" onfocus="this.select()">
        </div>
        <div class="mob-cell"><div class="mob-lbl">План підняття</div><div class="mob-val accent">${pR!==null?fmt(pR):'—'}</div></div>
        <div class="mob-cell"><div class="mob-lbl">План підтвердж.</div><div class="mob-val muted">${fmt(pC)}</div></div>
        ${ztoHtml}${zkHtml}`;
      mob.appendChild(row);
    });
  });
}

function renderSummary(zto,zk,cc,nc){
  document.getElementById('summary').innerHTML=`
    <div class="sc blue"><div class="sl">Залік ТО</div><div class="sv">${zto!==null?fmt(zto):'—'}</div><div class="ss">Сума заліків по кварталах</div></div>
    <div class="sc green"><div class="sl">Залік К обігу</div><div class="sv">${zk!==null?'×'+zk:'—'}</div><div class="ss">К множення поточного кластера ${cc.label}</div></div>
    <div class="sc yellow"><div class="sl">ТО для підняття</div><div class="sv" style="font-size:16px">${nc?fmt(nc.toMin):'—'}</div><div class="ss">${nc?'Мінімум кластеру '+nc.label:'Максимальний кластер'}</div></div>
    <div class="sc red"><div class="sl">ТО для підтвердження</div><div class="sv" style="font-size:16px">${fmt(cc.toMin)}</div><div class="ss">Мінімум кластеру ${cc.label}</div></div>`;
}

function renderChart(){
  const isLight=document.documentElement.classList.contains('light');
  const cc=CLUSTERS[curCl()],nc=nextCl()!==null?CLUSTERS[nextCl()]:null;
  const labels=MONTHS.map(m=>m.n);
  const factData=factSales.map(f=>f!==null&&f>0?f:null);
  const planR=MONTHS.map((_,i)=>nc?Math.round(nc.toMin*getKSez(i)):null);
  const planC=MONTHS.map((_,i)=>Math.round(cc.toMin*getKSez(i)));
  const ctx=document.getElementById('toChart').getContext('2d');
  if(chartInstance)chartInstance.destroy();
  chartInstance=new Chart(ctx,{
    type:'bar',
    data:{
      labels,
      datasets:[
        {
          label:'Факт ТО',
          data:factData,
          backgroundColor:factData.map((v,i)=>{
            if(!v)return'rgba(59,130,246,.12)';
            if(nc&&v>=planR[i])return'rgba(16,185,129,.65)';
            if(v>=planC[i])return'rgba(59,130,246,.65)';
            return'rgba(239,68,68,.55)';
          }),
          borderColor:factData.map((v,i)=>{
            if(!v)return'rgba(59,130,246,.3)';
            if(nc&&v>=planR[i])return'#10b981';
            if(v>=planC[i])return'#3b82f6';
            return'#ef4444';
          }),
          borderWidth:1,borderRadius:4,order:3
        },
        {
          label:'План підняття',data:planR,type:'line',
          borderColor:'rgba(16,185,129,.75)',backgroundColor:'transparent',
          borderWidth:2,borderDash:[4,3],pointRadius:3,pointBackgroundColor:'#10b981',
          tension:.3,order:1
        },
        {
          label:'План підтвердження',data:planC,type:'line',
          borderColor:'rgba(245,158,11,.75)',backgroundColor:'transparent',
          borderWidth:2,borderDash:[6,4],pointRadius:3,pointBackgroundColor:'#f59e0b',
          tension:.3,order:2
        }
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:isLight?'#475569':'#8899b4',font:{family:'Geologica',size:10},usePointStyle:true,pointStyleWidth:8}},
        tooltip:{
          backgroundColor:isLight?'#ffffff':'#141820',borderColor:isLight?'#d0daea':'#252d3d',borderWidth:1,
          titleColor:isLight?'#0f172a':'#e8edf5',bodyColor:isLight?'#475569':'#8899b4',
          callbacks:{label(ctx){const v=ctx.raw;if(v==null)return ctx.dataset.label+': —';return ctx.dataset.label+': '+Math.round(v).toLocaleString('uk-UA')}}
        }
      },
      scales:{
        x:{grid:{color:isLight?'rgba(148,163,184,.25)':'rgba(37,45,61,.5)'},ticks:{color:isLight?'#475569':'#8899b4',font:{family:'Geologica',size:9}}},
        y:{grid:{color:isLight?'rgba(148,163,184,.25)':'rgba(37,45,61,.5)'},ticks:{color:isLight?'#475569':'#8899b4',font:{family:'Geologica',size:9},callback(v){return(v/1e6).toFixed(0)+' млн'}}}
      }
    }
  });
}

// ===== EVENTS =====
function onFact(i,val){
  const clean=val.replace(/[\s\u00a0]/g,'').replace(',','.');
  const num=parseFloat(clean);
  factSales[i]=isNaN(num)||val.trim()===''?null:num;
  const inp=document.getElementById('fact_'+i);
  if(factSales[i]!==null)inp.value=Math.round(factSales[i]).toLocaleString('uk-UA');
  calculate();
}
function onClusterChange(){renderClusterRef();renderClusterInfo();renderTable()}
function onCityChange(){
  const c=cityData();
  document.getElementById('kTer').value=c.kTer;
  renderClusterRef();renderClusterInfo();renderTable();
}
function calculate(){renderClusterInfo();renderTable()}
function resetAll(){
  factSales=new Array(12).fill(null);
  document.querySelectorAll('input[id^="fact_"]').forEach(i=>i.value='');
  calculate();
}

// ===== THEME =====
function toggleTheme(){
  const isLight=document.documentElement.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'☀️':'🌙';
  localStorage.setItem('theme',isLight?'light':'dark');
  renderChart();
}
(function initTheme(){
  const saved=localStorage.getItem('theme');
  if(saved==='light'){document.documentElement.classList.add('light');document.getElementById('themeBtn').textContent='☀️';}
})();

initCitySelect();
renderClusterRef();
renderClusterInfo();
renderTable();
</script>
