<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кластер ТО</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:     #1C1C1E;
  --card:   #2C2C2E;
  --card2:  #3A3A3C;
  --border: #48484A;
  --text:   #FFFFFF;
  --text2:  #AEAEB2;
  --text3:  #636366;
  --green:  #30D158;
  --red:    #FF453A;
  --blue:   #0A84FF;
  --yellow: #FFD60A;
  --r6: 6px; --r10: 10px; --r14: 14px; --r20: 20px; --r28: 28px;
  --f: 'Inter', system-ui, sans-serif;
}
html.light {
  --bg:     #F2F2F7;
  --card:   #FFFFFF;
  --card2:  #E5E5EA;
  --border: #D1D1D6;
  --text:   #000000;
  --text2:  #3C3C43;
  --text3:  #8E8E93;
  --green:  #34C759;
  --red:    #FF3B30;
  --blue:   #007AFF;
  --yellow: #FF9500;
}
html.light .ctrl-card select option { background: #fff; color: #000; }
html.light .cl-sel { background: #fff; }
html.light .finp { background: #F2F2F7; }
html.light .mb-fi { background: #F2F2F7; }
html.light table.mt tbody tr:hover { background: rgba(0,0,0,.03); }
html.light table.mt tbody tr { border-bottom-color: rgba(0,0,0,.06); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scrollbar-width: thin; scrollbar-color: var(–card2) var(–bg); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(–card2); border-radius: 2px; }

body {
font-family: var(–f);
background: var(–bg);
color: var(–text);
min-height: 100vh;
-webkit-font-smoothing: antialiased;
font-size: 14px;
}

.page { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }

/* ── HEADER ── */
.hdr {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 28px;
gap: 16px;
flex-wrap: wrap;
}
.hdr-title {
font-size: 22px;
font-weight: 700;
letter-spacing: -.03em;
color: var(–text);
}
.hdr-title span { color: var(–green); }
.hdr-sub {
font-size: 12px;
color: var(–text3);
font-weight: 400;
margin-top: 3px;
letter-spacing: .01em;
}
.hdr-btns { display: flex; gap: 8px; }
.btn {
background: var(–card);
border: 1px solid var(–border);
color: var(–text2);
font-family: var(–f);
font-size: 12px;
font-weight: 500;
padding: 8px 16px;
border-radius: 100px;
cursor: pointer;
transition: all .15s;
letter-spacing: .01em;
}
.btn:hover { background: var(–card2); color: var(–text); }
.btn-ico { width: 34px; height: 34px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; border-radius: 50%; }

/* ── CARD ── */
.card {
background: var(–card);
border-radius: var(–r20);
padding: 20px;
margin-bottom: 12px;
}
.card-sm { padding: 16px 20px; }

/* ── CONTROLS ── */
.ctrl-grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 10px;
margin-bottom: 12px;
}
@media(max-width:580px) { .ctrl-grid { grid-template-columns: 1fr; } }

.ctrl-card {
background: var(–card);
border-radius: var(–r14);
padding: 14px 16px;
border: 1px solid var(–border);
transition: border-color .15s;
}
.ctrl-card:focus-within { border-color: var(–green); }
.ctrl-lbl {
display: block;
font-size: 10px;
font-weight: 600;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–text3);
margin-bottom: 6px;
}
.ctrl-card select,
.ctrl-card input {
width: 100%;
background: transparent;
border: none;
outline: none;
color: var(–text);
font-family: var(–f);
font-size: 14px;
font-weight: 600;
cursor: pointer;
appearance: none;
-webkit-appearance: none;
}
.ctrl-card select option { background: #2C2C2E; color: #fff; }

/* ── KPI ROW ── */
.kpi-row {
display: grid;
grid-template-columns: repeat(4,1fr);
gap: 10px;
margin-bottom: 12px;
}
@media(max-width:580px) { .kpi-row { grid-template-columns: repeat(2,1fr); } }
.kpi-card {
background: var(–card);
border-radius: var(–r14);
padding: 16px;
border: 1px solid var(–border);
position: relative;
overflow: hidden;
}
.kpi-lbl {
font-size: 10px;
font-weight: 600;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–text3);
margin-bottom: 8px;
}
.kpi-val {
font-size: 26px;
font-weight: 700;
letter-spacing: -.03em;
line-height: 1;
color: var(–text);
}
.kpi-val.green { color: var(–green); }
.kpi-val.yellow { color: var(–yellow); }
.kpi-val.sm { font-size: 18px; }
.kpi-sub { font-size: 10.5px; color: var(–text3); margin-top: 5px; }

/* ── CLUSTER REF ── */
.cl-section { margin-bottom: 12px; }
.cl-lbl {
font-size: 10px;
font-weight: 600;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–text3);
margin-bottom: 8px;
padding: 0 2px;
}
.cl-scroll {
display: flex;
gap: 6px;
overflow-x: auto;
padding-bottom: 4px;
}
.cl-scroll::-webkit-scrollbar { height: 0; }
.cl-chip {
flex-shrink: 0;
background: var(–card);
border: 1px solid var(–border);
border-radius: var(–r10);
padding: 8px 12px;
min-width: 80px;
cursor: default;
transition: all .15s;
}
.cl-chip.cur { background: var(–card2); border-color: var(–green); }
.cl-chip.nxt { border-color: var(–blue); }
.cl-chip-nm {
font-size: 9px;
font-weight: 700;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–text3);
margin-bottom: 3px;
}
.cl-chip.cur .cl-chip-nm { color: var(–green); }
.cl-chip.nxt .cl-chip-nm { color: var(–blue); }
.cl-chip-rng { font-size: 10px; font-weight: 500; color: var(–text2); line-height: 1.3; }
.cl-chip-k { font-size: 13px; font-weight: 700; color: var(–text3); margin-top: 2px; }
.cl-chip.cur .cl-chip-k { color: var(–yellow); }
.cl-chip.nxt .cl-chip-k { color: var(–yellow); }

.cl-sel {
display: none;
width: 100%;
background: var(–card);
border: 1px solid var(–border);
border-radius: var(–r10);
padding: 10px 14px;
color: var(–text);
font-family: var(–f);
font-size: 13px;
font-weight: 500;
outline: none;
appearance: none;
-webkit-appearance: none;
}
@media(max-width:768px) { .cl-scroll { display: none; } .cl-sel { display: block; } }

/* ── QUARTERS ── */
.q-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }

.q-card {
background: var(–card);
border-radius: var(–r20);
overflow: hidden;
border: 1px solid var(–border);
}
.q-head {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 20px;
border-bottom: 1px solid var(–border);
gap: 12px;
flex-wrap: wrap;
}
.q-head-left { display: flex; align-items: center; gap: 12px; }
.q-num-badge {
width: 36px; height: 36px;
border-radius: var(–r10);
display: flex; align-items: center; justify-content: center;
font-size: 15px; font-weight: 700;
flex-shrink: 0;
}
.q1 .q-num-badge { background: rgba(255,255,255,.08); color: var(–text); }
.q2 .q-num-badge { background: rgba(48,209,88,.12); color: var(–green); }
.q3 .q-num-badge { background: rgba(255,214,10,.1); color: var(–yellow); }
.q4 .q-num-badge { background: rgba(10,132,255,.1); color: var(–blue); }
.q-title { font-size: 13px; font-weight: 700; letter-spacing: -.01em; }
.q-hint { font-size: 11px; color: var(–text3); margin-top: 1px; font-weight: 400; }
.q-zalik { text-align: right; }
.q-z-lbl { font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(–text3); margin-bottom: 3px; }
.q-z-val { font-size: 20px; font-weight: 700; letter-spacing: -.02em; color: var(–green); line-height: 1; }
.q-z-val.em { font-size: 14px; color: var(–text3); font-weight: 400; }
.q-z-k {
display: inline-block;
font-size: 11px; font-weight: 700;
color: var(–yellow);
background: rgba(255,214,10,.1);
border-radius: var(–r6);
padding: 2px 8px;
margin-top: 4px;
}

/* Desktop table */
.dt { overflow-x: auto; }
table.mt { width: 100%; border-collapse: collapse; }
table.mt thead th {
padding: 9px 16px;
text-align: right;
font-size: 9.5px;
font-weight: 700;
letter-spacing: .09em;
text-transform: uppercase;
color: var(–text3);
background: rgba(255,255,255,.02);
border-bottom: 1px solid var(–border);
white-space: nowrap;
}
table.mt thead th:first-child { text-align: left; padding-left: 20px; }
table.mt thead th:nth-child(2) { text-align: left; }
table.mt tbody tr { border-bottom: 1px solid rgba(255,255,255,.04); transition: background .1s; }
table.mt tbody tr:last-child { border-bottom: none; }
table.mt tbody tr:hover { background: rgba(255,255,255,.025); }
table.mt td { padding: 10px 16px; text-align: right; vertical-align: middle; }
table.mt td:first-child { padding-left: 20px; text-align: left; }
table.mt td:nth-child(2) { text-align: left; }
.td-nm { font-size: 13px; font-weight: 600; }
.td-ks { font-size: 13px; font-weight: 500; color: var(–text2); }
.td-pr { font-size: 13px; font-weight: 600; color: var(–green); }
.td-pc { font-size: 13px; font-weight: 700; color: var(–yellow); }

.finp {
width: 130px;
background: var(–card2);
border: 1px solid var(–border);
border-radius: var(–r6);
padding: 6px 10px;
color: var(–text);
font-family: var(–f);
font-size: 13px;
font-weight: 600;
text-align: right;
outline: none;
transition: all .15s;
}
.finp:focus { border-color: var(–green); box-shadow: 0 0 0 2px rgba(48,209,88,.2); }
.finp::placeholder { color: var(–text3); font-weight: 400; }

/* Mobile */
.mb-rows { display: none; }
@media(max-width:600px) { .dt { display: none; } .mb-rows { display: block; } }
.mb-row { padding: 13px 18px; border-bottom: 1px solid rgba(255,255,255,.05); }
.mb-row:last-child { border-bottom: none; }
.mb-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 11px; }
.mb-nm { font-size: 15px; font-weight: 700; }
.mb-ks { font-size: 13px; font-weight: 500; color: var(–text2); }
.mb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mb-cell { display: flex; flex-direction: column; gap: 3px; }
.mb-lbl { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(–text3); }
.mb-v { font-size: 14px; font-weight: 700; }
.mb-v.g { color: var(–green); }
.mb-v.y { color: var(–yellow); }
.mb-fw { grid-column: 1/-1; }
.mb-fi {
width: 100%;
background: var(–card2);
border: 1px solid var(–border);
border-radius: var(–r10);
padding: 10px 14px;
color: var(–text);
font-family: var(–f);
font-size: 15px;
font-weight: 600;
text-align: right;
outline: none;
transition: all .15s;
}
.mb-fi:focus { border-color: var(–green); box-shadow: 0 0 0 2px rgba(48,209,88,.2); }

/* ── CHART ── */
.chart-card { background: var(–card); border-radius: var(–r20); padding: 20px; margin-bottom: 12px; border: 1px solid var(–border); }
.ch-hd {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
flex-wrap: wrap;
gap: 8px;
}
.ch-title { font-size: 13px; font-weight: 700; letter-spacing: -.01em; }
.ch-leg { display: flex; gap: 14px; flex-wrap: wrap; }
.ch-li { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: var(–text2); }
.ch-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.ch-wrap { position: relative; height: 200px; }

/* ── SUMMARY ── */
.sum-grid {
display: grid;
grid-template-columns: repeat(4,1fr);
gap: 10px;
margin-bottom: 0;
}
@media(max-width:580px) { .sum-grid { grid-template-columns: repeat(2,1fr); } }
.sum-card {
background: var(–card);
border-radius: var(–r14);
padding: 16px;
border: 1px solid var(–border);
}
.sum-lbl { font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(–text3); margin-bottom: 8px; }
.sum-val { font-size: 28px; font-weight: 700; letter-spacing: -.03em; line-height: 1; margin-bottom: 4px; }
.sum-val.c1 { color: var(–text); }
.sum-val.c2 { color: var(–yellow); }
.sum-val.c3 { color: var(–green); font-size: 22px; }
.sum-val.c4 { color: var(–text); font-size: 22px; }
.sum-sub { font-size: 10.5px; color: var(–text3); line-height: 1.4; }

/* ── FOOT ── */
.foot { padding: 20px 0 0; }
.foot-note { font-size: 10px; color: var(–text3); }

/* Section label */
.sec-lbl {
font-size: 10px;
font-weight: 600;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–text3);
margin-bottom: 8px;
padding: 0 2px;
}
</style>

</head>
<body>
<div class="page">

<!-- HEADER -->

<div class="hdr">
  <div>
    <div class="hdr-title">Кластер <span>ТО</span></div>
    <div class="hdr-sub">Розрахунок плану підняття, підтвердження та заліку ТО і К обігу</div>
  </div>
  <div class="hdr-btns">
    <button class="btn btn-ico" id="themeBtn" onclick="toggleTheme()">☀️</button>
    <button class="btn" onclick="resetAll()">↺ Скинути</button>
  </div>
</div>

<!-- CONTROLS -->

<div class="ctrl-grid">
  <div class="ctrl-card">
    <label class="ctrl-lbl" for="citySelect">Місто</label>
    <select id="citySelect" onchange="onCityChange()"></select>
  </div>
  <div class="ctrl-card">
    <label class="ctrl-lbl" for="kTer">К тер</label>
    <input type="number" id="kTer" value="1.05" step="0.01" min="0.5" max="2" onchange="calculate()">
  </div>
  <div class="ctrl-card">
    <label class="ctrl-lbl" for="clusterSelect">Поточний кластер</label>
    <select id="clusterSelect" onchange="onClusterChange()">
      <option value="0">Кластер 0 — ≥ 40 млн</option>
      <option value="1" selected>Кластер 1 — 27–40 млн</option>
      <option value="2">Кластер 2 — 22–27 млн</option>
      <option value="3">Кластер 3 — 16–22 млн</option>
      <option value="4">Кластер 4 — 12–16 млн</option>
      <option value="5">Кластер 5 — 9.5–12 млн</option>
      <option value="6">Кластер 6 — 6.5–9.5 млн</option>
      <option value="7">Кластер 7 — 5–6.5 млн</option>
      <option value="8">Кластер 8 — 0–5 млн</option>
    </select>
  </div>
</div>

<!-- KPI -->

<div class="kpi-row" id="clusterInfo"></div>

<!-- CLUSTER REF -->

<div class="cl-section">
  <div class="sec-lbl">Довідник кластерів — <span style="color:var(--green)">◀ поточний</span> &nbsp;<span style="color:var(--blue)">↑ ціль</span></div>
  <div class="cl-scroll" id="clusterRefGrid"></div>
  <select class="cl-sel" id="clusterRefSelect"></select>
</div>

<!-- QUARTERS -->

<div class="sec-lbl">Місяці по кварталах</div>
<div class="q-wrap" id="quartersWrap"></div>

<!-- CHART -->

<div class="chart-card">
  <div class="ch-hd">
    <span class="ch-title">Динаміка ТО</span>
    <div class="ch-leg">
      <div class="ch-li"><div class="ch-dot" style="background:rgba(255,255,255,.25)"></div>Факт</div>
      <div class="ch-li"><div class="ch-dot" style="background:var(--green)"></div>Підняття</div>
      <div class="ch-li"><div class="ch-dot" style="background:var(--yellow)"></div>Підтвердж.</div>
    </div>
  </div>
  <div class="ch-wrap"><canvas id="toChart"></canvas></div>
</div>

<!-- SUMMARY -->

<div class="sec-lbl">Підсумок</div>
<div class="sum-grid" id="summary"></div>

<div class="foot"><span class="foot-note">* — базові коефіцієнти сезонності (Київ)</span></div>

</div>

  {name:'Сокільники',kTer:1.00,m:null},{name:'Стрий',kTer:1.00,m:null},
  {name:'Суми',kTer:1.00,m:null},{name:'Тернопіль',kTer:1.00,m:null},
  {name:'Ужгород',kTer:1.00,m:null},{name:'Умань',kTer:1.00,m:null},
  {name:'Фастів',kTer:1.00,m:[0.73,0.76,0.88,0.97,1.05,1.01,1.05,1.38,1.48,0.96,0.82,0.91]},
  {name:'Харків',kTer:1.00,m:[0.73,0.76,0.88,0.97,1.05,1.01,1.05,1.38,1.48,0.96,0.82,0.91]},
  {name:'Херсон',kTer:1.00,m:null},{name:'Хмельницький',kTer:1.00,m:null},
  {name:'Хуст',kTer:1.00,m:null},
  {name:'Чабани',kTer:1.00,m:[0.75,0.78,0.83,0.89,0.97,0.99,1.01,1.38,1.53,0.96,0.89,1.00]},
  {name:'Черкаси',kTer:1.00,m:null},{name:'Чернігів',kTer:1.00,m:null},
  {name:'Чернівці',kTer:1.00,m:null},{name:'Чорноморськ',kTer:1.00,m:null},
  {name:'Шепетівка',kTer:1.00,m:null},{name:'Шептицький',kTer:1.00,m:null},
  {name:'Шостка',kTer:1.00,m:null},
];
const MONTHS=[
  {n:'Квітень'},{n:'Травень'},{n:'Червень'},
  {n:'Липень'},{n:'Серпень'},{n:'Вересень'},
  {n:'Жовтень'},{n:'Листопад'},{n:'Грудень'},
  {n:'Січень'},{n:'Лютий'},{n:'Березень'},
];
const QS=[
  {qi:1,cls:'q1',idx:[0,1,2],label:'1 квартал',hint:'Квітень — Червень'},
  {qi:2,cls:'q2',idx:[3,4,5],label:'2 квартал',hint:'Липень — Вересень'},
  {qi:3,cls:'q3',idx:[6,7,8],label:'3 квартал',hint:'Жовтень — Грудень'},
  {qi:4,cls:'q4',idx:[9,10,11],label:'4 квартал',hint:'Січень — Березень'},
];

let factSales=new Array(12).fill(null);
let chartInst=null;

const fmt=n=>n==null||isNaN(n)?'—':Math.round(n).toLocaleString('uk-UA');
const fmtP=n=>n==null?'—':(n*100).toFixed(0)+'%';
const cityData=()=>CITIES[+document.getElementById('citySelect').value];
const getKTer=()=>parseFloat(document.getElementById('kTer').value)||1;
const curCl=()=>+document.getElementById('clusterSelect').value;
const nextCl=()=>{const c=curCl();return c>0?c-1:null};
const getKSez=i=>{const c=cityData();return c.m?c.m[i]:BASE[i]};
const fmtM=v=>v===Infinity?'∞':((v/1e6)%1===0?(v/1e6).toFixed(0):(v/1e6).toFixed(1))+'млн';

function calcZTO(facts,ks,plansC){
  const[f0,f1,f2]=[facts[0],facts[1],facts[2]],[k0,k1,k2]=ks,[,p1,p2]=plansC;
  if(f2>0)return((f0||0)/k0+(f1||0)/k1+f2/k2)/3;
  if(f1>0)return((f0||0)/k0+f1/k1+p2/k2)/3;
  if(f0>0)return(f0/k0+p1/k1+p2/k2)/3;
  return null;
}
function calcZK(zto){
  if(zto===null)return null;
  for(let i=0;i<CLUSTERS.length;i++)if(zto>=CLUSTERS[i].toMin)return CLUSTERS[i].kMult;
  return CLUSTERS[CLUSTERS.length-1].kMult;
}
function calcPlan(toMin,k0,k1,k2,f0,f1,f2,qmi){
  const t=toMin*3;
  if(qmi===0)return toMin*k0;
  if(qmi===1){if(f2>0)return toMin*k1;if(f0>0)return Math.max(0,((t-(f0||0)/k0)/2)*k1);return toMin*k1}
  if(f2>0)return toMin*k2;
  if(f1>0)return Math.max(0,(t-(f0||0)/k0-f1/k1)*k2);
  if(f0>0)return Math.max(0,((t-f0/k0)/2)*k2);
  return toMin*k2;
}

function initCitySelect(){
  const sel=document.getElementById('citySelect');
  CITIES.forEach((c,i)=>{
    const o=document.createElement('option');
    o.value=i;o.textContent=c.name+(c.m?'':' *');
    if(c.name==='Київ')o.selected=true;
    sel.appendChild(o);
  });
}

function renderClusterRef(){
  const cur=curCl(),nxt=nextCl();
  const grid=document.getElementById('clusterRefGrid'),sel=document.getElementById('clusterRefSelect');
  grid.innerHTML='';sel.innerHTML='';
  CLUSTERS.forEach(cl=>{
    const isA=cl.id===cur,isN=cl.id===nxt;
    const ch=document.createElement('div');
    ch.className='cl-chip'+(isA?' cur':isN?' nxt':'');
    ch.innerHTML=`<div class="cl-chip-nm">Кл.${cl.label}${isA?' ◀':isN?' ↑':''}</div><div class="cl-chip-rng">${fmtM(cl.toMin)}–${fmtM(cl.toMax)}</div><div class="cl-chip-k">×${cl.kMult}</div>`;
    grid.appendChild(ch);
    const o=document.createElement('option');
    o.value=cl.id;
    o.textContent=`Кластер ${cl.label}: ${fmtM(cl.toMin)}–${fmtM(cl.toMax)} ×${cl.kMult}${isA?' ◀':isN?' ↑':''}`;
    sel.appendChild(o);
  });
}

function renderClusterInfo(){
  const c=cityData(),cc=CLUSTERS[curCl()],nc=nextCl()!==null?CLUSTERS[nextCl()]:null;
  document.getElementById('clusterInfo').innerHTML=`
    <div class="kpi-card"><div class="kpi-lbl">Місто</div><div class="kpi-val sm">${c.name}</div><div class="kpi-sub">К тер = ${getKTer()}</div></div>
    <div class="kpi-card"><div class="kpi-lbl">Поточний кластер</div><div class="kpi-val">${cc.label}</div><div class="kpi-sub">мін ${fmt(cc.toMin)}</div></div>
    <div class="kpi-card"><div class="kpi-lbl">Ціль підняття</div><div class="kpi-val green">${nc?nc.label:'—'}</div><div class="kpi-sub">${nc?'мін '+fmt(nc.toMin):'макс.'}</div></div>
    <div class="kpi-card"><div class="kpi-lbl">К множення</div><div class="kpi-val yellow">×${cc.kMult}</div><div class="kpi-sub">залік К обігу</div></div>`;
}

function renderQuarters(){
  const cc=CLUSTERS[curCl()],nc=nextCl()!==null?CLUSTERS[nextCl()]:null;
  const wrap=document.getElementById('quartersWrap');
  wrap.innerHTML='';
  let sumZTO=0,cntZTO=0,lastZK=null;

  QS.forEach(qt=>{
    const facts=qt.idx.map(i=>factSales[i]);
    const ks=qt.idx.map(i=>getKSez(i));
    const plansC=qt.idx.map(i=>cc.toMin*getKSez(i));
    const zto=calcZTO(facts,ks,plansC);
    const zk=calcZK(zto);
    if(zto!==null){sumZTO+=zto;cntZTO++}
    if(zk!==null)lastZK=zk;

    const card=document.createElement('div');
    card.className=`q-card ${qt.cls}`;
    card.innerHTML=`
      <div class="q-head">
        <div class="q-head-left">
          <div class="q-num-badge">Q${qt.qi}</div>
          <div><div class="q-title">${qt.label}</div><div class="q-hint">${qt.hint}</div></div>
        </div>
        <div class="q-zalik">
          <div class="q-z-lbl">Залік ТО</div>
          <div class="q-z-val${zto!==null?'':' em'}">${zto!==null?fmt(zto):'—'}</div>
          ${zk!==null?`<div class="q-z-k">×${zk}</div>`:''}
        </div>
      </div>
      <div class="dt">
        <table class="mt" id="dt_${qt.qi}">
          <thead><tr>
            <th style="text-align:left">Місяць</th>
            <th style="text-align:left">К сез</th>
            <th>Факт ТО</th>
            <th>План підняття</th>
            <th>План підтвердж.</th>
          </tr></thead>
          <tbody id="dtb_${qt.qi}"></tbody>
        </table>
      </div>
      <div class="mb-rows" id="mb_${qt.qi}"></div>`;
    wrap.appendChild(card);

    const tbody=document.getElementById('dtb_'+qt.qi);
    const mbw=document.getElementById('mb_'+qt.qi);

    qt.idx.forEach((mi,qmi)=>{
      const ks_m=getKSez(mi),fact=factSales[mi];
      const [k0,k1,k2]=[getKSez(qt.idx[0]),getKSez(qt.idx[1]),getKSez(qt.idx[2])];
      const [f0,f1,f2]=[factSales[qt.idx[0]],factSales[qt.idx[1]],factSales[qt.idx[2]]];
      const pC=calcPlan(cc.toMin,k0,k1,k2,f0,f1,f2,qmi);
      const pR=nc?calcPlan(nc.toMin,k0,k1,k2,f0,f1,f2,qmi):null;
      const fv=fact!==null?Math.round(fact).toLocaleString('uk-UA'):'';

      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td class="td-nm">${MONTHS[mi].n}</td>
        <td class="td-ks">${fmtP(ks_m)}</td>
        <td><input class="finp" type="text" id="fact_${mi}" placeholder="—" value="${fv}" onchange="onFact(${mi},this.value)" onfocus="this.select()"></td>
        <td class="td-pr">${pR!==null?fmt(pR):'—'}</td>
        <td class="td-pc">${fmt(pC)}</td>`;
      tbody.appendChild(tr);

      const mr=document.createElement('div');
      mr.className='mb-row';
      mr.innerHTML=`
        <div class="mb-top"><span class="mb-nm">${MONTHS[mi].n}</span><span class="mb-ks">${fmtP(ks_m)}</span></div>
        <div class="mb-grid">
          <div class="mb-fw mb-cell">
            <span class="mb-lbl">Факт ТО</span>
            <input class="mb-fi" type="text" id="mob_fact_${mi}" placeholder="—" value="${fv}" onchange="onFact(${mi},this.value)" onfocus="this.select()">
          </div>
          <div style="display:none"></div>
          <div class="mb-cell"><span class="mb-lbl">План підняття</span><span class="mb-v g">${pR!==null?fmt(pR):'—'}</span></div>
          <div class="mb-cell"><span class="mb-lbl">План підтвердж.</span><span class="mb-v y">${fmt(pC)}</span></div>
        </div>`;
      mbw.appendChild(mr);
    });
  });

  renderSummary(cntZTO>0?sumZTO:null,lastZK,CLUSTERS[curCl()],nextCl()!==null?CLUSTERS[nextCl()]:null);
  renderChart();
}

function renderSummary(zto,zk,cc,nc){
  document.getElementById('summary').innerHTML=`
    <div class="sum-card"><div class="sum-lbl">Залік ТО</div><div class="sum-val c1">${zto!==null?fmt(zto):'—'}</div><div class="sum-sub">Середнє ТО за кварталами</div></div>
    <div class="sum-card"><div class="sum-lbl">Залік К обігу</div><div class="sum-val c2">${zk!==null?'×'+zk:'—'}</div><div class="sum-sub">К множення кластеру ${cc.label}</div></div>
    <div class="sum-card"><div class="sum-lbl">ТО для підняття</div><div class="sum-val c3">${nc?fmt(nc.toMin):'—'}</div><div class="sum-sub">${nc?'Мінімум кл. '+nc.label:'Макс. кластер'}</div></div>
    <div class="sum-card"><div class="sum-lbl">ТО для підтвердження</div><div class="sum-val c4">${fmt(cc.toMin)}</div><div class="sum-sub">Мінімум кластеру ${cc.label}</div></div>`;
}

function renderChart(){
  const cc=CLUSTERS[curCl()],nc=nextCl()!==null?CLUSTERS[nextCl()]:null;
  const light=document.documentElement.classList.contains('light');
  const labels=MONTHS.map(m=>m.n.slice(0,3));
  const factData=factSales.map(f=>f!==null&&f>0?f:null);
  const planR=MONTHS.map((_,i)=>nc?Math.round(nc.toMin*getKSez(i)):null);
  const planC=MONTHS.map((_,i)=>Math.round(cc.toMin*getKSez(i)));
  const ctx=document.getElementById('toChart').getContext('2d');
  if(chartInst)chartInst.destroy();
  const green=light?'#34C759':'#30D158';
  const yellow=light?'#FF9500':'#FFD60A';
  const red=light?'#FF3B30':'#FF453A';
  const gc=light?'rgba(0,0,0,.06)':'rgba(255,255,255,.05)';
  const tc=light?'#8E8E93':'#636366';
  const ttbg=light?'#fff':'#2C2C2E';
  const ttbd=light?'#D1D1D6':'#48484A';
  const tttitle=light?'#000':'#fff';
  const ttbody=light?'#3C3C43':'#AEAEB2';
  chartInst=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {
        label:'Факт ТО',data:factData,
        backgroundColor:factData.map((v,i)=>{
          if(!v)return light?'rgba(0,0,0,.06)':'rgba(255,255,255,.06)';
          if(nc&&v>=planR[i])return light?'rgba(52,199,89,.35)':'rgba(48,209,88,.45)';
          if(v>=planC[i])return light?'rgba(0,122,255,.25)':'rgba(255,255,255,.25)';
          return light?'rgba(255,59,48,.3)':'rgba(255,69,58,.45)';
        }),
        borderColor:factData.map((v,i)=>{
          if(!v)return light?'rgba(0,0,0,.12)':'rgba(255,255,255,.1)';
          if(nc&&v>=planR[i])return green;
          if(v>=planC[i])return light?'rgba(0,122,255,.6)':'rgba(255,255,255,.5)';
          return red;
        }),
        borderWidth:1,borderRadius:4,order:3,
      },
      {label:'Підняття',data:planR,type:'line',borderColor:green+'bb',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:2,pointBackgroundColor:green,tension:.3,order:1},
      {label:'Підтвердження',data:planC,type:'line',borderColor:yellow+'bb',backgroundColor:'transparent',borderWidth:1.5,borderDash:[5,4],pointRadius:2,pointBackgroundColor:yellow,tension:.3,order:2},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:ttbg,borderColor:ttbd,borderWidth:1,
        titleColor:tttitle,bodyColor:ttbody,
        titleFont:{family:'Inter',size:12,weight:'700'},bodyFont:{family:'Inter',size:12},
        padding:12,cornerRadius:10,boxPadding:4,
        callbacks:{label(ctx){const v=ctx.raw;if(v==null)return ctx.dataset.label+': —';return ctx.dataset.label+': '+Math.round(v).toLocaleString('uk-UA')}}
      }},
      scales:{
        x:{grid:{color:gc,drawBorder:false},ticks:{color:tc,font:{family:'Inter',size:10,weight:'500'}}},
        y:{grid:{color:gc,drawBorder:false},ticks:{color:tc,font:{family:'Inter',size:10},callback(v){return(v/1e6).toFixed(0)+' млн'}}}
      }
    }
  });
}

function onFact(i,val){
  const clean=val.replace(/[\s\u00a0]/g,'').replace(',','.');
  const num=parseFloat(clean);
  factSales[i]=isNaN(num)||val.trim()===''?null:num;
  const fv=factSales[i]!==null?Math.round(factSales[i]).toLocaleString('uk-UA'):'';
  const d=document.getElementById('fact_'+i),m=document.getElementById('mob_fact_'+i);
  if(d&&fv)d.value=fv;
  if(m&&fv)m.value=fv;
  calculate();
}
function onClusterChange(){renderClusterRef();renderClusterInfo();renderQuarters()}
function onCityChange(){const c=cityData();document.getElementById('kTer').value=c.kTer;renderClusterRef();renderClusterInfo();renderQuarters()}
function calculate(){renderClusterInfo();renderQuarters()}
function resetAll(){factSales=new Array(12).fill(null);document.querySelectorAll('input[id^="fact_"],input[id^="mob_fact_"]').forEach(i=>i.value='');calculate()}
function toggleTheme(){
  const isLight=document.documentElement.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'🌙':'☀️';
  localStorage.setItem('th',isLight?'l':'d');
  renderChart();
}
(function(){
  const s=localStorage.getItem('th');
  // Default: dark. Switch to light only if explicitly saved.
  if(s==='l'){
    document.documentElement.classList.add('light');
    document.getElementById('themeBtn').textContent='🌙';
  }
})();

initCitySelect();renderClusterRef();renderClusterInfo();renderQuarters();
</script>

</body>
</html>
