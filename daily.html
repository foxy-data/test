<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Щоденні продажі — Аналітика</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <style>
        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --secondary: #6e6e73;
            --accent: #0071e3;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 20px;
            transition: opacity 0.2s;
        }
        .header-section { margin-bottom: 40px; }
        h1 { font-size: 48px; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
        
        .table-wrapper {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th {
            text-align: left;
            padding: 16px;
            color: var(--secondary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid #d2d2d7;
        }
        td {
            padding: 20px 16px;
            border-bottom: 1px solid #f5f5f7;
            font-size: 16px;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #fafafa; }
        
        .name-cell { font-weight: 600; color: var(--text); }
        .badge {
            background: #e8f2ff;
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Команда</a>
        <div class="header-section">
            <h1>Щоденні продажі</h1>
            <p style="color: var(--secondary); font-size: 19px;">Огляд активності ПК департаменту за сьогодні</p>
        </div>

        <div class="table-wrapper">
            <table id="salesTable">
                <thead><tr id="headerRow"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadTable() {
            try {
                const response = await fetch('daily-sales.json');
                const data = await response.json();
                
                if (data.length === 0) return;

                const headers = Object.keys(data[0]);
                const headerRow = document.getElementById('headerRow');
                headers.forEach(h => {
                    const th = document.createElement('th');
                    th.textContent = h;
                    headerRow.appendChild(th);
                });

                const tbody = document.getElementById('tableBody');
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    headers.forEach(h => {
                        const td = document.createElement('td');
                        let value = row[h];
                        
                        if (h.includes('Продавець') || h.includes('ПІБ')) {
                            td.className = 'name-cell';
                        }
                        
                        td.textContent = value === null ? '-' : value;
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error("Помилка завантаження даних:", e);
            }
        }
        loadTable();
    </script>
</body>
</html>
