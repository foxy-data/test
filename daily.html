<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Sales — Apple Style</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 40px auto; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; margin-bottom: 20px; }
        h1 { font-size: 40px; font-weight: 600; margin-bottom: 30px; letter-spacing: -0.5px; }
        .table-card { background: white; border-radius: 22px; padding: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 16px; color: #86868b; font-size: 12px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid #d2d2d7; }
        td { padding: 18px 16px; border-bottom: 1px solid #f5f5f7; font-size: 15px; }
        tr:hover { background: #fafafa; }
        .name-cell { font-weight: 600; color: #1d1d1f; }
        .loading { padding: 40px; text-align: center; color: #86868b; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Назад</a>
        <h1>Щоденні продажі ПК</h1>
        <div class="table-card">
            <div id="loader" class="loading">Оновлення даних...</div>
            <table id="dataTable" style="display: none;">
                <thead><tr id="headerRow"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <script>
        async function loadTable() {
            try {
                const r = await fetch('daily-sales.json?t=' + Date.now());
                const data = await r.json();
                if (!data.length) return;

                document.getElementById('loader').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';

                const headers = Object.keys(data[0]);
                const hRow = document.getElementById('headerRow');
                headers.forEach(h => {
                    let th = document.createElement('th');
                    th.textContent = h;
                    hRow.appendChild(th);
                });

                const tbody = document.getElementById('tableBody');
                data.forEach(row => {
                    let tr = document.createElement('tr');
                    headers.forEach(h => {
                        let td = document.createElement('td');
                        let val = row[h];
                        td.textContent = (val === 0 && h.toLowerCase().includes('продавець')) ? '-' : val;
                        if(h.toLowerCase().includes('продавець')) td.className = 'name-cell';
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('loader').textContent = "Помилка завантаження: " + e.message;
            }
        }
        loadTable();
    </script>
</body>
</html>
