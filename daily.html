<script>
function parseCSV(text) {
    const rows = [];
    for (const line of text.split(/\r?\n/)) {
        if (!line.trim()) continue;
        const row = []; let cell = '', q = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') { if (q && line[i+1]==='"') { cell+='"'; i++; } else q=!q; }
            else if (c === ',' && !q) { row.push(cell.trim()); cell=''; }
            else cell += c;
        }
        row.push(cell.trim());
        if (row.some(x => x !== '')) rows.push(row);
    }
    return rows;
}

function colInfo(h) {
    const u = h.toUpperCase().trim();
    let g = '', t = 'fact';
    if      (u.includes('ПОСЛУГ') || u.includes('ПОСЛ')) g = 'serv';
    else if (u.includes('АСС') || u.includes('ACC') || u.includes('АКСЕС')) g = 'acc';
    else if (u === 'ЧЕКИ' || u === 'ЧЕК' || u.startsWith('ПЛАН ЧЕК') || u.startsWith('ФАКТ ЧЕК') || u.startsWith('% ЧЕК')) g = 'checks';
    else if (u.includes(' ТО') || u.startsWith('ТО') || u.endsWith('ТО')) g = 'to';
    else if (u.includes('ДОХІД') || u.includes('ДОХОД') || u.includes('INCOME') || u.includes('MARGIN') || u.includes('МАРЖА')) g = 'income';
    else if ((u.includes('СР') && (u.includes('ЧЕК') || u.includes('CHECK'))) || u === 'ASP' || u.includes('AVG CHECK')) g = 'avgcheck';
    if      (u.includes('ПЛАН'))                         t = 'plan';
    else if (u.includes('%') || u.includes('ВИКО'))      t = 'pct';
    else if (u.includes('ДОЛЯ') || u.includes('SHARE'))  t = 'share';
    return { g, t };
}

const GLABELS = { to:'Товарообіг', serv:'Послуги', acc:'Аксесуари', checks:'Чеки', '':'' };

function toNum(v) {
    if (!v) return 0;
    return parseFloat(v.toString().replace('%','').replace(/\s/g,'').replace(',','.')) || 0;
}
function fmtInt(v) {
    const n = toNum(v);
    return n ? Math.round(n).toLocaleString('uk-UA') : (v || '');
}
function fmtPct(v) {
    let n = toNum(v);
    const s = v ? v.toString() : '';
    if (!s.includes('%') && n > 0 && n < 2) n *= 100;
    return n.toFixed(1) + '%';
}
function pctBg(v) {
    let n = toNum(v);
    const s = v ? v.toString() : '';
    if (!s.includes('%') && n > 0 && n < 2) n *= 100;
    if (n <= 0)  return { bg:'rgba(255,59,48,0.13)',  fg:'#c0392b' };
    if (n < 50)  return { bg:'rgba(255,59,48,0.10)',  fg:'#d63b2a' };
    if (n < 80)  return { bg:'rgba(255,149,0,0.12)',  fg:'#b86e00' };
    if (n < 100) return { bg:'rgba(255,204,0,0.13)',  fg:'#8a6800' };
    if (n < 120) return { bg:'rgba(52,199,89,0.12)',  fg:'#1e7e34' };
    return             { bg:'rgba(52,199,89,0.20)',  fg:'#155724' };
}

function colorizeShareCols(headers) {
    const tbody = document.getElementById('tbody');
    if (!tbody) return;
    const shareColIndexes = [];
    for (let i = 1; i < headers.length; i++) {
        if (colInfo(headers[i]).t === 'share') shareColIndexes.push(i);
    }
    if (!shareColIndexes.length) return;
    shareColIndexes.forEach(colIdx => {
        const cells = [];
        tbody.querySelectorAll('tr:not(.time-row):not(.summary-row)').forEach(tr => {
            const td = tr.querySelectorAll('td')[colIdx];
            if (!td) return;
            const badge = td.querySelector('.cell-badge');
            const raw = badge ? badge.textContent.trim() : td.textContent.trim();
            const num = parseFloat(raw.replace('%','').replace(/\s/g,'').replace(',','.')) || 0;
            cells.push({ badge, num });
        });
        if (!cells.length) return;
        const vals = cells.map(c => c.num);
        const min = Math.min(...vals), max = Math.max(...vals), range = max-min||1;
        cells.forEach(({ badge, num }) => {
            if (!badge) return;
            const ratio = (num - min) / range;
            const hue = Math.round(ratio * 120);
            badge.style.background = `hsl(${hue},70%,${Math.round(88-ratio*10)}%)`;
            badge.style.color      = `hsl(${hue},60%,${Math.round(28+ratio*10)}%)`;
        });
    });
}

    { id: "folk_flower", name: "Квітка Життя", style: "folk", target: 5, svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="none" stroke="#fbbf24" stroke-width="3"/><circle cx="50" cy="20" r="20" fill="none" stroke="#d97706" stroke-width="3"/><circle cx="50" cy="80" r="20" fill="none" stroke="#d97706" stroke-width="3"/><circle cx="20" cy="50" r="20" fill="none" stroke="#d97706" stroke-width="3"/><circle cx="80" cy="50" r="20" fill="none" stroke="#d97706" stroke-width="3"/></svg>` }
];

function renderTable(headers, rows, compact) {
    const isMob = window.innerWidth < 768;
    const nameW = isMob ? 110 : 160;
    const avail = window.innerWidth - nameW - 1;

    let colIndexes = [];
    for (let i = 1; i < headers.length; i++) {
        const { g, t } = colInfo(headers[i]);
        if (!compact) {
            colIndexes.push(i);
        } else {
            if (t === 'fact' && ['to','serv','acc','checks'].includes(g)) {
                colIndexes.push(i);
            }
        }
    }

    let colWidths = [];
    if (compact) {
        const cw = Math.max(70, Math.floor(avail / 4));
        colWidths = colIndexes.map(() => cw);
    } else {
        const c3 = Math.floor(avail / 3);
        const c4 = Math.floor(avail / 4);
        const grpSizes = {};
        colIndexes.forEach(i => {
            const { g } = colInfo(headers[i]);
            grpSizes[g] = (grpSizes[g] || 0) + 1;
        });
        colWidths = colIndexes.map(i => {
            const { g } = colInfo(headers[i]);
            const n = grpSizes[g] || 3;
            return n <= 3 ? c3 : c4;
        });
    }

    const cg = document.getElementById('cg');
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');
    const tbl = document.getElementById('tbl');
    cg.innerHTML = '';
    thead.innerHTML = '';
    tbody.innerHTML = '';

    const mkCol = w => { const c = document.createElement('col'); c.style.width = w+'px'; return c; };
    cg.appendChild(mkCol(nameW));
    colWidths.forEach(w => cg.appendChild(mkCol(w)));

    if (compact) {
        const tr = document.createElement('tr');
        const corner = document.createElement('th');
        corner.textContent = headers[0];
        corner.style.width = nameW + 'px';
        tr.appendChild(corner);
        colIndexes.forEach((ci, ii) => {
            const { g } = colInfo(headers[ci]);
            const th = document.createElement('th');
            th.className = 'g-' + g + (ii === 0 ? '' : ' grp-start');
            th.style.width = colWidths[ii] + 'px';
            th.textContent = GLABELS[g] || headers[ci];
            tr.appendChild(th);
        });
        thead.appendChild(tr);
    } else {
        const groups = [];
        let cur = null;
        colIndexes.forEach(i => {
            const { g } = colInfo(headers[i]);
            if (!cur || cur.g !== g) { cur = { g, count:1 }; groups.push(cur); }
            else cur.count++;
        });

        const tr1 = document.createElement('tr');
        const corner = document.createElement('th');
        corner.rowSpan = 2;
        corner.textContent = headers[0];
        corner.style.width = nameW + 'px';
        tr1.appendChild(corner);
        for (const grp of groups) {
            const th = document.createElement('th');
            th.colSpan = grp.count;
            th.className = 'group-header g-' + (grp.g || 'none');
            th.textContent = GLABELS[grp.g] || '';
            tr1.appendChild(th);
        }
        thead.appendChild(tr1);

        const tr2 = document.createElement('tr');
        let prevG = '';
        colIndexes.forEach((ci, ii) => {
            const { g } = colInfo(headers[ci]);
            const th = document.createElement('th');
            th.className = (g ? 'g-'+g : '');
            if (g !== prevG) th.classList.add('grp-start');
            prevG = g;
            const lbl = headers[ci].trim().toUpperCase();
            const glbl = (GLABELS[g] || '').toUpperCase();

            tr2.appendChild(th);
        });
        thead.appendChild(tr2);
    }

    for (const row of rows) {
        if (!row || row.length === 0) continue;
        if (!row[0] || !row[0].trim()) continue;
        const name = row[0].trim();
        const nameLC = name.toLowerCase();
        const isTime = /^\d{1,2}:\d{2}(:\d{2})?$/.test(name);
        const isSummary = ['виконання','залишок','разом','всього','підсумок','total','итого','тотал','тоtal'].some(k => nameLC.includes(k));

        const tr = document.createElement('tr');
        if (isTime)    tr.className = 'time-row';
        if (isSummary) tr.className = 'summary-row';

        const tdN = document.createElement('td');
        tdN.className = 'name-cell';
        tdN.style.width = nameW + 'px';
        tdN.textContent = name;
        tr.appendChild(tdN);

        colIndexes.forEach((ci, ii) => {
            const { g, t } = colInfo(headers[ci]);
            const val = (row[ci] != null ? row[ci] : '').toString().trim();
            const td = document.createElement('td');
            td.style.width = colWidths[ii] + 'px';
            if (ii === 0 || (!compact && colIndexes[ii-1] !== undefined && colInfo(headers[colIndexes[ii-1]]).g !== g)) {
                td.classList.add('grp-start');
            }

            if (t === 'pct' && !isTime) {
                const { bg, fg } = pctBg(val);
                td.innerHTML = `<span class="cell-badge" style="background:${bg};color:${isSummary?'#1d1d1f':fg}">${val ? fmtPct(val) : ''}</span>`;
            } else if (t === 'share') {
                td.innerHTML = `<span class="cell-badge badge-fact-${g||'none'}">${val}</span>`;
            } else if (t === 'plan') {
                const planTxt = isTime ? val : fmtInt(val);
                td.innerHTML = isTime ? planTxt : `<span class="cell-badge badge-plan">${planTxt}</span>`;
            } else {
                const factTxt = (!isTime && val && !val.includes('%')) ? fmtInt(val) : val;
                td.innerHTML = isTime ? factTxt : `<span class="cell-badge badge-fact-${g||'none'}">${factTxt}</span>`;
            }
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    }

    if (!compact) colorizeShareCols(headers);

    requestAnimationFrame(() => {
        const theadRows = thead.querySelectorAll('tr');
        if (theadRows.length >= 2) {
            const row1H = theadRows[0].getBoundingClientRect().height;
            theadRows[1].querySelectorAll('th').forEach(th => { th.style.top = row1H + 'px'; });
        }
    });
}

function getTopPerson(gFilter, tFilter) {
    let factIdx = -1;
    for (let i = 1; i < savedHeaders.length; i++) {
        const { g, t } = colInfo(savedHeaders[i]);
        if (g === gFilter && t === tFilter && factIdx < 0) { factIdx = i; break; }
    }
    if (factIdx < 0) return null;

    const excluded = ['разом','сума','total','тотал','підсумок','всього','итого','відставання','відхилення','виконання','залишок'];
    const items = savedRows
        .filter(r => {
            const name = (r[0]||'').trim();
            if (!name) return false;
            if (/^\d{1,2}:\d{2}/.test(name)) return false;
            const nl = name.toLowerCase();
            return !excluded.some(k => nl.includes(k));
        })
        .map(r => ({ name: (r[0]||'').trim(), val: toNum(r[factIdx]) }))
        .filter(x => x.val > 0);

    if (!items.length) return null;
    items.sort((a,b) => b.val - a.val);
    return items[0];
}

function fmtInsightVal(val, gFilter) {
    const n = Number(val);
    if (isNaN(n) || n === 0) return '—';
    if (gFilter === 'checks') return Math.round(n).toLocaleString('uk-UA') + ' чек.';
    if (gFilter === 'avgcheck') return Math.round(n).toLocaleString('uk-UA') + ' грн';
    if (gFilter === 'income') return Math.round(n).toLocaleString('uk-UA') + ' грн';
    return Math.round(n).toLocaleString('uk-UA') + ' ₴';
}

function renderInsights() {
    const grid = document.getElementById('insightsGrid');
    grid.innerHTML = '';

    const available = INSIGHT_DEFS.filter(d =>
        savedHeaders.some(h => {
            const { g, t } = colInfo(h);

        })
    );

    if (!available.length) {
        grid.innerHTML = '<div style="padding:40px;text-align:center;color:#86868b;grid-column:1/-1">Немає даних для інсайтів</div>';
        return;
    }

    available.forEach((def, idx) => {
        const top = getTopPerson(def.gFilter, def.tFilter);
        if (!top) return;

        const card = document.createElement('div');
        card.className = 'insight-card';
        card.style.animationDelay = (idx * 0.07) + 's';
        card.style.borderLeftColor = def.color;

        card.innerHTML = `
            <div class="insight-card-accent" style="background:${def.color}"></div>
            <div class="insight-icon" style="background:${def.iconBg}">${def.icon}</div>
            <div class="insight-body">

                <div class="insight-name">${top.name}</div>

    });
}

function buildRatingMetricPills() {
    const c = document.getElementById('metricPills');
    c.innerHTML = '';
    const available = RATING_DEFS.filter(d =>
        savedHeaders.some(h => { const { g, t } = colInfo(h); return g === d.gFilter && t === d.tFilter; })
    );
    available.forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'mpill' + (d.key === activeRatingKey ? ' active' : '');
        btn.textContent = d.label;
        if (d.key === activeRatingKey) btn.style.background = d.color;
        btn.onclick = () => { activeRatingKey = d.key; buildRatingMetricPills(); renderRankingCards(); };
        c.appendChild(btn);
    });
    if (available.length && !available.find(d => d.key === activeRatingKey)) {
        activeRatingKey = available[0].key;
    }
}

// Animate numbers counting up
function animateCounters(root) {
    root.querySelectorAll('[data-count-to]').forEach(el => {
        const target = parseFloat(el.dataset.countTo);
        const fmt = el.dataset.countFmt || 'int';
        const dur = 900;
        const start = performance.now();
        const tick = now => {
            const t = Math.min(1, (now - start) / dur);
            const ease = 1 - Math.pow(1 - t, 3);
            const cur = target * ease;
            if (fmt === 'pct') el.textContent = cur.toFixed(1) + '%';
            else el.textContent = Math.round(cur).toLocaleString('uk-UA');
            if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
    });
}

function renderRankingCards() {
    const grid = document.getElementById('rankingGrid');
    grid.innerHTML = '';
    const def = RATING_DEFS.find(d => d.key === activeRatingKey) || RATING_DEFS[0];

    let factIdx = -1, planIdx = -1, pctIdx = -1;
    for (let i = 1; i < savedHeaders.length; i++) {
        const { g, t } = colInfo(savedHeaders[i]);
        if (g !== def.gFilter) continue;
        if (t === def.tFilter && factIdx < 0) factIdx = i;
        if (def.tFilter === 'fact') {
            if (t === 'plan' && planIdx < 0) planIdx = i;
            if (t === 'pct'  && pctIdx  < 0) pctIdx  = i;
        }
    }
    if (factIdx < 0) {
        grid.innerHTML = '<div style="padding:40px;text-align:center;color:#86868b">Немає даних для цієї метрики</div>';
        return;
    }

    const sumKeywords = ['разом','сума','total','тотал','підсумок','всього','итого'];
    const storeRow = savedRows.find(r => {
        const nl = (r[0]||'').trim().toLowerCase();
        return sumKeywords.some(k => nl.includes(k));
    });
    if (storeRow) {
        const sFact = toNum(storeRow[factIdx]);
        const sPlan = planIdx >= 0 ? toNum(storeRow[planIdx]) : null;
        const sPctRaw = pctIdx >= 0 ? storeRow[pctIdx] : null;
        let sPctNum = null;
        if (['serv','acc'].includes(def.gFilter) && sFact && sPlan) {
            sPctNum = (sFact / sPlan) * 100;
        } else if (sPctRaw != null) {
            sPctNum = toNum(sPctRaw);
            if (!String(sPctRaw).includes('%') && sPctNum > 0 && sPctNum < 2) sPctNum *= 100;
        }
        const pctColor = !sPctNum ? '#86868b' : sPctNum < 80 ? '#ff3b30' : sPctNum < 100 ? '#ff9500' : '#34c759';
        const valFmtS = v => {
            if (!v) return '—';
            if (def.tFilter === 'share') return Number(v).toLocaleString('uk-UA', {minimumFractionDigits:2, maximumFractionDigits:2});
            if (['income','avgcheck'].includes(def.gFilter)) return Math.round(v).toLocaleString('uk-UA') + ' грн';
            return Math.round(v).toLocaleString('uk-UA');
        };
        const banner = document.createElement('div');
        banner.className = 'store-banner';
        banner.style.borderLeftColor = def.color;
        banner.innerHTML = `
            <div class="store-banner-label">🏪 Магазин</div>
            <div class="store-stats">
                ${sPlan ? `<div class="store-stat"><span class="store-stat-label">План</span><span class="store-stat-val">${valFmtS(sPlan)}</span></div>` : ''}
                <div class="store-stat"><span class="store-stat-label">Факт</span><span class="store-stat-val" style="color:${def.color}">${valFmtS(sFact)}</span></div>
                ${sPctNum != null ? `<div class="store-stat"><span class="store-stat-label">Виконання</span><span class="store-stat-pct" style="color:${pctColor}">${sPctNum.toFixed(1)}%</span></div>` : ''}
            </div>`;
        document.getElementById('storeBanner').innerHTML = '';
        document.getElementById('storeBanner').appendChild(banner);
    }

    const excluded = ['разом','сума','total','тотал','підсумок','всього','итого','відставання','відхилення','виконання','залишок'];
    const items = savedRows
        .filter(r => {
            const name = (r[0]||'').trim();
            if (!name) return false;
            if (/^\d{1,2}:\d{2}/.test(name)) return false;
            const nl = name.toLowerCase();
            return !excluded.some(k => nl.includes(k));
        })
        .map(r => ({
            name: (r[0]||'').trim(),
            val:  toNum(r[factIdx]),
            plan: planIdx >= 0 ? toNum(r[planIdx]) : null,
            pct:  pctIdx  >= 0 ? r[pctIdx] : null,
        }))
        .filter(x => x.val > 0);

    items.sort((a, b) => b.val - a.val);
    if (!items.length) {
        grid.innerHTML = '<div style="padding:40px;text-align:center;color:#86868b">Немає даних</div>';
        return;
    }

    const maxVal = items[0].val;

    const valFmt = v => {
        if (!v) return '—';
        const n = Number(v);
        if (isNaN(n)) return String(v);
        if (def.tFilter === 'share') return n.toLocaleString('uk-UA', {minimumFractionDigits:2, maximumFractionDigits:2});
        if (['income','avgcheck'].includes(def.gFilter)) return Math.round(n).toLocaleString('uk-UA') + ' грн';
        return Number.isInteger(n) ? n.toLocaleString('uk-UA') : n.toLocaleString('uk-UA', {minimumFractionDigits:2, maximumFractionDigits:2});
    };

    const getPctStr = item => {
        if (['serv','acc'].includes(def.gFilter) && item.val && item.plan) {
            return ((item.val / item.plan) * 100).toFixed(1) + '%';
        } else if (item.pct != null) {
            let n = toNum(item.pct);
            if (!String(item.pct).includes('%') && n > 0 && n < 2) n *= 100;
            return n.toFixed(1) + '%';
        }
        return null;
    };

    const getPctNum = item => {
        const s = getPctStr(item);
        return s ? parseFloat(s) : null;
    };

    const pctClass = p => {
        if (!p) return '';
        if (p >= 100) return 'd-hi';
        if (p >= 80) return 'd-mid';
        return 'd-lo';
    };

    // toggle between views
    if (activeRatingView === 'podium') {
        renderPodiumView(grid, items, maxVal, def, valFmt, getPctStr, getPctNum);
    } else if (activeRatingView === 'bar') {
        renderBarChartView(grid, items, maxVal, def, valFmt, getPctStr, getPctNum, pctClass);
    } else if (activeRatingView === 'gauge') {
        renderGaugeView(grid, items, def, valFmt, getPctStr, getPctNum);
    } else {
        renderLeaderboardView(grid, items, maxVal, def, valFmt, getPctStr, getPctNum, pctClass);
    }
    requestAnimationFrame(() => animateCounters(grid));
}

function renderPodiumView(grid, items, maxVal, def, valFmt, getPctStr, getPctNum) {
    const top3 = items.slice(0, 3);
    const rest = items.slice(3);
    const c = def.color;

    // Podium
    const podWrap = document.createElement('div');
    podWrap.className = 'podium-wrap';
    const podOrder = top3.length >= 2 ? [top3[1], top3[0], top3[2]].filter(Boolean) : top3;
    const podClasses = top3.length >= 2 ? ['pod-2','pod-1','pod-3'] : ['pod-1','pod-2','pod-3'];
    const podMedals = top3.length >= 2 ? ['🥈','🥇','🥉'] : ['🥇','🥈','🥉'];

    podOrder.forEach((item, idx) => {
        const pctStr = getPctStr(item);
        const isFirst = podClasses[idx] === 'pod-1';
        const pod = document.createElement('div');
        pod.className = 'pod ' + podClasses[idx];
        pod.style.animationDelay = (idx * 0.08) + 's';
        if (isFirst) {
            pod.style.cssText += `background:linear-gradient(170deg,#fffbeb,#fde68a);border:2px solid #f59e0b;box-shadow:0 6px 28px rgba(245,158,11,.3),0 0 0 1px rgba(245,158,11,.15);`;
            pod.innerHTML = `
                <div class="pod-crown-glow"></div>
                <div class="pod-medal" style="filter:drop-shadow(0 0 6px rgba(245,158,11,.8))">${podMedals[idx]}</div>
                <div class="pod-name" style="font-weight:800">${item.name}</div>
                <div class="pod-val" style="color:${c};font-size:12px;font-weight:900;text-shadow:0 0 8px ${c}44">${valFmt(item.val)}</div>
                ${pctStr ? `<div class="pod-pct" style="color:#b45309">${pctStr}</div>` : ''}`;
            pod.onclick = () => { fireConfetti(pod); };
        } else {
            pod.innerHTML = `
                <div class="pod-medal">${podMedals[idx]}</div>
                <div class="pod-name">${item.name}</div>
                <div class="pod-val">${valFmt(item.val)}</div>
                ${pctStr ? `<div class="pod-pct">${pctStr}</div>` : ''}`;
            pod.onclick = () => {
                pod.style.transform = 'scale(1.05) translateY(-4px)';
                setTimeout(() => { pod.style.transform = ''; }, 280);
            };
        }
        podWrap.appendChild(pod);
    });
    grid.appendChild(podWrap);

    if (rest.length) {
        const listWrap = document.createElement('div');
        listWrap.className = 'hbar-list';
        rest.forEach((item, i) => {
            const pos = i + 4;
            const barPct = Math.round(item.val / maxVal * 100);
            const pctStr = getPctStr(item);
            const pctNum = getPctNum(item);
            const pClass = pctNum ? (pctNum >= 100 ? 'd-hi' : pctNum >= 80 ? 'd-mid' : 'd-lo') : '';
            const row = document.createElement('div');
            row.style.animationDelay = ((i + 3) * 0.055) + 's';
            row.className = 'hbar appear';
            row.innerHTML = `
                <div class="hbar-bg" style="background:${c};width:${barPct}%"></div>
                <span class="hb-pos">${pos}</span>
                <span class="hb-name">${item.name}</span>
                <div class="hb-track"><div class="hb-fill" style="width:${barPct}%;background:${c}"></div></div>
                ${pctStr ? `<span class="hb-pct"><span class="delta ${pClass}">${pctStr}</span></span>` : ''}
                <span class="hb-val">${valFmt(item.val)}</span>`;
            const detail = document.createElement('div');
            detail.className = 'rank-detail';
            if (item.plan) {
                detail.innerHTML = `
                    <div class="rd-stat"><span class="rd-stat-lbl">Факт</span><span class="rd-stat-val" style="color:${c}">${valFmt(item.val)}</span></div>
                    <div class="rd-stat"><span class="rd-stat-lbl">План</span><span class="rd-stat-val">${valFmt(item.plan)}</span></div>
                    ${pctStr ? `<div class="rd-stat"><span class="rd-stat-lbl">Виконання</span><span class="rd-stat-val">${pctStr}</span></div>` : ''}`;
            }
            row.onclick = () => { if(!item.plan&&!pctStr) return; detail.classList.toggle('open'); };
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'display:flex;flex-direction:column;';
            wrapper.appendChild(row); if(item.plan||pctStr) wrapper.appendChild(detail);
            listWrap.appendChild(wrapper);
        });
        grid.appendChild(listWrap);
    }
}

            row.style.borderRadius = isOpen ? '' : '11px 11px 0 0';
        };
        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'display:flex;flex-direction:column;';
        wrapper.appendChild(row);
        if (item.plan || pctStr) wrapper.appendChild(detail);
        listWrap.appendChild(wrapper);
    });
    grid.appendChild(listWrap);
}

// ═══════════════════════════════════════════════════════
// 📊 BAR VIEW — RPG XP-bar style
// ═══════════════════════════════════════════════════════
function renderBarChartView(grid, items, maxVal, def, valFmt, getPctStr, getPctNum, pctClass) {
    if (!items.length) return;
    const c = def.color;
    const vals = items.map(x => x.val);
    const avg = vals.reduce((s,v)=>s+v,0)/vals.length;

    // top summary
    const summary = document.createElement('div');
    summary.className = 'xp-summary';
    summary.innerHTML = `
        <div class="xp-sum-chip" style="--ac:${c}">
            <div class="xp-sum-lbl">ЛІДЕР</div>
            <div class="xp-sum-val">${items[0].name}</div>
            <div class="xp-sum-num" style="color:${c}">${valFmt(items[0].val)}</div>
        </div>
        <div class="xp-sum-chip">
            <div class="xp-sum-lbl">СЕРЕДНЄ</div>
            <div class="xp-sum-val">По магазину</div>
            <div class="xp-sum-num">${valFmt(avg)}</div>
        </div>
        <div class="xp-sum-chip">
            <div class="xp-sum-lbl">ВІДСТАВАННЯ</div>
            <div class="xp-sum-val">${items[items.length-1].name}</div>
            <div class="xp-sum-num">${valFmt(items[items.length-1].val)}</div>
        </div>`;
    grid.appendChild(summary);

    const wrap = document.createElement('div');
    wrap.className = 'xp-list';
    items.forEach((item, i) => {
        const barPct = Math.round(item.val / maxVal * 100);
        const pctStr = getPctStr(item);
        const pctNum = getPctNum(item);
        const pc = pctClass(pctNum);
        const isTop = i === 0;
        const rank = i === 0 ? '👑' : i === 1 ? '⚔️' : i === 2 ? '🛡️' : `#${i+1}`;
        const planFill = item.plan ? Math.min(100, Math.round(item.val / item.plan * 100)) : null;
        const xpColor = pctNum ? (pctNum >= 100 ? '#00e676' : pctNum >= 80 ? '#ff9800' : '#f44336') : c;

        const row = document.createElement('div');
        row.className = 'xp-row' + (isTop ? ' xp-row-top' : '');
        row.style.animationDelay = (i * 0.07) + 's';
        row.innerHTML = `
            <div class="xp-rank">${rank}</div>
            <div class="xp-body">
                <div class="xp-top-line">
                    <span class="xp-name">${item.name}</span>
                    <span class="xp-val" style="color:${isTop?c:'inherit'}" data-count-to="${item.val}" data-count-fmt="int">${valFmt(item.val)}</span>
                </div>
                <div class="xp-track">
                    <div class="xp-bar" data-w="${barPct}" style="width:0%;background:linear-gradient(90deg,${c}99,${c});box-shadow:0 0 8px ${c}66"></div>
                    ${planFill !== null ? `<div class="xp-bar xp-bar-plan" data-w="${planFill}" style="width:0%;background:${xpColor};opacity:.35;position:absolute;top:0;left:0;height:100%"></div>` : ''}
                </div>
                <div class="xp-meta">
                    <span class="xp-pct-of-max">${barPct}% потужності</span>
                    ${pctStr ? `<span class="xp-plan-badge ${pc}">${pctStr} плану</span>` : ''}
                </div>
            </div>`;

        const detail = document.createElement('div');
        detail.className = 'rank-detail';
        if (item.plan || pctStr) {
            detail.innerHTML = `
                <div class="rd-stat"><span class="rd-stat-lbl">Факт</span><span class="rd-stat-val" style="color:${c}">${valFmt(item.val)}</span></div>
                ${item.plan ? `<div class="rd-stat"><span class="rd-stat-lbl">План</span><span class="rd-stat-val">${valFmt(item.plan)}</span></div>` : ''}
                ${pctStr ? `<div class="rd-stat"><span class="rd-stat-lbl">Виконання</span><span class="rd-stat-val">${pctStr}</span></div>` : ''}`;
        }
        row.onclick = () => { if(item.plan||pctStr) detail.classList.toggle('open'); };
        const wr = document.createElement('div');
        wr.style.cssText = 'display:flex;flex-direction:column;';
        wr.appendChild(row);
        if(item.plan||pctStr) wr.appendChild(detail);
        wrap.appendChild(wr);
    });
    grid.appendChild(wrap);

    requestAnimationFrame(() => requestAnimationFrame(() => {
        grid.querySelectorAll('.xp-bar[data-w]').forEach(el => {
            el.style.width = el.dataset.w + '%';
        });
    }));
}

function renderGaugeView(grid, items, def, valFmt, getPctStr, getPctNum) {
    if (!items.length) return;
    const hasPlan = items.some(x => getPctStr(x));
    if (!hasPlan) {
        const msg = document.createElement('div');
        msg.style.cssText = 'padding:32px;text-align:center;color:#86868b;font-size:13px;font-weight:600;background:var(--card);border-radius:16px;border:1px solid var(--border)';
        msg.textContent = 'Для цієї метрики немає даних плану. Спробуйте режим Бари або Подіум.';
        grid.appendChild(msg); return;
    }

    const gGrid = document.createElement('div');
    gGrid.className = 'cyber-grid';

    items.forEach((item, i) => {
        const pctStr = getPctStr(item);
        const pctNum = getPctNum(item);
        if (!pctNum) return;
        const pct = Math.min(pctNum, 150);
        const sweep = pct / 150;
        const R = 38, cx = 50, cy = 52;
        const toXY = a => ({ x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) });
        const arcPath = (from, to) => {
            const s = toXY(from), e = toXY(to);
            return `M ${s.x.toFixed(2)} ${s.y.toFixed(2)} A ${R} ${R} 0 ${(to-from)>Math.PI?1:0} 1 ${e.x.toFixed(2)} ${e.y.toFixed(2)}`;
        };
        const startA = Math.PI, endA = Math.PI + sweep * Math.PI;
        const trackPath = arcPath(Math.PI, 2*Math.PI);
        const fillPath  = sweep > 0 ? arcPath(startA, endA) : '';

        const fillColor = pctNum >= 100 ? '#00e676' : pctNum >= 80 ? '#ff9800' : '#f44336';
        const glowColor = fillColor + '88';
        const isTop = i === 0;

        // Rank label (small, top-left)
        const rankLabel = i < 3 ? ['#1','#2','#3'][i] : `#${i+1}`;

        // Superhero icon centered in the arc (cx=50, cy≈28 in viewBox)
        const heroGlowId = `heroGlow${i}`;
        // Scale/translate hero SVG (originally 28x28 box) into center of arc gauge
        // arc center is cx=50, bottom at cy=52, so hero sits above arc center ~cy=28
        const heroSVG = getHeroSVG(i, fillColor, heroGlowId);

        const card = document.createElement('div');
        card.className = 'cyber-card' + (isTop ? ' cyber-card-top' : '');
        card.style.animationDelay = (i * 0.07) + 's';
        card.style.setProperty('--glow', glowColor);
        card.style.setProperty('--ac', fillColor);
        card.innerHTML = `
            <div class="cyber-rank">${rankLabel}</div>
            <svg class="cyber-svg" viewBox="0 0 100 60">
                <defs>
                    <filter id="glow${i}">
                        <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <filter id="${heroGlowId}">
                        <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
                        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <!-- Arc track -->
                <path d="${trackPath}" fill="none" stroke="#1e2330" stroke-width="9" stroke-linecap="round"/>
                ${fillPath ? `<path d="${fillPath}" fill="none" stroke="${fillColor}" stroke-width="9" stroke-linecap="round" filter="url(#glow${i})" class="cyber-arc" data-full="${endA}" data-start="${startA}" style="stroke-dasharray:120;stroke-dashoffset:120"/>` : ''}
                <!-- Hero icon centered inside arc -->
                <g transform="translate(${cx - 14}, ${cy - 30})">
                    ${heroSVG}
                </g>
                <!-- Percentage text -->
                <text x="${cx}" y="${cy - 1}" text-anchor="middle" font-size="9" font-weight="900" fill="${fillColor}" font-family="monospace" opacity="0.95">${pctNum.toFixed(1)}%</text>
                <text x="${cx}" y="${cy + 7}" text-anchor="middle" font-size="6" font-weight="700" fill="#6e7a99" font-family="monospace">ПЛАН</text>
            </svg>
            <div class="cyber-name">${item.name}</div>
            <div class="cyber-val" style="color:${def.color}">${valFmt(item.val)}</div>
            ${isTop ? '<div class="cyber-pulse"></div>' : ''}`;

        card.onclick = () => {
            card.classList.toggle('cyber-flipped');
            setTimeout(() => card.classList.remove('cyber-flipped'), 600);
        };
        gGrid.appendChild(card);
    });
    grid.appendChild(gGrid);

    // animate arcs via stroke-dashoffset
    requestAnimationFrame(() => requestAnimationFrame(() => {
        gGrid.querySelectorAll('.cyber-arc').forEach(path => {
            const len = path.getTotalLength ? path.getTotalLength() : 120;
            path.style.strokeDasharray = len;
            path.style.strokeDashoffset = len;
            path.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)';
            requestAnimationFrame(() => { path.style.strokeDashoffset = '0'; });
        });
    }));
}

// ═══════════════════════════════════════════════════════
// 🎉 CONFETTI PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════
(function() {
    const canvas = document.getElementById('particleCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [], rafId = null, active = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const COLORS = ['#f59e0b','#ef4444','#22c55e','#3b82f6','#a855f7','#ec4899','#14b8a6','#f97316'];

    function spawnBurst(cx, cy, count) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 3 + Math.random() * 8;
            particles.push({
                x: cx, y: cy,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 4,
                size: 5 + Math.random() * 7,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                rot: Math.random() * 360,
                rotV: (Math.random() - .5) * 12,
                life: 1, decay: .012 + Math.random() * .01,
                shape: Math.random() > .5 ? 'rect' : 'circle',
                gravity: .25 + Math.random() * .15,
            });
        }
    }

    function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            p.vy += p.gravity; p.vx *= .98;
            p.rot += p.rotV; p.life -= p.decay;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
            ctx.fillStyle = p.color;
            if (p.shape === 'rect') ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
            else { ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill(); }
            ctx.restore();
        });
        if (particles.length > 0) { rafId = requestAnimationFrame(tick); }
        else { canvas.style.opacity = '0'; active = false; }
    }

    window.fireConfetti = function(el) {
        const r = el ? el.getBoundingClientRect() : { left: window.innerWidth/2, top: window.innerHeight/3, width:0, height:0 };
        const cx = r.left + r.width/2, cy = r.top + r.height/2;
        canvas.style.opacity = '1';
        spawnBurst(cx, cy, 80);
        // extra bursts from sides
        setTimeout(() => spawnBurst(window.innerWidth * .1, -10, 30), 120);
        setTimeout(() => spawnBurst(window.innerWidth * .9, -10, 30), 200);
        if (!active) { active = true; rafId = requestAnimationFrame(tick); }
    };
})();

async function load() {
    const tableCard = document.getElementById('tableCard');
    const loader = document.getElementById('loader');
    loader.style.display = 'none';
    
    const skelWrap = document.createElement('div');
    skelWrap.id = 'skelWrap';
    const cols = window.innerWidth < 500 ? 4 : 7;
    for(let r=0;r<10;r++){
        const row = document.createElement('div');
        row.className = 'tbl-row-skel';
        for(let c=0;c<cols;c++){
            const cell=document.createElement('div');
            cell.className='tbl-row-skel-cell skel'+(c===0?' wide':'');
            cell.style.animationDelay=(r*0.05+c*0.02)+'s';
            row.appendChild(cell);
        }
        skelWrap.appendChild(row);
    }
    tableCard.appendChild(skelWrap);

    const SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOxz-ozH9yNLW3IAzlkMlbRqOTrR4sIUO1__KpAMBFEvvpMXr4LWTnRvzYGb_y6za7WBxOUhl2DV84/pub?output=csv";
    try {
        const res = await fetch(SHEET + '&t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = parseCSV(await res.text());
        if (rows.length < 2) throw new Error('Немає даних');
        savedHeaders = rows[0];
        savedRows = rows.slice(1);
        const sw = document.getElementById('skelWrap');
        if(sw) sw.remove();
        document.getElementById('tbl').style.display = '';
        renderTable(savedHeaders, savedRows, false);
    } catch(e) {
        loader.style.display = '';
        loader.className = 'error';
        loader.textContent = '❌ ' + e.message;
        const sw = document.getElementById('skelWrap');
        if(sw) sw.remove();
    }
}

load();
